events` row |\n\nAlways returns 200. No error propagation back to the calling script.\n\n### Heartbeat upsert semantics\n\n- One `heartbeats` row per `(project_id, heartbeat_type)` where `heartbeat_type = 'script:' + program`.\n- Every call: update `current_state`, `last_checked`.\n- State change: append `events` row with `event_type = state_transition`.\n- Dedup: if state unchanged and `last_checked` < 60 seconds ago, skip the `events` write.\n- Project lookup: match `program` to `projects.name` (exact, case-insensitive). If no match, store with `project_id = NULL`.\n\n---\n\n## Log Event Ingestor\n\nIncrementally scans log files for all active projects. Runs on a 60-second schedule.\n\n### Log discovery\n\nFor each active project: scan `{project.path}/data/logs/*.log`. Tracks read position per file in `log_positions`. Only reads new bytes since last recorded offset. On file truncation (current size < stored `file_size`), reset offset to 0.\n\n### Classification\n\nLines are matched against `log_filter` rules in `sort_order` order; first match wins.\n\nDefault seed rules:\n\n| Pattern (case-insensitive) | Classification | Event type written |\n|---|---|---|\n| `start(ed\\|ing)\\|listen(ing)? on port\\|server up` | `start` | `state_transition` |\n| `stop(ped\\|ping)\\|shutdown\\|exit(ing)?\\|terminated` | `stop` | `state_transition` |\n| `CRITICAL\\|FATAL\\|EXCEPTION\\|Traceback` | `critical` | `alert_fired` |\n| `\\bERROR\\b` | `error` | `alert_fired` |\n| `\\bWARN(ING)?\\b` | `warning` | `alert_fired` |\n| *(anything else)* | `junk` | *(skip \u2014 not stored)* |\n\nLines classified as `junk` are discarded. All other classifications produce one `events` row with `source = 'log_ingestor'` and the log line in `summary`.\n\n### Condensing\n\nConsecutive identical `(project_id, classification, message_text)` tuples within a single ingest pass increment a repeat counter in the last inserted `events.detail` JSON rather than inserting duplicate rows. Mirrors gem's `MlpEvent -condense` behavior.\n\n---\n\n## New Tables\n\n### health_check_log\n\nRaw poll history. Rows older than 24 hours are deleted on each ingest pass.\n\n| Column | Type | Description |\n|---|---|---|\n| id | INTEGER PK | |\n| project_id | INTEGER FK | References projects.id |\n| checked_at | TEXT | Timestamp (yyyymmdd_hhmmss) |\n| state | TEXT | UP / DEGRADED / DOWN |\n| response_ms | INTEGER | NULL for TCP and failed checks |\n| check_type | TEXT | http / tcp |\n\n### log_positions\n\nIngestion cursor per file.\n\n| Column | Type | Description |\n|---|---|---|\n| id | INTEGER PK | |\n| project_id | INTEGER FK | References projects.id |\n| log_path | TEXT | Absolute path to log file |\n| file_size | INTEGER | Last known size; truncation detected when current < this |\n| byte_offset | INTEGER | Next byte to read |\n| last_ingested | TEXT | Timestamp of last pass |\n\n### log_filter\n\nClassification rules. Editable; seeded with defaults on first startup.\n\n| Column | Type | Description |\n|---|---|---|\n| id | INTEGER PK | |\n| pattern | TEXT | Regex (Python re syntax) |\n| classification | TEXT | `start` / `stop` / `critical` / `error` / `warning` / `junk` |\n| program | TEXT | NULL = applies to all programs |\n| sort_order | INTEGER | Lower = matched first |\n| is_active | INTEGER | 1 = enabled |\n\n---\n\n## Reads / Writes\n\n| Reads | Writes |\n|---|---|\n| `projects` (port, health_endpoint, health_check_type, health_check_interval, desired_state) | `heartbeats` (upsert on each poll / heartbeat API call) |\n| `heartbeats` (previous state for change detection) | `events` (on state change, error classification) |\n| `log_positions` (byte offset per file) | `log_positions` (updated after each ingest pass) |\n| `log_filter` (classification rules) | `health_check_log` (one row per poll; 24h retained) |\n| Log files (incremental via byte offset) | `projects.health_check_type`, `health_check_interval` (on scan) |\n| `health_check_log` (uptime computation) | |\n\n---\n\n## New Routes\n\n| Method | Path | Description |\n|---|---|---|\n| POST | `/api/heartbeat` | Record script heartbeat |\n| POST | `/api/events` | Record script event |\n| POST | `/api/health/poll` | Trigger immediate health poll (all projects) |\n| GET | `/api/health/{name}` | Current health status for one project |\n| POST | `/api/logs/ingest` | Trigger immediate log ingest pass |\n\n---\n\n## Open Questions\n\n- Should `log_filter` rules be editable from a UI screen or config file only?\n- Should TCP and HTTP checks run in parallel (asyncio) or sequentially?\n- Should the heartbeat API accept a `heartbeat_minutes` parameter (like gem's `-heartbeat` flag) to auto-suppress re-alarming for N minutes?\n- Should `health_check_log` retention be configurable, or is 24h fixed?\n",
  "FEATURE-MCP-Hosting": "# Feature: MCP Hosting\n\n**Version:** 2026-04-06 V1\n**Description:** GAME as an MCP server host \u2014 discover, register, start, stop, and expose developer-created MCP servers\n\n## Design Intent\n\nDevelopers building projects on the platform may want to create MCP servers \u2014 tools that Claude (or other agents) can call during a conversation. Today, a developer would have to manually configure `.mcp.json`, manage the server process themselves, and tell coworkers how to connect. GAME should manage this lifecycle the same way it manages bin/ scripts: discover them, show them in the catalog, start/stop them, and let the developer expose them to others with a click.\n\n**Key principle:** GAME does not require developers to write MCP servers. MCP is one transport option among five (see FEATURE-ServiceInterfaces.md). But when a developer does write one, GAME should be the place that hosts it \u2014 handling process lifecycle, port assignment, and discoverability.\n\n**The coworker scenario:** Developer A writes a pricing lookup MCP server for their project. They register it in GAME and click \"Expose\" on the Service Catalog. GAME starts the server and makes the connection info available. Developer B adds it to their `.mcp.json` and Claude can now call pricing tools. When Developer A updates the server, GAME restarts it. No manual process management. No Slack messages saying \"hey restart your MCP thing.\"\n\n**Local-first, promote-to-remote:** MCP servers start as stdio (local subprocess, no network). When a developer clicks \"Expose,\" GAME starts the server with SSE or streamable-HTTP transport on an assigned port. Coworkers connect over the network. The server code does not change \u2014 only the transport config. This mirrors the GAME philosophy: start simple, promote when needed.\n\n---\n\n## MCP Server Discovery\n\nGAME discovers MCP servers during the project scan, similar to how it discovers bin/ scripts:\n\n### Convention: `mcp/` Directory\n\nA project that provides MCP servers places them in `mcp/`:\n\n```\nmyproject/\n  mcp/\n    pricing.py          # MCP server script\n    pricing.service.yaml  # Service manifest (FEATURE-ServiceInterfaces format)\n```\n\nThe scanner reads `mcp/*.service.yaml` and registers each as a service with `source = mcp:{project_name}`. The `.py` file is the server entry point.\n\n### Server Manifest Extension\n\nMCP servers use the standard service manifest with additional MCP-specific fields:\n\n```yaml\nname: pricing\ndescription: Product pricing lookup and calculation tools\nversion: 1.0.0\n\ntransports:\n  mcp: true             # This IS an MCP server\n  rest: false            # Not also exposed via REST (unless developer enables)\n\nmcp:\n  entry: pricing.py      # Script to run\n  runtime: python        # python | node | binary\n  requirements: requirements.txt  # Dependencies (optional)\n  default_transport: stdio  # stdio | sse | streamable-http\n\ntools:\n  - name: get_price\n    description: Look up the current price for a product by SKU\n    inputs:\n      sku:\n        type: string\n        required: true\n    output:\n      price: number\n      currency: string\n```\n\n---\n\n## MCP Server Lifecycle\n\n### Registration\n\nDuring scan, GAME:\n1. Finds `mcp/*.service.yaml` in each project\n2. Parses the manifest\n3. Inserts/updates the `services` table with `source = mcp:{project_name}`\n4. Inserts/updates `service_tools` with the tool definitions\n5. Registers an entry in `mcp_servers` table (see schema below)\n\n### Start / Stop\n\nMCP servers are managed like any other operation \u2014 through the process engine (`ops.py`/`spawn.py`):\n\n| Action | How |\n|--------|-----|\n| **Start (stdio)** | Not started by GAME \u2014 Claude Code starts it via `.mcp.json` config pointing at the script |\n| **Start (exposed)** | GAME launches the server as a subprocess with SSE/streamable-HTTP transport on an assigned port |\n| **Stop** | SIGTERM via process engine, same as any operation |\n| **Restart** | Stop + Start (triggered by developer or after project update) |\n\n### Expose / Unexpose\n\nThe Service Catalog screen shows an \"Expose\" toggle for each MCP server:\n\n- **Unexposed (default):** Server is stdio-only. Only the local developer's Claude can use it via `.mcp.json` pointing at the script path. GAME does not start a process.\n- **Exposed:** GAME starts the server on an assigned port (from a configurable range, default 9100-9199). The connection URL is shown in the Service Catalog. Other developers add the URL to their `.mcp.json`.\n\n---\n\n## .mcp.json Generation\n\nGAME can generate `.mcp.json` snippets for any registered MCP server:\n\n**Stdio (local use):**\n```json\n{\n  \"mcpServers\": {\n    \"pricing\": {\n      \"command\": \"python\",\n      \"args\": [\"/path/to/myproject/mcp/pricing.py\"],\n      \"transport\": \"stdio\"\n    }\n  }\n}\n```\n\n**SSE (exposed, network use):**\n```json\n{\n  \"mcpServers\": {\n    \"pricing\": {\n      \"url\": \"http://192.168.1.42:9101/mcp\"\n    }\n  }\n}\n```\n\nThe Service Catalog provides a \"Copy Config\" button that copies the appropriate JSON snippet to the clipboard.\n\n---\n\n## New Database Table: `mcp_servers`\n\n| Column | Type | Default | Description |\n|--------|------|---------|-------------|\n| id | INTEGER PK | auto | Auto-increment |\n| service_id | INTEGER FK | \u2014 | References services.id |\n| project_id | INTEGER FK | \u2014 | References projects.id |\n| entry_script | TEXT | \u2014 | Relative path to server script within the project |\n| runtime | TEXT | 'python' | python / node / binary |\n| requirements | TEXT | NULL | Path to requirements file (relative to project) |\n| default_transport | TEXT | 'stdio' | stdio / sse / streamable-http |\n| exposed | INTEGER | 0 | 1 = running on network port |\n| assigned_port | INTEGER | NULL | Port assigned when exposed |\n| pid | INTEGER | NULL | OS process ID when running |\n| status | TEXT | 'stopped' | stopped / starting / running / error |\n| last_started | TEXT | NULL | Timestamp |\n| last_error | TEXT | NULL | Last error message if status = error |\n| created_at | TEXT | datetime('now') | |\n| updated_at | TEXT | datetime('now') | |\n\n---\n\n## New Routes\n\n| Method | Path | Purpose |\n|--------|------|---------|\n| GET | `/api/mcp` | List all registered MCP servers with status |\n| POST | `/api/mcp/{id}/start` | Start an MCP server (exposed mode) |\n| POST | `/api/mcp/{id}/stop` | Stop a running MCP server |\n| POST | `/api/mcp/{id}/expose` | Toggle expose on (start on network port) |\n| POST | `/api/mcp/{id}/unexpose` | Toggle expose off (stop network process) |\n| GET | `/api/mcp/{id}/config` | Get .mcp.json snippet for this server |\n\n---\n\n## Configuration\n\n| Setting | Default | Description |\n|---------|---------|-------------|\n| `MCP_PORT_RANGE_START` | `9100` | First port in the MCP server port range |\n| `MCP_PORT_RANGE_END` | `9199` | Last port in the MCP server port range |\n| `MCP_AUTO_EXPOSE` | `false` | If true, newly discovered MCP servers are auto-exposed |\n\n---\n\n## Open Questions\n\n- Should GAME provide a scaffold command (`game-cli mcp init {name}`) that generates a starter MCP server with the manifest template? Would reduce friction for developers creating their first MCP server.\n- Should exposed MCP servers have authentication (API key, shared secret)? For local network use, probably not. For remote access, yes. Defer to when remote hosting is designed.\n- Should GAME monitor MCP server health (periodic tool call or ping)? Or is process-alive sufficient?\n",
  "FEATURE-SERVICE-CATALOG": "# Feature: Service Catalog API\n\n**Version:** 20260323 V1\n**Description:** REST API for service discovery and headless script execution with fire-and-poll lifecycle\n\nExposes two API families:\n\n1. **Catalog** \u2014 `GET /api/catalog` returns every project's identity, port, health path, and registered scripts.\n2. **Script Runner** \u2014 `POST /api/{name}/run/{script}` fires any bin/ script headlessly and returns a `run_id` for polling.\n\nThese are pure JSON endpoints (no HTMX). External tools, curl, and the companion SCREEN-CATALOG use them directly.\n\n---\n\n## Trigger\n\nCatalog data is populated by the existing startup scan (`scanner.py`). No additional detection step \u2014 `GET /api/catalog` reads `projects` + `operations` tables only (no disk I/O).\n\nScript execution reuses the existing process engine (`ops.py` / `spawn.py`) and `op_runs` table. No new subprocess management code.\n\n---\n\n## API Endpoints\n\n### Service Catalog\n\n```\nGET /api/catalog\n```\n\nReturns all active projects with their exposed scripts.\n\n**Response:**\n\n```json\n{\n  \"projects\": [\n    {\n      \"name\": \"myapp\",\n      \"display_name\": \"My App\",\n      \"status\": \"ACTIVE\",\n      \"port\": 5001,\n      \"health_path\": \"/health\",\n      \"base_url\": \"http://localhost:5001\",\n      \"scripts\": [\n        {\n          \"script\": \"start\",\n          \"name\": \"Start Server\",\n          \"category\": \"service\",\n          \"run_endpoint\": \"POST /api/myapp/run/start\",\n          \"timeout\": 300,\n          \"schedule\": null,\n          \"last_run_id\": 42,\n          \"last_run_status\": \"done\",\n          \"last_run_at\": \"20260323_110000\"\n        }\n      ]\n    }\n  ],\n  \"total_projects\": 12,\n  \"total_scripts\": 34,\n  \"generated_at\": \"20260323_120000\"\n}\n```\n\n| Field | Source |\n|-------|--------|\n| `name` | `projects.name` |\n| `display_name` | `projects.display_name` |\n| `status` | `projects.status` |\n| `port` | `projects.port` |\n| `health_path` | `projects.health_endpoint` |\n| `base_url` | Constructed: `http://localhost:{port}` (null if no port) |\n| `scripts[].script` | Basename of `operations.cmd` without `bin/` and extension |\n| `scripts[].name` | `operations.name` |\n| `scripts[].category` | `operations.category` |\n| `scripts[].run_endpoint` | Constructed: `POST /api/{name}/run/{script}` |\n| `scripts[].timeout` | `operations.timeout` |\n| `scripts[].schedule` | `operations.schedule` |\n| `scripts[].last_run_*` | Most recent `op_runs` row for this operation |\n\nOnly projects with `is_active = 1` appear. Scripts with `is_url = 1` are excluded (not executable).\n\n**Script slug derivation:** `bin/start.sh` \u2192 `start`, `bin/deploy.py` \u2192 `deploy`. If two scripts share the same base name, `.sh` takes priority.\n\n---\n\n### Fire Script\n\n```\nPOST /api/{name}/run/{script}\n```\n\n| Param | Source |\n|-------|--------|\n| `{name}` | `projects.name` slug |\n| `{script}` | Script basename (no `bin/`, no extension) |\n\n**Request body:** optional JSON `{ \"env\": { \"KEY\": \"VAL\" } }` for injected environment vars.\n\n**Response 202:**\n\n```json\n{\n  \"run_id\": 42,\n  \"status\": \"running\",\n  \"started_at\": \"20260323_120000\",\n  \"poll_url\": \"/api/runs/42\",\n  \"log_url\": \"/api/runs/42/log\",\n  \"stop_url\": \"/api/runs/42/stop\"\n}\n```\n\n**Errors:**\n\n| Code | Reason |\n|------|--------|\n| 404 | Project `{name}` not found |\n| 404 | Script `{script}` not registered for that project |\n| 409 | Script already running (same operation has `status = running`) |\n\n---\n\n### Poll Run Status\n\n```\nGET /api/runs/{run_id}\n```\n\n**Response 200:**\n\n```json\n{\n  \"run_id\": 42,\n  \"status\": \"running\",\n  \"exit_code\": null,\n  \"started_at\": \"20260323_120000\",\n  \"finished_at\": null,\n  \"log_url\": \"/api/runs/42/log\",\n  \"stop_url\": \"/api/runs/42/stop\"\n}\n```\n\n`status` values: `running` | `done` | `error` | `stopped`\n\nClient polls until status is not `running`. Recommended interval: 2 seconds.\n\n---\n\n### Fetch Log\n\n```\nGET /api/runs/{run_id}/log\n```\n\nReturns full log content. Safe to call while the process is still running \u2014 returns whatever has been written so far.\n\n**Response 200:**\n\n```json\n{\n  \"run_id\": 42,\n  \"status\": \"running\",\n  \"log\": \"...full log text...\",\n  \"line_count\": 37\n}\n```\n\nOptional query param `?tail=N` returns the last N lines only.\n\n---\n\n### Stop Run\n\n```\nPOST /api/runs/{run_id}/stop\n```\n\nSends SIGTERM to the process group. Updates `op_runs.status` to `stopped`.\n\n**Response 200:**\n\n```json\n{\n  \"run_id\": 42,\n  \"status\": \"stopped\"\n}\n```\n\nReturns 404 if `run_id` not found; returns 200 (no-op) if already finished.\n\n---\n\n## Fire-and-Poll Pattern\n\nLong-running scripts (servers, builds, deploys) follow this lifecycle:\n\n```\n1. POST /api/{name}/run/{script}\n      \u2193 202 { run_id, poll_url }\n\n2. GET /api/runs/{run_id}   \u2190 poll every 2 seconds\n      status: \"running\"     \u2190 continue polling\n      status: \"done\"        \u2190 stop polling, fetch log\n      status: \"error\"       \u2190 stop polling, fetch log for diagnostics\n      status: \"stopped\"     \u2190 stop polling (user cancelled)\n\n3. GET /api/runs/{run_id}/log\n      \u2190 full output\n\n4. (optional) POST /api/runs/{run_id}/stop\n      \u2190 cancel mid-run\n```\n\nThis is the same state machine the process engine already uses \u2014 no new DB fields.\n\n---\n\n## State Machine\n\nReuses the existing `op_runs` state machine:\n\n```\nSTARTING \u2192 RUNNING \u2192 DONE\n                   \u2192 ERROR     (non-zero exit)\n                   \u2192 STOPPED   (SIGTERM)\n```\n\n`STARTING` transitions to `RUNNING` as soon as the subprocess PID is confirmed alive. The catalog API only reports `running` (not `starting`) \u2014 the distinction is internal.\n\n---\n\n## Implementation Notes\n\n| Concern | Approach |\n|---------|----------|\n| JSON vs HTMX | These endpoints return JSON only. No HTML fragments. |\n| Auth | None \u2014 localhost use only. |\n| Concurrent runs | Allowed per operation unless the script itself prevents it. The 409 guard is opt-in per script via `# Singleton:` header (not yet implemented). |\n| Schema changes | None \u2014 reads `projects`, `operations`; writes to `op_runs` via existing `ops.py`. |\n| Catalog freshness | Reflects last scan. Stale if projects changed without a rescan. Includes `generated_at` so callers can detect staleness. |\n\n---\n\n## Reads / Writes\n\n| Reads | Writes |\n|-------|--------|\n| `projects` (all active) | `op_runs` (new row on fire) |\n| `operations` (all scripts) | `op_runs` (status update on finish) |\n| `op_runs` (last run per operation) | `events` (operation_started, operation_completed) |\n| Log files (log endpoint) | Log file (appended by process engine) |\n\n---\n\n## New Routes\n\n| Method | Path | Returns |\n|--------|------|---------|\n| GET | `/api/catalog` | Full catalog JSON |\n| POST | `/api/{name}/run/{script}` | Run record JSON (202) |\n| GET | `/api/runs/{run_id}` | Run status JSON |\n| GET | `/api/runs/{run_id}/log` | Log content JSON |\n| POST | `/api/runs/{run_id}/stop` | Stop confirmation JSON |\n\nScreen route added by SCREEN-CATALOG: `GET /catalog`.\n\n---\n\n## Open Questions\n\n- Should `GET /api/catalog` support `?project={name}` filtering? Yes \u2014 add optional `?name={name}` param returning a single-project response. Low cost, high convenience for callers who only need one project.\n- Should the 409 guard be the default? Yes \u2014 409 is always enforced. Add `?force=true` query param to bypass for scripts that support concurrent runs. The `# Singleton: true` header (not yet implemented) is the proper per-script opt-out.\n- Should log fetching support chunked streaming? Not in V1. Full log via JSON is sufficient. Add SSE streaming as a P3 enhancement when logs exceed ~100KB regularly.\n",
  "FEATURE-ServiceInterfaces": "# Feature: Service Interfaces\n\n**Version:** 2026-04-06 V1\n**Description:** Unified service descriptor framework \u2014 MCP-shaped metadata for transport-agnostic service discovery and consumption\n\n## Design Intent\n\nThe platform needs a single way to describe, discover, and consume services regardless of how they are delivered. Today GAME exposes capabilities through REST endpoints, bash scripts (CLI), and the web UI. Adding MCP and async queues creates five transports for the same underlying capabilities. Without a unifying descriptor, each transport is a silo.\n\n**The core idea:** every service is described using an MCP-shaped manifest \u2014 name, description, and typed tool definitions \u2014 but the service does NOT speak the MCP protocol unless it is an actual MCP server. The manifest is a **metadata format**, not a transport. GAME reads these manifests to populate the Service Catalog, generate CLI wrappers, expose REST endpoints, and optionally start real MCP servers.\n\n**Why MCP-shaped:** MCP already solved the \"how do you describe a tool so an AI agent can call it\" problem. By adopting the same shape (name, description, input schema, output schema) for ALL services \u2014 not just MCP ones \u2014 we get a uniform interface that works for humans (Service Catalog UI), scripts (CLI gateway), agents (MCP or REST), and async consumers (queue). Developers learn one descriptor format. Claude reads one format. The platform renders one format.\n\n**What this enables:**\n- A developer writes a service manifest once. GAME exposes it via whichever transports are enabled.\n- Projects declare service dependencies in `services.yaml`. `common.py` reads this config and dispatches calls to the correct transport without the application knowing how the service is hosted.\n- Swapping implementations (e.g., platform logging vs. external logging) is a config change, not a code change.\n- The same descriptor that tells Claude what tools are available also tells the application code at runtime how to call them. One source of truth for both build-time (agent) and run-time (application).\n\n**What this is NOT:** This is not a mandate that all services speak MCP protocol. stdio MCP is one transport option. Most platform services will be consumed via REST or CLI. The descriptor format is borrowed from MCP because it is a good format, not because everything must be an MCP server.\n\n---\n\n## Service Manifest Format\n\nEach service is described by a manifest file: `services/{service-name}.service.yaml`\n\n```yaml\nname: batch-runner\ndescription: Execute project scripts as background jobs with log capture and lifecycle management\nversion: 1.0.0\n\ntransports:\n  rest: true          # Exposed via GAME REST API\n  cli: true           # Accessible via game-cli.sh\n  mcp: false          # Not an MCP server (unless developer enables it)\n  async: false        # Not queue-backed\n\ntools:\n  - name: run_script\n    description: Launch a project script as a background job\n    inputs:\n      project:\n        type: string\n        required: true\n        description: Project name slug\n      script:\n        type: string\n        required: true\n        description: Script basename (no bin/, no extension)\n      env:\n        type: object\n        required: false\n        description: Environment variables to inject\n    output:\n      run_id: integer\n      status: string\n      poll_url: string\n\n  - name: run_status\n    description: Check if a job is still running\n    inputs:\n      run_id:\n        type: integer\n        required: true\n    output:\n      status: string\n      exit_code: integer\n      duration: integer\n```\n\n---\n\n## Transport Mapping\n\nEach transport maps the same tool definition to its native invocation pattern:\n\n| Transport | How a tool is called | Response format |\n|-----------|---------------------|-----------------|\n| **REST** | `POST /api/services/{service}/{tool}` with JSON body matching `inputs` | JSON matching `output` |\n| **CLI** | `game-cli {service} {tool} --project=X --script=Y` | Printed text or `--json` for structured output |\n| **MCP** | Agent calls tool via stdio MCP protocol (tool name = `{service}_{tool}`) | MCP tool response |\n| **Async** | Message written to `data/queues/{service}.queue.jsonl` with `tool` and `inputs` fields | Result written to `data/queues/{service}.results.jsonl` |\n| **Web UI** | Button/form on Service Catalog screen triggers REST call | HTMX fragment update |\n\nThe platform generates the REST routes and CLI commands automatically from the manifest. MCP servers are only started when `mcp: true` and the developer has enabled MCP hosting for that service.\n\n---\n\n## Service Registry\n\nGAME maintains a service registry in the `services` database table (see below). On startup, GAME scans:\n\n1. **Platform services** \u2014 manifests in `services/*.service.yaml` within the GAME project\n2. **Project services** \u2014 manifests in `{project}/services/*.service.yaml` for each managed project\n3. **MCP servers** \u2014 registered MCP server configurations (see FEATURE-MCP-Hosting.md)\n\nThe Service Catalog screen (SCREEN-DASHBOARDS-SERVICECATALOG.md) displays all registered services grouped by source (platform vs. project).\n\n---\n\n## Project Service Consumption\n\nProjects declare which platform services they use in `services.yaml` at the project root:\n\n```yaml\nservices:\n  batch-runner: game_platform\n  workflow: game_platform\n  async-queue: game_platform\n```\n\nValues: `game_platform` (call GAME's REST API), `disabled` (no-op), or a custom URL for external implementations.\n\n`common.py` (distributed to all projects) includes a `ServiceClient` class that reads `services.yaml` and provides a Python API:\n\n```python\nfrom common import services\n\n# Calls GAME REST API under the hood\nrun = services.batch_runner.run_script(project=\"myapp\", script=\"deploy\")\nstatus = services.batch_runner.run_status(run_id=run[\"run_id\"])\n```\n\nThe client resolves the GAME URL using the same logic as `game-cli.sh` (GAME_URL > GAME_PORT > ~/.game_port > localhost:5000).\n\n---\n\n## New Database Table: `services`\n\n| Column | Type | Default | Description |\n|--------|------|---------|-------------|\n| id | INTEGER PK | auto | Auto-increment |\n| name | TEXT UNIQUE | \u2014 | Service name slug (e.g. `batch-runner`) |\n| display_name | TEXT | \u2014 | Human-readable name |\n| description | TEXT | \u2014 | One-line description from manifest |\n| source | TEXT | \u2014 | `platform` / `project:{name}` / `mcp:{name}` |\n| source_project_id | INTEGER FK | NULL | References projects.id if source is a project |\n| manifest_path | TEXT | \u2014 | Path to the .service.yaml file |\n| transports | TEXT | '{}' | JSON: which transports are enabled |\n| tool_count | INTEGER | 0 | Number of tools defined |\n| version | TEXT | NULL | Service version from manifest |\n| is_active | INTEGER | 1 | 0 if removed from disk |\n| created_at | TEXT | datetime('now') | First discovery |\n| updated_at | TEXT | datetime('now') | Last scan |\n\n### `service_tools`\n\n| Column | Type | Description |\n|--------|------|-------------|\n| id | INTEGER PK | Auto-increment |\n| service_id | INTEGER FK | References services.id |\n| name | TEXT | Tool name |\n| description | TEXT | Tool description (shown to agents and in UI) |\n| input_schema | TEXT | JSON schema for inputs |\n| output_schema | TEXT | JSON schema for outputs |\n| sort_order | INTEGER | Display order |\n\n---\n\n## CLAUDE_RULES Integration\n\nWhen a project is built or updated, the platform services available to it are listed in a `## Platform Services` section injected into AGENTS.md alongside the CLAUDE_RULES block. This tells the AI agent what services exist and how to call them:\n\n```markdown\n## Platform Services\n\nThe following services are available via the platform client (`common.py`):\n\n- **batch-runner** \u2014 Execute project scripts as background jobs\n  - `services.batch_runner.run_script(project, script)` \u2192 `{run_id, status}`\n  - `services.batch_runner.run_status(run_id)` \u2192 `{status, exit_code}`\n- **workflow** \u2014 Generic state machine for task lifecycle\n  - `services.workflow.create(workflow_name, workflow_type, payload)` \u2192 `{workflow_id}`\n  - `services.workflow.transition(workflow_id, to_state)` \u2192 `{new_state}`\n```\n\nThis section is generated from the service manifests. The agent reads it and knows how to wire up service calls in application code. Same descriptor, different audience.\n\n---\n\n## New Routes\n\n| Method | Path | Purpose |\n|--------|------|---------|\n| GET | `/api/services` | List all registered services with their tools |\n| GET | `/api/services/{name}` | Get one service manifest with full tool definitions |\n| POST | `/api/services/{name}/{tool}` | Invoke a service tool (generic dispatch) |\n\nThese complement \u2014 not replace \u2014 the existing `/api/catalog` and `/api/{name}/run/{script}` endpoints. The service routes provide the generic interface; existing endpoints remain as shortcuts.\n\n---\n\n## Open Questions\n\n- Should service manifests support a `health` field (endpoint to check if the service is operational)? Useful for the monitoring screen to show service health alongside project health.\n- Should `common.py` ServiceClient support async (non-blocking) calls natively, or should async always go through the queue transport?\n- Should the generic `/api/services/{name}/{tool}` route replace the existing per-feature routes over time, or should both coexist permanently?\n",
  "FEATURE-VOICEFORWARD": "# Feature: VoiceForward\n\n**Version:** 20260328 V1\n**Description:** Mobile voice recorder \u2014 records audio on the phone, transcribes with local Whisper, and appends text to a configured project file.\n\nVoiceForward adds a mobile-accessible recorder page to the GAME server. The user opens `/voice` in iPhone Safari, taps a labeled button, records a voice note, and the GAME server transcribes it locally with Whisper and appends the text to the appropriate project file. Buttons are configured via a settings screen \u2014 not hard-coded.\n\n---\n\n## Capabilities\n\n1. **Button Config Store** \u2014 CRUD for voice buttons stored in `voice_buttons` table. Each button has a label, a target file path (relative to `$PROJECTS_DIR`), a color, and a sort order.\n2. **Audio Upload + Transcription** \u2014 `POST /api/voice/upload` receives a webm/ogg audio blob and a label from the phone browser. Saves to a temp file, transcribes with Whisper `base` model, looks up the target path from the DB by label, appends the transcribed text to the file.\n3. **File Appender** \u2014 Resolves `$PROJECTS_DIR/{target_file}`, creates the file and any missing parent directories if they do not exist, and appends a dated entry.\n\n---\n\n## Triggers\n\n| Trigger | Description |\n|---------|-------------|\n| `POST /api/voice/upload` | Phone browser sends audio blob + label after recording stops |\n| `GET /voice` | Phone browser loads the mobile recorder page |\n\n---\n\n## Upload Logic\n\n```\nPOST /api/voice/upload\n  body: multipart \u2014 audio (webm/ogg blob), label (string)\n\n1. Validate: label exists in voice_buttons (active=1); return 400 if not found\n2. Save audio blob to temp file (e.g. /tmp/vf_{uuid}.webm)\n3. model = whisper.load_model(\"base\")   # lazy-loaded; cached after first call\n4. result = model.transcribe(temp_file)\n5. text = result[\"text\"].strip()\n6. Delete temp file\n7. Call append_to_file(target_file, label, text)\n8. Return JSON: {status: \"ok\", text: text, target_file: target_file}\n\nOn error: return JSON {status: \"error\", message: ...} with appropriate HTTP status\n```\n\n---\n\n## File Append Format\n\nEach entry appended to the target file:\n\n```\n---\n**YYYY-MM-DD HH:MM** [LABEL]\n{transcribed text}\n```\n\n---\n\n## New Table: `voice_buttons`\n\n| Column | Type | Constraints | Notes |\n|--------|------|-------------|-------|\n| id | INTEGER | PK, autoincrement | |\n| label | TEXT | NOT NULL, UNIQUE | Display text, e.g. \"BOOK IDEAS\" |\n| target_file | TEXT | NOT NULL | Relative to `$PROJECTS_DIR`, e.g. `TheTruth/ideas.md` |\n| color | TEXT | NOT NULL | Hex color for button background |\n| sort_order | INTEGER | NOT NULL | Display order (ascending) |\n| active | BOOLEAN | NOT NULL, DEFAULT 1 | Hidden from recorder if 0 |\n\n---\n\n## Seed Data\n\nInserted at migration time:\n\n| label | target_file | color | sort_order |\n|-------|-------------|-------|-----------|\n| BOOK IDEAS | TheTruth/ideas.md | #fdab3d | 1 |\n| GAME SPEC | Specifications/GAME/ideas.md | #0073ea | 2 |\n| GAME | GAME/queue.md | #00c875 | 3 |\n\n---\n\n## New Routes\n\n| Method | Path | Purpose |\n|--------|------|---------|\n| GET | `/voice` | Mobile recorder page (no GAME nav) |\n| POST | `/api/voice/upload` | Receive audio + label; transcribe; append |\n| GET | `/settings/voiceforward` | Redirect \u2192 `/settings/voiceforward/config` |\n| GET | `/settings/voiceforward/config` | Button management screen |\n| GET | `/settings/voiceforward/docs` | Setup documentation page |\n| POST | `/api/voice/buttons` | Create a new button |\n| PUT | `/api/voice/buttons/{id}` | Update button fields |\n| DELETE | `/api/voice/buttons/{id}` | Delete button |\n| PUT | `/api/voice/buttons/{id}/reorder` | Update sort_order |\n\n---\n\n## New Module: `voiceforward.py`\n\n| Function | Signature | Description |\n|----------|-----------|-------------|\n| `get_buttons` | `() \u2192 list[dict]` | Query `voice_buttons` WHERE active=1 ORDER BY sort_order |\n| `get_button_by_label` | `(label: str) \u2192 dict \\| None` | Lookup button by label (case-sensitive) |\n| `transcribe` | `(audio_path: str) \u2192 str` | Load Whisper base model (lazy, cached); return transcribed text |\n| `append_to_file` | `(target_file: str, label: str, text: str)` | Resolve full path via `$PROJECTS_DIR`; create dirs/file if needed; append dated entry |\n| `route` | `(label: str, audio_path: str) \u2192 dict` | Orchestrates: lookup \u2192 transcribe \u2192 append \u2192 return result dict |\n\n---\n\n## Dependencies\n\nAdd to `requirements.txt`:\n```\nopenai-whisper\n```\n\nSystem requirement (install separately):\n```\nffmpeg\n```\n\nWhisper `base` model (~140 MB) downloads on first transcription call. Subsequent calls use the cached model in memory for the server process lifetime.\n\n---\n\n## Open Questions\n\n- Should the Whisper model size be configurable via `.env` (`WHISPER_MODEL=base`)? Currently hard-coded to `base`; `small` or `medium` would improve accuracy for unusual vocabulary at higher CPU cost.\n- Should audio files be retained (e.g. in `data/voice_recordings/`) for later re-transcription, or always deleted after processing? Currently deleted after processing.\n- Should `$PROJECTS_DIR` be the only supported root, or should buttons support an absolute path override for targets outside the projects directory?\n",
  "FEATURE-Workflow-Service": "# Feature: Workflow Service\n\n**Version:** 2026-04-06 V1\n**Description:** Generic state machine service \u2014 one interface for all workflow types, differentiated by workflow-name and workflow-type with payload-driven behavior\n\n## Design Intent\n\nGAME already has a Kanban board (SCREEN-DASHBOARDS-WORKFLOW.md) for specification ticket lifecycle. That board uses a fixed set of states (idea \u2192 proposed \u2192 ready \u2192 in_development \u2192 testing \u2192 done) tied to `spec_tickets`. The Workflow Service generalizes this into a platform service that any project can use for any kind of state machine \u2014 not just specification tickets.\n\n**One interface, many workflows:** A deployment pipeline, a content review process, a bug triage queue, and the existing specification ticket lifecycle are all state machines. They differ in their states, transitions, and payloads \u2014 not in their fundamental operations (create, transition, query, list). The Workflow Service provides those operations as a generic interface. The specific workflow behavior comes from **workflow templates** that define states and allowed transitions.\n\n**Workflow-name and workflow-type as arguments:** Every workflow call takes `workflow_name` (which specific instance, e.g., \"deploy-myapp-v2.1\") and `workflow_type` (which template, e.g., \"deployment\"). The type determines the allowed states and transitions. The name identifies the specific workflow instance. Payloads carry type-specific data.\n\n**Integration with existing Kanban:** The existing `spec_tickets` system becomes one workflow type (\"specification-ticket\") managed by this service. The Kanban screen reads from the same data through the workflow service API. No migration needed \u2014 the existing states map directly to a workflow template.\n\n**Integration with other services:** The workflow service is a state machine, not a task executor. When a transition fires (e.g., specification ticket moves to \"in_development\"), the workflow service emits an event. Other services (Batch Runner, AsyncQueue) can subscribe to these events to trigger work. The workflow service does not run scripts \u2014 it manages state.\n\n---\n\n## Service Manifest\n\n```yaml\nname: workflow\ndescription: Generic state machine for project task and process lifecycle management\nversion: 1.0.0\n\ntransports:\n  rest: true\n  cli: true\n  mcp: true\n  async: false\n\ntools:\n  - name: create\n    description: >\n      Create a new workflow instance from a template. Returns a workflow_id\n      for all subsequent operations. The workflow starts in the template's\n      initial state.\n    inputs:\n      workflow_name:\n        type: string\n        required: true\n        description: Human-readable name for this workflow instance (e.g. \"deploy-myapp-v2.1\")\n      workflow_type:\n        type: string\n        required: true\n        description: Template identifier (e.g. \"deployment\", \"specification-ticket\", \"review\")\n      project:\n        type: string\n        required: true\n        description: Project name slug this workflow belongs to\n      payload:\n        type: object\n        required: false\n        description: Type-specific initial data (e.g. ticket body, deployment target, review criteria)\n    output:\n      workflow_id: { type: integer }\n      workflow_name: { type: string }\n      workflow_type: { type: string }\n      current_state: { type: string }\n      created_at: { type: string }\n\n  - name: transition\n    description: >\n      Move a workflow instance to a new state. Validates that the transition\n      is allowed by the template. Records the transition in history with an\n      optional comment. Returns the new state.\n    inputs:\n      workflow_id:\n        type: integer\n        required: true\n      to_state:\n        type: string\n        required: true\n        description: Target state (must be a valid transition from current state)\n      comment:\n        type: string\n        required: false\n        description: Reason for the transition (recorded in history)\n      payload:\n        type: object\n        required: false\n        description: Additional data to attach to this transition (e.g. test results, review notes)\n    output:\n      workflow_id: { type: integer }\n      previous_state: { type: string }\n      current_state: { type: string }\n      valid: { type: boolean }\n      error: { type: string, nullable: true }\n\n  - name: status\n    description: Get the current state and history of a workflow instance\n    inputs:\n      workflow_id:\n        type: integer\n        required: true\n    output:\n      workflow_id: { type: integer }\n      workflow_name: { type: string }\n      workflow_type: { type: string }\n      project: { type: string }\n      current_state: { type: string }\n      payload: { type: object }\n      history:\n        type: array\n        items:\n          from_state: string\n          to_state: string\n          comment: string\n          timestamp: string\n\n  - name: list\n    description: List workflow instances, optionally filtered by project, type, or state\n    inputs:\n      project:\n        type: string\n        required: false\n        description: Filter to workflows for a specific project\n      workflow_type:\n        type: string\n        required: false\n        description: Filter to a specific workflow type\n      state:\n        type: string\n        required: false\n        description: Filter to workflows currently in a specific state\n      limit:\n        type: integer\n        required: false\n        description: Maximum results (default 50)\n    output:\n      workflows:\n        type: array\n        items:\n          workflow_id: integer\n          workflow_name: string\n          workflow_type: string\n          project: string\n          current_state: string\n          updated_at: string\n\n  - name: list_types\n    description: List available workflow templates with their states and transitions\n    inputs: {}\n    output:\n      types:\n        type: array\n        items:\n          name: string\n          display_name: string\n          description: string\n          states: array\n          initial_state: string\n```\n\n---\n\n## Workflow Templates\n\nTemplates define the state machine for each workflow type. Stored in the `workflow_templates` table, seeded from YAML files, and editable via the Settings screen.\n\n### Built-in Templates\n\n**specification-ticket** (maps to existing spec_tickets Kanban):\n\n```yaml\nname: specification-ticket\ndisplay_name: Specification Ticket\ndescription: Specification lifecycle from idea through implementation to acceptance\ninitial_state: idea\nstates:\n  - name: idea\n    transitions: [proposed]\n  - name: proposed\n    transitions: [ready, idea]\n    requires: [summary]\n  - name: ready\n    transitions: [in_development, proposed]\n    requires: [acceptance_criteria]\n  - name: in_development\n    transitions: [testing, proposed]\n  - name: testing\n    transitions: [done, ready]\n  - name: done\n    transitions: []\n```\n\n**deployment** (example for project deployment tracking):\n\n```yaml\nname: deployment\ndisplay_name: Deployment Pipeline\ndescription: Track deployments from build through staging to production\ninitial_state: building\nstates:\n  - name: building\n    transitions: [staging, failed]\n  - name: staging\n    transitions: [production, failed, building]\n  - name: production\n    transitions: []\n  - name: failed\n    transitions: [building]\n```\n\n**review** (example for content/code review):\n\n```yaml\nname: review\ndisplay_name: Review Process\ndescription: Submit work for review, iterate on feedback, approve\ninitial_state: submitted\nstates:\n  - name: submitted\n    transitions: [in_review]\n  - name: in_review\n    transitions: [approved, changes_requested]\n  - name: changes_requested\n    transitions: [submitted]\n  - name: approved\n    transitions: []\n```\n\nDevelopers can create custom templates by adding YAML files to `{project}/workflows/` or through the Settings screen.\n\n---\n\n## New Database Tables\n\n### `workflow_templates`\n\n| Column | Type | Default | Description |\n|--------|------|---------|-------------|\n| id | INTEGER PK | auto | Auto-increment |\n| name | TEXT UNIQUE | \u2014 | Template identifier slug |\n| display_name | TEXT | \u2014 | Human-readable name |\n| description | TEXT | NULL | What this workflow type is for |\n| states_json | TEXT | \u2014 | JSON array of state definitions (name, transitions, requires) |\n| initial_state | TEXT | \u2014 | State name for new instances |\n| source | TEXT | 'platform' | `platform` / `project:{name}` |\n| is_active | INTEGER | 1 | |\n| created_at | TEXT | datetime('now') | |\n| updated_at | TEXT | datetime('now') | |\n\n### `workflow_instances`\n\n| Column | Type | Default | Description |\n|--------|------|---------|-------------|\n| id | INTEGER PK | auto | Auto-increment |\n| workflow_name | TEXT | \u2014 | Human-readable instance name |\n| template_id | INTEGER FK | \u2014 | References workflow_templates.id |\n| project_id | INTEGER FK | \u2014 | References projects.id |\n| current_state | TEXT | \u2014 | Current state name |\n| payload | TEXT | '{}' | JSON blob of type-specific data |\n| created_at | TEXT | datetime('now') | |\n| updated_at | TEXT | datetime('now') | |\n\n### `workflow_history`\n\n| Column | Type | Description |\n|--------|------|-------------|\n| id | INTEGER PK | Auto-increment |\n| workflow_id | INTEGER FK | References workflow_instances.id |\n| from_state | TEXT | Previous state |\n| to_state | TEXT | New state |\n| comment | TEXT | Transition reason |\n| transition_payload | TEXT | JSON data attached to this transition |\n| timestamp | TEXT | When the transition occurred |\n\n---\n\n## Event Emission\n\nEvery transition emits an event to the `events` table:\n\n| event_type | summary | detail |\n|------------|---------|--------|\n| `workflow_transition` | \"{workflow_name}: {from} \u2192 {to}\" | JSON: workflow_id, template, project, from_state, to_state, comment |\n\nOther services can query events to react to workflow state changes. The Batch Runner could be triggered by a \"ready \u2192 in_development\" transition on a specification-ticket to auto-launch the build.\n\n---\n\n## Migration from spec_tickets\n\nThe existing `spec_tickets` table and Kanban screen continue to work. The workflow service provides an additional, generic interface. Migration path:\n\n1. Seed `workflow_templates` with the \"specification-ticket\" template\n2. Create `workflow_instances` rows mirroring existing `spec_tickets` rows\n3. Kanban screen reads from `workflow_instances` via the workflow service API\n4. `spec_tickets` table becomes a view or is retired\n\nThis migration is not required for V1. Both systems can coexist \u2014 the workflow service is additive.\n\n---\n\n## New Routes\n\n| Method | Path | Purpose |\n|--------|------|---------|\n| POST | `/api/services/workflow/create` | Create workflow instance |\n| POST | `/api/services/workflow/transition` | Transition state |\n| GET | `/api/services/workflow/status?workflow_id=N` | Get workflow status + history |\n| GET | `/api/services/workflow/list` | List workflows with filters |\n| GET | `/api/services/workflow/list_types` | List available templates |\n| GET | `/api/workflow/templates` | Template management (Settings integration) |\n| POST | `/api/workflow/templates` | Create/update template |\n\n---\n\n## Open Questions\n\n- Should workflow templates support \"on_enter\" hooks \u2014 a script or REST call fired automatically when entering a state? This would enable auto-triggering builds when a ticket enters \"in_development\" without requiring external event polling. Adds complexity but reduces integration glue.\n- Should the \"specification-ticket\" template migration be automatic (V1) or deferred? Automatic means the Kanban screen switches to the workflow service immediately. Deferred means both systems coexist until the developer explicitly migrates.\n- Should workflows support parallel states (e.g., \"building\" and \"testing\" simultaneously) or only linear state machines? Linear is simpler and covers all current use cases. Parallel adds power but significant complexity.\n",
  "FUNCTIONALITY": "# Functionality: End-to-End Flows\n\n**Version:** 20260320 V1  \n**Description:** Core functionality specification\n\n**How things actually work, step by step.** This document bridges ARCHITECTURE (how code is organized) with DATABASE (what is stored) by describing the major workflows from trigger to completion.\n\nEach flow shows: what triggers it, what happens in sequence, what gets read, what gets written, and what the user sees.\n\n---\n\n## 1. Project Scan\n\n**Trigger:** Platform startup (first request), or user clicks \"Rescan Your Projects\" button in the Project Sub-Bar.\n\n```\nUser clicks Rescan (or first page load)\n  |\n  v\nPOST /api/scan\n  |\n  v\nScanner reads $PROJECTS_DIR\n  |\n  +---> For each directory:\n  |       |\n  |       +---> Read METADATA.md --> parse key:value fields\n  |       |       name, display_name, status, stack, port, version, tags, ...\n  |       |\n  |       +---> Read AGENTS.md --> extract sections\n  |       |       ## Bookmarks --> quick links\n  |       |       ## Service Endpoints --> service URLs\n  |       |       ## Dev Commands --> context (not stored, displayed on demand)\n  |       |\n  |       +---> Read bin/ scripts --> parse first 20 lines for headers\n  |       |       # CommandCenter Operation --> register operation\n  |       |       # Category: --> operation category\n  |       |       # Schedule: --> cron expression\n  |       |       # Port: / # Health: / # Timeout: --> operation metadata\n  |       |\n  |       +---> Check filesystem flags\n  |       |       .git/ --> has_git, then: git status, git log, git rev-list\n  |       |       venv/ --> has_venv\n  |       |       package.json --> has_node\n  |       |       CLAUDE.md --> has_claude\n  |       |       tests/ or bin/test.sh --> has_tests\n  |       |       docs/index.html --> has_docs\n  |       |       Specifications/{name}/ --> has_specs\n  |       |\n  |       +---> Upsert into `projects` table\n  |       +---> Replace rows in `operations` table for this project\n  |\n  +---> Mark projects not found on disk as is_active = false\n  |\n  v\nDashboard refreshes with updated project list\n```\n\n**Reads:** Filesystem ($PROJECTS_DIR), METADATA.md, AGENTS.md, bin/ scripts, .git/\n**Writes:** `projects` table, `operations` table\n**Event emitted:** `scan_completed`\n\n**Key behaviors:**\n- Non-blocking on startup \u2014 first page load returns immediately, scan runs async\n- Missing files produce compliance gaps, not errors \u2014 a project with only METADATA.md still appears\n- Projects removed from disk are marked `is_active = false`, not deleted\n- Git operations (status, log) run per-project \u2014 can be slow with many repos\n\n---\n\n## 2. Run Operation\n\n**Trigger:** User clicks an operation button on the dashboard or project detail.\n\n```\nUser clicks operation button (e.g., \"Start Server\")\n  |\n  v\nPOST /api/run/{op_id}\n  |\n  v\nLoad operation record from DB\n  |  --> script_path, cwd, needs_venv, category\n  |\n  v\nCreate op_runs record\n  |  status = STARTING\n  |  log_path = logs/{project}_{script}_{yyyymmdd_hhmmss}.log\n  |\n  v\nFork subprocess\n  |  cd to project directory\n  |  Activate venv if needs_venv\n  |  Execute: bash bin/{script}.sh (or python bin/{script}.py)\n  |  Redirect stdout+stderr to log_path\n  |\n  v\nUpdate op_runs: status = RUNNING, pid = process.pid\n  |\n  v\nDashboard button changes to running state (green pulse)\nNav bar shows running badge for this project\n  |\n  v\nBackground: monitor subprocess\n  |\n  +---> Parse log output for [$PROJECT_NAME] status lines\n  |       [$PROJECT_NAME] Starting: ... --> STARTING\n  |       [$PROJECT_NAME] Running: ...  --> RUNNING\n  |       [$PROJECT_NAME] Error: ...    --> flag\n  |\n  +---> On process exit:\n          |\n          +---> exit_code = 0 --> status = DONE\n          +---> exit_code != 0 --> status = ERROR\n          |\n          v\n        Update op_runs: finished_at, exit_code, status\n        Remove running badge from nav\n```\n\n**Reads:** `operations` table, project path\n**Writes:** `op_runs` table, log file\n**Events emitted:** `operation_started`, then `operation_completed` or `operation_failed`\n\n**Key behaviors:**\n- Process runs in a process group (enables clean SIGTERM of child processes)\n- Log file is append-only, named for sorting by project then time\n- common.sh/common.py in the script handles venv, PORT, env loading, SIGTERM trap\n- The platform does NOT parse or understand what the script does \u2014 it just runs it and watches exit codes\n\n---\n\n## 3. Stop Operation\n\n**Trigger:** User clicks Stop on a running operation.\n\n```\nUser clicks Stop button\n  |\n  v\nPOST /api/stop/{run_id}\n  |\n  v\nLoad op_runs record --> get pid\n  |\n  v\nSend SIGTERM to process group (-pid)\n  |  This triggers the trap in common.sh/common.py\n  |  Script performs cleanup, then exits\n  |\n  v\nProcess exits (caught by monitor from Flow 2)\n  |\n  v\nUpdate op_runs: status = STOPPED, finished_at = now\n  |\n  v\nDashboard button reverts to idle state\nRunning badge removed from nav\n```\n\n**Reads:** `op_runs` table\n**Writes:** `op_runs` table (status update)\n**Event emitted:** `operation_completed` (with STOPPED status)\n\n---\n\n## 4. Git Push\n\n**Trigger:** User clicks Push button (visible only when `git_unpushed > 0`).\n\n```\nUser clicks Push on project row\n  |\n  v\nPOST /api/push/{project_id}\n  |\n  v\nLoad project record --> get path\n  |\n  v\nExecute: git -C {path} push\n  |\n  +---> Success:\n  |       Update project: git_unpushed = 0\n  |       Flash success message\n  |       Push button disappears\n  |\n  +---> Failure:\n          Flash error with git output\n          Button remains visible\n```\n\n**Reads:** `projects` table, git remote config\n**Writes:** Remote repository, `projects` table\n**Event emitted:** `git_push` (success or failure)\n\n---\n\n## 5. Portfolio Publish\n\n**Trigger:** User clicks Rebuild or Publish on the Publisher screen, or runs scripts directly.\n\n```\nBUILD:\n  User clicks Rebuild (or runs bin/homepage_build.sh)\n    |\n    v\n  POST /publisher/build  \u2192  spawns bin/homepage_build.sh\n    |\n    v\n  Step 0: Template sync (optional)\n    |  If $SPECIFICATIONS_PATH set:\n    |    Copy $SPECIFICATIONS_PATH/GAME/templates/*.j2\n    |         \u2192 $PUBLISHER_TARGET/templates/\n    |\n    v\n  Step 1: Load config/site_config.md\n    |  YAML frontmatter --> site branding (logo, name, email, phone, copyright, ...)\n    |  Markdown body    --> site[\"home_html\"] via markdown.markdown()\n    |  Derive base_path from GITHUB_PAGES_BASE_URL\n    |\n    v\n  Step 2: Scan $PROJECTS_DIR\n    |  For each project with show_on_homepage = true in METADATA.md:\n    |    Resolve card fields (with fallbacks)\n    |    Resolve tags \u2192 {label, bg, text} dicts from data/tag_colors.json\n    |    Detect doc/ dir \u2192 docs_url\n    |\n    v\n  Step 3: Render Jinja2 templates\n    |  index.html.j2       \u2192 $PUBLISHER_TARGET/publish/index.html\n    |  projects.html.j2    \u2192 $PUBLISHER_TARGET/publish/projects/index.html\n    |  resume.html.j2      \u2192 $PUBLISHER_TARGET/publish/resume/index.html\n    |\n    v\n  Step 4: Copy static assets\n    |  static/project_images/*.webp \u2192 publish/images/\n    |  static/diagrams/*            \u2192 publish/diagrams/\n    |  project doc/ dirs            \u2192 publish/project-docs/{name}/\n    |\n    v\n  Flash \"Build complete\" with timestamp\n\nREVIEW (optional, when GAME server is not used):\n  Run bin/homepage_review.sh\n    |\n    v\n  python3 -m http.server $HOMEPAGE_PREVIEW_PORT\n    |  Serves $PUBLISHER_TARGET/publish/ at localhost:4321\n    |  Note: rebuild with GITHUB_PAGES_BASE_URL=http://localhost:4321 for accurate nav links\n\nPUBLISH:\n  User clicks Publish (or runs bin/homepage_publish.sh)\n    |\n    v\n  POST /publisher/publish  \u2192  spawns bin/homepage_publish.sh\n    |\n    v\n  cd $PUBLISHER_TARGET\n  git add -A\n  git commit -m \"Update homepage YYYY-MM-DD HH:MM\"\n  git push origin main\n    |\n    v\n  Flash publish status\n```\n\n**Reads:** `config/site_config.md`, `$PROJECTS_DIR/*/METADATA.md`, `data/tag_colors.json`, `static/`, `$PUBLISHER_TARGET/templates/`\n**Writes:** `$PUBLISHER_TARGET/publish/` (static HTML), GitHub Pages branch\n**Events emitted:** `build_completed`, `deploy_completed`\n\nSee `HOMEPAGE-PUBLISHER.md` for full build algorithm and template variable contract.\n\n---\n\n## 6. Heartbeat Poll [ROADMAP]\n\n**Trigger:** Timer-based (configurable interval, e.g., every 60 seconds). Also on-demand from Monitoring screen.\n\n```\nTimer fires (or user clicks Refresh on Monitoring)\n  |\n  v\nQuery projects WHERE port IS NOT NULL AND health_endpoint IS NOT NULL\n  |\n  v\nFor each monitored project:\n  |\n  +---> HTTP GET http://localhost:{port}{health_endpoint}\n  |       |\n  |       +---> 200 OK (within timeout):\n  |       |       state = UP\n  |       |       response_ms = elapsed\n  |       |\n  |       +---> Connection refused / timeout / error:\n  |               state = DOWN\n  |               response_ms = null\n  |\n  +---> Compare new state vs previous state\n  |       |\n  |       +---> Same state: update last_checked, response_ms\n  |       |\n  |       +---> State changed:\n  |               Record state_transition event\n  |               Update heartbeat record\n  |               If DOWN: fire alert (unless SNOOZED)\n  |               If UP (after DOWN): fire recovery alert\n  |\n  +---> Update rolling uptime_pct (24h window)\n  |\n  v\nMonitoring screen updates health table\nDashboard running indicators reflect combined state\n```\n\n**Reads:** `projects` table, HTTP endpoints\n**Writes:** `heartbeats` table, `events` table\n**Events emitted:** `state_transition` (on change), `alert_fired` (on DOWN)\n\n**States:** `UNKNOWN --> UP --> DOWN --> UP` (cycle). `SNOOZED` suppresses alerts but continues polling.\n\n---\n\n## 7. Schedule Fire [ROADMAP]\n\n**Trigger:** Cron expression match (checked every minute by scheduler loop).\n\n```\nScheduler tick (every 60 seconds)\n  |\n  v\nQuery operations WHERE schedule IS NOT NULL AND schedule_enabled = true\n  |\n  v\nFor each scheduled operation:\n  |\n  +---> Evaluate cron expression against current time\n  |       |\n  |       +---> No match: skip\n  |       |\n  |       +---> Match:\n  |               |\n  |               +---> Check last_scheduled_run\n  |               |       Already ran this minute? Skip (dedup)\n  |               |\n  |               +---> Execute Run Operation flow (Flow 2)\n  |               |\n  |               +---> Update last_scheduled_run = now\n  |               +---> Calculate next_scheduled_run\n  |\n  v\n(silent \u2014 no UI update unless user is watching Processes screen)\n\nSTARTUP CATCH-UP:\n  On platform start:\n    |\n    v\n  For each scheduled operation:\n    |\n    +---> Compare last_scheduled_run against cron expression\n    |       |\n    |       +---> Missed run(s) detected:\n    |               Fire ONE immediate run (most recent missed, no backfill cascade)\n    |               Record schedule_missed event\n    |\n    v\n  Resume normal tick loop\n```\n\n**Reads:** `operations` table (schedule, last_scheduled_run)\n**Writes:** `op_runs` table (via Flow 2), `operations` table (last/next scheduled run)\n**Events emitted:** `schedule_fired`, `schedule_missed` (on catch-up)\n\n---\n\n## 8. Ticket Lifecycle [ROADMAP]\n\n**Trigger:** User creates or moves a ticket on the Workflow screen.\n\n```\nCREATE:\n  User clicks New Ticket (on Workflow or project detail)\n    |\n    v\n  Enter title, description, tags, priority\n    |\n    v\n  Insert into tickets: state = IDEA\n    |\n    v\n  Card appears in IDEA column on Kanban board\n\nTRANSITION:\n  User drags ticket to new column (or clicks state button)\n    |\n    v\n  Validate transition is allowed:\n    IDEA --> PROPOSED (needs: summary and plan)\n    PROPOSED --> READY (needs: acceptance criteria)\n    READY --> IN DEVELOPMENT\n    IN DEVELOPMENT --> TESTING (needs: work completed)\n    TESTING --> DONE (needs: human validation)\n    TESTING --> READY (rework)\n    IN DEVELOPMENT --> PROPOSED (redesign)\n    |\n    v\n  Update ticket state\n  Record state change in ticket history\n    |\n    v\n  If entering IN DEVELOPMENT:\n    |  Begin collecting AI transaction log entries\n    |  (decisions, files changed, rationale)\n    |\n  If entering DONE:\n    |  Freeze transaction log\n    |  Ticket archived after configurable period\n    |\n    v\n  Kanban board updates, card moves to new column\n```\n\n**Reads:** `tickets` table, `workflow.json` (state definitions)\n**Writes:** `tickets` table, ticket history, transaction log\n**Events emitted:** `ticket_transition`\n\n---\n\n## 9. Configuration Edit\n\n**Trigger:** User clicks cog icon on Configuration screen, or edits inline fields.\n\n```\nUser opens field editor for a project\n  |\n  v\nGET /config or project detail editor\n  |  Load current values from DB\n  |\n  v\nUser edits field(s) and tabs out / saves\n  |\n  v\nPOST update\n  |\n  v\nUpdate `projects` table in database\n  |\n  v\nWrite changes back to METADATA.md on disk\n  |  Read current file\n  |  Find matching key: line\n  |  Replace value (or append if new key)\n  |  Write file\n  |\n  v\nFlash confirmation\n```\n\n**Reads:** `projects` table, METADATA.md file\n**Writes:** `projects` table, METADATA.md file (bidirectional sync)\n**Events emitted:** `metadata_changed`\n\n**Key behavior:** Database and METADATA.md are kept in sync. DB is the working copy (fast reads for dashboard). METADATA.md is the source of truth (survives database rebuild via rescan).\n\n---\n\n## 10. Specification Management [ROADMAP]\n\n**Trigger:** User edits specification content via the platform, or agent commits specification changes during ticket work.\n\n```\nVIEWING:\n  User clicks Specifications link on project with has_specs = true\n    |\n    v\n  Load file list from Specifications/{project_name}/\n    |\n    v\n  Display specification index with file names, last modified, sizes\n\nEDITING (via platform):\n  User opens a specification file for editing\n    |\n    v\n  Load file content, render in editor\n    |\n    v\n  User saves changes\n    |\n    v\n  Write file to Specifications/{project_name}/\n    |\n    v\n  Git commit in Specifications repo\n    |  Message: \"Update {filename} for {project_name}\"\n    |\n    v\n  Record transaction log entry:\n    |  category = change\n    |  files_affected = [{filename}]\n    |  linked to ticket (if in context)\n\nAI AGENT FLOW (during ticket IN DEVELOPMENT):\n  Agent modifies specification file as part of ticket work\n    |\n    v\n  Agent commits with descriptive message\n    |\n    v\n  On next scan: transaction log entry auto-created\n    |  Linked to active ticket for this project\n    |  Files detected via git diff\n```\n\n**Reads:** Specifications/{name}/ directory, git log\n**Writes:** Specification files, Specifications repo commits, transaction log\n**Events emitted:** `spec_updated`\n\n---\n\n## 11. Script Endpoint API [ROADMAP]\n\n**Trigger:** External caller (agent, tool, or another service) POSTs to the script endpoint by project name and script name.\n\n```\nPOST /api/{name}/run/{script}\n  |\n  v\nResolve project by name slug --> projects.name == {name}\n  |  --> 404 if project not found or is_active = false\n  |\n  v\nResolve operation by script name --> operations.cmd LIKE '%{script}%'\n  |  --> 404 if operation not registered (script missing # CommandCenter Operation header)\n  |\n  v\nDelegate to Run Operation flow (Flow 2)\n  |  Identical execution: subprocess, log file, op_runs record\n  |\n  v\nReturn JSON: { \"run_id\": N, \"status\": \"started\", \"log\": \"/api/{name}/runs/{run_id}/log\" }\n\nGET /api/{name}/runs\n  |\n  v\nQuery op_runs WHERE project_id = (SELECT id FROM projects WHERE name = {name})\nORDER BY started_at DESC LIMIT 20\n  |\n  v\nReturn JSON array of run records: run_id, script, status, started_at, finished_at, exit_code\n```\n\n**Reads:** `projects` table, `operations` table\n**Writes:** `op_runs` table, log file (via Flow 2)\n**Events emitted:** `operation_started`, `operation_completed` or `operation_failed`\n\n**Why MVP:** Reuses the entire operation engine \u2014 only new code is route parsing and the JSON response wrapper. Enables agents and external tools to trigger scripts without the UI. Required for \"AI Agent Submission\" (trigger build/test from a ticket).\n\n---\n\n## 12. Service Catalog API [ROADMAP]\n\n**Trigger:** External caller (another project, agent, or portfolio page) GETs the catalog.\n\n```\nGET /api/catalog\n  |\n  v\nSELECT name, display_name, short_description, status, port, health_endpoint,\n       stack, has_docs, card_show, deploy_url, git_repo\nFROM projects\nWHERE is_active = true\nORDER BY display_name\n  |\n  v\nReturn JSON array of project summaries\n\nGET /api/catalog/{name}\n  |\n  v\nSame fields for a single project\n  |  --> 404 if not found\n  |\n  v\nReturn JSON object\n```\n\n**Reads:** `projects` table\n**Writes:** None\n**Events emitted:** None\n\n**Why MVP:** One SELECT, no logic. Makes the dashboard's project knowledge available to agents and inter-service calls. Backs the \"Full Service Catalog\" feature \u2014 a running service can discover what other services exist, their ports, and their health endpoints without any shared config.\n\n---\n\n## 13. Project Health API [ROADMAP]\n\n**Trigger:** External caller polls per-project health; also used by dashboard to render health badges without a full page load.\n\n```\nGET /api/{name}/health\n  |\n  v\nResolve project by name slug\n  |  --> 404 if not found\n  |\n  v\nQuery heartbeats WHERE project_id = {id}\n  |  One row per heartbeat_type: service_health, process_state, git_state, compliance\n  |\n  v\nCompute aggregate status:\n  |  ALL UP/CLEAN/COMPLIANT --> \"healthy\"\n  |  ANY DOWN/ERROR         --> \"degraded\"\n  |  ANY UNKNOWN            --> \"unknown\"\n  |\n  v\nReturn JSON:\n{\n  \"name\": \"MyProject\",\n  \"aggregate\": \"healthy\" | \"degraded\" | \"unknown\",\n  \"heartbeats\": {\n    \"service_health\":  { \"state\": \"UP\", \"uptime_pct\": 99.8, \"response_ms\": 42 },\n    \"process_state\":   { \"state\": \"RUNNING\" },\n    \"git_state\":       { \"state\": \"CLEAN\" },\n    \"compliance\":      { \"state\": \"COMPLIANT\" }\n  },\n  \"checked_at\": \"20260321_143000\"\n}\n```\n\n**Reads:** `heartbeats` table, `projects` table\n**Writes:** None\n**Events emitted:** None\n\n**Why MVP:** Zero logic beyond a join \u2014 heartbeat poller already writes these rows (Flow 6). Feeds \"Project Health KPIs\" on the portfolio page and lets external monitors check project health without scraping the dashboard HTML.\n\n---\n\n## 14. Service Discovery Scan [ROADMAP]\n\n**Trigger:** Runs after project scan completes (startup or rescan). Also triggered when service manifests change.\n\n```\nProject scan completes\n  |\n  v\nScan platform services\n  |  Read GAME/services/*.service.yaml\n  |  For each manifest: parse name, description, version, transports, tools\n  |  Upsert into `services` + `service_tools` tables\n  |\n  v\nScan project services\n  |  For each managed project:\n  |    Read {project}/services/*.service.yaml\n  |    Read {project}/mcp/*.service.yaml (MCP servers)\n  |    Upsert into `services`, `service_tools`, `mcp_servers` tables\n  |\n  v\nMark removed services as is_active = 0\n  |\n  v\nService Catalog screen reflects updated service list\n```\n\n**Reads:** Service manifest YAML files from GAME and project directories\n**Writes:** `services`, `service_tools`, `mcp_servers` tables\n**Events emitted:** `service_discovered`, `service_removed`\n\n---\n\n## 15. Service Tool Dispatch [ROADMAP]\n\n**Trigger:** Any transport calls a service tool \u2014 REST, CLI, MCP, or queue drain.\n\n```\nCaller invokes tool (any transport)\n  |\n  v\nPOST /api/services/{service}/{tool}  (REST)\ngame-cli {service} {tool} ...        (CLI \u2192 REST)\nMCP tool call                        (MCP \u2192 internal Python)\nQueue drain                          (async \u2192 internal Python)\n  |\n  v\nservice_registry.dispatch_tool(service, tool, inputs)\n  |\n  v\nValidate inputs against tool schema\n  |  \u2192 400 if validation fails\n  |\n  v\nResolve handler:\n  |  Platform service (batch-runner, workflow, async-queue)\n  |    \u2192 direct Python function call\n  |  Project REST service\n  |    \u2192 proxy HTTP call to project's endpoint\n  |  MCP service\n  |    \u2192 delegate to MCP server process\n  |\n  v\nExecute handler, capture result\n  |\n  v\nReturn result in transport-native format:\n  REST \u2192 JSON response\n  CLI  \u2192 printed output (or --json)\n  MCP  \u2192 MCP tool response\n  Queue \u2192 result written to message record\n```\n\n**Reads:** `services`, `service_tools` tables, tool input schema\n**Writes:** Depends on the tool being called\n**Events emitted:** Depends on the tool\n\n**Key behavior:** All transports converge on `dispatch_tool()`. The service registry is the single entry point. This means platform services are automatically available on all enabled transports without per-transport code.\n\n---\n\n## 16. MCP Server Lifecycle [ROADMAP]\n\n**Trigger:** Developer clicks Start/Expose on Service Catalog, or GAME auto-starts on startup.\n\n```\nDeveloper clicks Expose on Service Catalog\n  |\n  v\nPOST /api/mcp/{id}/expose\n  |\n  v\nLoad mcp_servers record\n  |  \u2192 404 if not found\n  |\n  v\nAssign port from range (MCP_PORT_RANGE_START..END)\n  |  Find first unused port not in mcp_servers.assigned_port\n  |\n  v\nStart MCP server subprocess\n  |  {runtime} {entry_script} --transport sse --port {assigned_port}\n  |  Capture to log file (same pattern as ops.py)\n  |\n  v\nUpdate mcp_servers: status = running, pid, assigned_port, last_started\n  |\n  v\nGenerate .mcp.json snippet with SSE URL\n  |  Service Catalog shows: connection URL, Copy Config button\n  |\n  v\nCoworkers add the snippet to their .mcp.json\n  |  Their Claude can now call the exposed tools\n\nUNEXPOSE:\n  Developer clicks Unexpose\n    |\n    v\n  POST /api/mcp/{id}/unexpose\n    |\n    v\n  SIGTERM to MCP server process\n  Update mcp_servers: status = stopped, exposed = 0, assigned_port = NULL\n```\n\n**Reads:** `mcp_servers`, `services` tables\n**Writes:** `mcp_servers` table, log file\n**Events emitted:** `mcp_started`, `mcp_stopped`, `mcp_exposed`, `mcp_unexposed`\n\n---\n\n## 17. Workflow Transition [ROADMAP]\n\n**Trigger:** Service call to `workflow/transition` from any transport, or drag on Kanban board.\n\n```\nCaller requests transition\n  |  workflow_id, to_state, comment (optional), payload (optional)\n  |\n  v\nLoad workflow instance + template\n  |  \u2192 404 if workflow not found\n  |\n  v\nValidate transition\n  |  Current state's transitions list must include to_state\n  |  Template may define `requires` fields for certain transitions\n  |  \u2192 400 with error message if invalid\n  |\n  v\nUpdate workflow_instances.current_state = to_state\n  |\n  v\nInsert workflow_history row\n  |  from_state, to_state, comment, transition_payload, timestamp\n  |\n  v\nEmit event\n  |  event_type: workflow_transition\n  |  summary: \"{workflow_name}: {from} \u2192 {to}\"\n  |  detail: JSON with workflow_id, template, project, states, comment\n  |\n  v\nReturn new state to caller\n  |\n  v\nIf Kanban board is open: HTMX swap moves the card\n```\n\n**Reads:** `workflow_instances`, `workflow_templates` tables\n**Writes:** `workflow_instances` (state update), `workflow_history` (append), `events` (append)\n**Events emitted:** `workflow_transition`\n\n---\n\n## 18. AsyncQueue Drain [ROADMAP]\n\n**Trigger:** GAME startup (after scan + service discovery), manual `POST /api/services/async-queue/drain`, or scheduler cron job.\n\n```\nDrain triggered\n  |\n  v\nList queue files: data/queues/*.queue.jsonl\n  |  (or single queue if queue= parameter specified)\n  |\n  v\nFor each queue file:\n  |\n  +---> Read all lines, parse JSON\n  |\n  +---> Filter: status = pending\n  |       Check TTL \u2192 mark expired messages as \"expired\"\n  |\n  +---> Sort: priority (critical > high > normal > low), then submitted_at (oldest first)\n  |\n  +---> For each pending message:\n  |       |\n  |       +---> Set status = processing\n  |       |\n  |       +---> Resolve service + tool from service registry\n  |       |       \u2192 mark as error if service/tool not found\n  |       |\n  |       +---> dispatch_tool(service, tool, payload)\n  |       |       |\n  |       |       +---> Success:\n  |       |       |       status = done\n  |       |       |       result = tool output\n  |       |       |       processed_at = now\n  |       |       |\n  |       |       +---> Failure:\n  |       |               status = error\n  |       |               error = message\n  |       |               Check retry count \u2192 requeue as pending if retries remain\n  |       |\n  |       +---> Rewrite message line in queue file\n  |\n  +---> If queue file > 1000 lines or 1MB:\n          Rotate completed messages to archive/\n          Rewrite active file with pending/processing only\n\nSummary:\n  Processed: N, Succeeded: N, Failed: N, Expired: N\n```\n\n**Reads:** Queue JSONL files, `queue_config.yaml`, `services` table\n**Writes:** Queue JSONL files (status updates), archive files (rotation), `events` table\n**Events emitted:** `queue_drained`\n\n**Key behavior:** Drain is idempotent \u2014 running it twice processes nothing if all messages are already done. Failed messages with retries remaining are reset to pending for the next drain cycle.\n\n---\n\n## Flow Summary\n\n| # | Flow | Trigger | Implemented |\n|---|------|---------|-------------|\n| 1 | Project Scan | Startup / Rescan button | Yes |\n| 2 | Run Operation | Operation button click | Yes |\n| 3 | Stop Operation | Stop button click | Yes |\n| 4 | Git Push | Push button click | Yes |\n| 5 | Portfolio Publish | Rebuild / Publish buttons | Yes |\n| 6 | Heartbeat Poll | Timer / Monitoring refresh | ROADMAP |\n| 7 | Schedule Fire | Cron tick / startup catch-up | ROADMAP |\n| 8 | Ticket Lifecycle | Create / drag ticket | Partial |\n| 9 | Configuration Edit | Cog icon / inline edit | Yes |\n| 10 | Specification Management | Specification link / agent commit | ROADMAP |\n| 11 | Script Endpoint API | External POST to /api/{name}/run/{script} | ROADMAP |\n| 12 | Service Catalog API | External GET /api/catalog | ROADMAP |\n| 13 | Project Health API | External GET /api/{name}/health | ROADMAP |\n| 14 | Service Discovery Scan | After project scan | ROADMAP |\n| 15 | Service Tool Dispatch | REST / CLI / MCP / Queue drain | ROADMAP |\n| 16 | MCP Server Lifecycle | Expose / Unexpose / Start / Stop | ROADMAP |\n| 17 | Workflow Transition | Service call or Kanban drag | ROADMAP |\n| 18 | AsyncQueue Drain | Startup / Manual / Scheduler | ROADMAP |\n\n---\n\n## Cross-Cutting Concerns\n\n### Event Emission\n\nEvery flow emits events (see DATABASE.md \u2192 events). Events are written to the `events` table and surfaced on:\n- Monitoring screen (platform-wide timeline)\n- Project detail (per-project event log)\n\n### Error Handling\n\nAll flows follow the same pattern:\n- Catch exceptions at the route level\n- Flash error message to user\n- Log to platform log (not project log)\n- Never crash the platform \u2014 a single project failure must not affect others\n\n### HTMX Partial Updates\n\nFlows that change UI state return HTML fragments, not full pages:\n- Run/Stop --> updated button state fragment\n- Push --> updated git status fragment\n- Scan --> status message fragment\n- Config edit --> updated row fragment\n\nThe browser replaces the targeted DOM element. No full page reload unless navigating to a different screen.\n\n### Concurrency\n\n- Only one instance of a given operation can run per project at a time\n- Multiple different operations can run simultaneously across projects\n- Scanner runs async \u2014 dashboard is usable during scan\n- Heartbeat poller runs on its own timer, independent of user actions\n- Scheduler runs on its own timer, independent of heartbeat poller\n- Service discovery runs after project scan \u2014 sequential dependency\n- Queue drain is single-threaded per queue \u2014 messages processed in order\n- MCP servers run as independent subprocesses \u2014 one per exposed service\n- Workflow transitions are atomic per instance \u2014 no concurrent transitions on the same workflow\n\n## Open Questions\n\n- Flow 8 (Ticket Lifecycle): The AI agent integration trigger mechanism for READY tickets is unspecified \u2014 needs FEATURE-AI-SUBMISSION.md or a concrete webhook/API design.\n- Flow 10 (Specification Management): The agent commit auto-detection (linking specification changes to active tickets via git diff) requires a scan-triggered diff check not currently in the scanner. Needs design.\n",
  "HOMEPAGE-PUBLISHER": "# Feature: Homepage Publisher\n\n**Version:** 20260331.1\n**Description:** Template-based static site builder for the portfolio homepage. Replaces the Astro/npm pipeline with Jinja2 rendering to plain HTML.\n\n---\n\n## Architecture\n\n```\nSPECIFICATION/templates/    \u2190 Specifications/GAME/templates/*.j2   (canonical source)\n        \u2193  sync on build (when SPECIFICATIONS_PATH is set)\nTARGET/templates/           \u2190 $PUBLISHER_TARGET/templates/*.j2     (working templates)\n        \u2193  homepage_build.sh renders with data\nTARGET/publish/             \u2190 $PUBLISHER_TARGET/publish/            (static HTML payload)\n        \u2193  homepage_publish.sh \u2192 git push origin main\nGitHub Pages\n```\n\n- **No Astro, no npm** in this pipeline. All CSS lives in `base.html.j2`. Output is plain HTML.\n- **PUBLISHER_TARGET** = configurable directory pointed at by the env var. Default: sibling `My_Github/`. Can be `GAME/site/` or any directory on install.\n- **TARGET/publish/** is a subdirectory of the TARGET git repo. `homepage_publish.sh` commits and pushes from the TARGET root.\n\n---\n\n## Template Directory Structure\n\n```\nSpecifications/GAME/templates/\n\u251c\u2500\u2500 base.html.j2        Full page shell: head, global CSS, nav, Mermaid CDN, footer\n\u251c\u2500\u2500 index.html.j2       Home page: name + home_html body\n\u251c\u2500\u2500 projects.html.j2    Projects grid: card grid from scanned METADATA.md\n\u251c\u2500\u2500 _card.html.j2       Single project card partial (included by projects.html.j2)\n\u2514\u2500\u2500 resume.html.j2      Resume page\n```\n\nTemplates are installed to `TARGET/templates/` and render to `TARGET/publish/`:\n\n| Template | Output path |\n|----------|-------------|\n| `index.html.j2` | `publish/index.html` |\n| `projects.html.j2` | `publish/projects/index.html` |\n| `resume.html.j2` | `publish/resume/index.html` |\n\n---\n\n## Jinja2 Variable Contract\n\n### Shared context (passed to all t
