emplates)\n\n```python\nsite = {\n    \"logo\":             str,   # nav logo text, e.g. \"Ed Barlow\"\n    \"name\":             str,   # h1 on home page, contact card name\n    \"email\":            str,   # mailto link\n    \"phone\":            str,   # display format, e.g. \"(914) 837-4798\"\n    \"phone_e164\":       str,   # tel: link format, e.g. \"+19148374798\"\n    \"copyright\":        str,   # footer text, e.g. \"Web Cloud Studio \u2014 Ed Barlow\"\n    \"section_title\":    str,   # projects page h1\n    \"section_subtitle\": str,   # projects page subheading; empty string if not set\n    \"home_html\":        str,   # HTML rendered from site_config.md markdown body\n}\n\nbase_path = str    # URL path prefix derived from GITHUB_PAGES_BASE_URL\n                   # \"https://example.github.io/sitename\" \u2192 \"/sitename\"\n                   # \"\" (empty string) for root-served sites or local preview\nbuild_year = int   # datetime.now().year, used in footer\n```\n\n### projects.html.j2 additional context\n\n```python\nprojects = [\n    {\n        \"name\":       str,   # project directory name, e.g. \"GAME\"\n        \"card_title\": str,\n        \"card_desc\":  str,   # may be empty string\n        \"card_url\":   str,   # external/detail link; empty string if none\n        \"card_image\": str,   # absolute path, e.g. \"/sitename/images/GAME.webp\"\n        \"docs_url\":   str,   # absolute path to docs index; empty string if none\n        \"tags\": [\n            {\n                \"label\": str,  # tag text\n                \"bg\":    str,  # hex background color, e.g. \"#22c55e18\"\n                \"text\":  str,  # hex text color, e.g. \"#4ade80\"\n            },\n        ],\n    },\n    ...\n]\n```\n\n**Tags use inline styles, not CSS class names.** Template renders:\n```html\n<span class=\"tag\" style=\"background:{{ tag.bg }};color:{{ tag.text }};\">{{ tag.label }}</span>\n```\nThis avoids the broken `tag--{dict}` class name bug present in the Astro pipeline where `tag_colors.json` values (dicts) were incorrectly used as class name strings.\n\n### resume.html.j2 additional context\n\n```python\nresume_html = str   # HTML rendered from static/contents/Edward_Barlow.md\n```\n\n---\n\n## Tag Color Resolution\n\nThe build script resolves tags at data-prep time, not in templates:\n\n```python\ndef resolve_tag(label: str, tag_colors: dict) -> dict:\n    \"\"\"Returns {\"label\": label, \"bg\": \"#hex\", \"text\": \"#hex\"}.\n    tag_colors keys are tag labels; values are {\"bg\": \"#hex\", \"text\": \"#hex\"} dicts.\n    \"\"\"\n    for key, colors in tag_colors.items():\n        if key.lower() == label.strip().lower():\n            return {\"label\": label, \"bg\": colors[\"bg\"], \"text\": colors[\"text\"]}\n    return {\"label\": label, \"bg\": \"#64748b18\", \"text\": \"#94a3b8\"}  # neutral fallback\n```\n\n---\n\n## Script Specifications\n\n### `bin/homepage_build.sh` (wrapper) + `bin/homepage_build.py` (logic)\n\n**Inputs:**\n\n| Source | Content |\n|--------|---------|\n| `config/site_config.md` | YAML frontmatter (branding) + Markdown body (bio HTML) |\n| `$PROJECTS_DIR/*/METADATA.md` | One per project; scanned for `show_on_homepage: true` |\n| `data/tag_colors.json` | Tag color definitions `{\"tags\": {\"label\": {\"bg\": \"#hex\", \"text\": \"#hex\"}}}` |\n| `static/project_images/*.webp` | Card images |\n| `static/diagrams/` | Diagram assets |\n| `static/contents/Edward_Barlow.md` | Resume source |\n| `$PUBLISHER_TARGET/templates/*.j2` | Jinja2 templates |\n\n**Outputs:**\n\n| Path | Content |\n|------|---------|\n| `$PUBLISHER_TARGET/publish/index.html` | Home page |\n| `$PUBLISHER_TARGET/publish/projects/index.html` | Projects grid |\n| `$PUBLISHER_TARGET/publish/resume/index.html` | Resume page |\n| `$PUBLISHER_TARGET/publish/images/*.webp` | Card images (copied) |\n| `$PUBLISHER_TARGET/publish/diagrams/` | Diagrams (copied) |\n| `$PUBLISHER_TARGET/publish/project-docs/{name}/` | Per-project doc dirs (copied) |\n\n**Build algorithm:**\n\n```\nStep 0: Template sync (optional)\n  If $SPECIFICATIONS_PATH is set:\n    Copy $SPECIFICATIONS_PATH/GAME/templates/*.j2 \u2192 $PUBLISHER_TARGET/templates/\n  Else:\n    Use $PUBLISHER_TARGET/templates/ as-is.\n    Warn and abort if directory is missing or empty.\n\nStep 1: Load site config\n  Parse YAML frontmatter from config/site_config.md (apply _SITE_CONFIG_DEFAULTS for missing keys)\n  Render Markdown body \u2192 site[\"home_html\"] via markdown.markdown(body, extensions=[\"extra\"])\n  Derive base_path:\n    Strip domain from GITHUB_PAGES_BASE_URL\n    \"https://example.github.io/sitename\" \u2192 \"/sitename\"\n    \"\" (empty) if GITHUB_PAGES_BASE_URL is unset or is a plain domain with no path\n\nStep 2: Scan projects\n  Load tag_colors from data/tag_colors.json (key: \"tags\")\n  For each subdirectory of $PROJECTS_DIR (sorted alphabetically):\n    Skip if no METADATA.md\n    Parse METADATA.md key:value fields\n    Skip if show_on_homepage != true (log: skipped)\n    Resolve card_image URL:\n      Bare filename \u2192 base_path + \"/images/{filename}\"\n      {{PROJECT_NAME}} or raw.githubusercontent.com \u2192 base_path + \"/images/{name}.webp\"\n      Already absolute URL \u2192 keep as-is\n    Parse card_tags: comma-separated string or JSON array\n    Resolve each tag label \u2192 {\"label\", \"bg\", \"text\"} via resolve_tag()\n    Detect doc dir: check project/doc/index.html, doc/index.htm, docs/index.html, docs/index.htm\n    Set docs_url = base_path + \"/project-docs/{name}/index.html\" if doc found; else \"\"\n    Store _doc_src_dir for Step 5\n\nStep 3: Render templates\n  Load Jinja2 Environment:\n    FileSystemLoader from $PUBLISHER_TARGET/templates/\n    autoescape=False (content includes pre-rendered HTML)\n  Build shared context: site=site_config, base_path=base_path, build_year=current_year\n  Render index.html.j2    \u2192 publish/index.html        (shared context)\n  Render projects.html.j2 \u2192 publish/projects/index.html (shared context + projects=[...])\n  Render resume.html.j2   \u2192 publish/resume/index.html   (shared context + resume_html=...)\n  Create parent directories as needed (os.makedirs exist_ok=True)\n\nStep 4: Copy static assets\n  static/project_images/*.webp \u2192 publish/images/\n  static/diagrams/*            \u2192 publish/diagrams/\n  static/contents/*.pdf        \u2192 publish/\n\nStep 5: Copy project docs\n  For each project card where _doc_src_dir is set:\n    dst = $PUBLISHER_TARGET/publish/project-docs/{name}/\n    Delete dst if exists (rmtree)\n    Copy _doc_src_dir \u2192 dst (copytree)\n    Rename index.htm \u2192 index.html at destination if needed\n\nStep 6: Print summary\n  List written files; print elapsed time; exit 0\n```\n\n**Python dependencies** (already in GAME venv): `jinja2`, `pyyaml`, `markdown`\n\n---\n\n### `bin/homepage_review.sh`\n\nServes `$PUBLISHER_TARGET/publish/` locally via Python's built-in HTTP server.\n\n```bash\nPREVIEW_PORT=\"${HOMEPAGE_PREVIEW_PORT:-4321}\"\ncd \"$PUBLISHER_TARGET/publish\"\npython3 -m http.server \"$PREVIEW_PORT\"\n```\n\n**Local preview note:** `base_path` is derived from `GITHUB_PAGES_BASE_URL`. When that URL has a path prefix (e.g., `/webcloudstudio`), all nav links will 404 against a root-served local server.\n\n**Workaround:** Before running review, rebuild with `GITHUB_PAGES_BASE_URL=http://localhost:4321` so `base_path` becomes empty and all links are root-relative. A `HOMEPAGE_PREVIEW_BASE_URL` env var can be added to override the base_path derivation for local preview without changing the production URL setting.\n\n---\n\n### `bin/homepage_publish.sh`\n\nCommits and pushes `$PUBLISHER_TARGET` to GitHub Pages.\n\n```bash\ncd \"$PUBLISHER_TARGET\"\ngit add -A\ngit commit -m \"Update homepage $(date '+%Y-%m-%d %H:%M')\" || true\ngit push origin main\n```\n\n**Git convention:** remote `origin`, branch `main`. The timestamp in the commit message ensures sequential publishes always produce a non-empty commit.\n\n**Precondition:** `$PUBLISHER_TARGET` must be a git repository with `origin` remote pointing to the GitHub Pages repo.\n\n---\n\n## Environment Variables\n\n| Variable | Required | Default | Purpose |\n|----------|----------|---------|---------|\n| `PUBLISHER_TARGET` | Yes | `$(dirname $GAME_DIR)/My_Github` | Path to the TARGET directory |\n| `PROJECTS_DIR` | Yes | \u2014 | Path containing all project repos |\n| `GITHUB_PAGES_BASE_URL` | No | `\"\"` | Full URL; drives `base_path` derivation |\n| `SPECIFICATIONS_PATH` | No | \u2014 | If set, templates are synced from specification on each build |\n| `HOMEPAGE_PREVIEW_PORT` | No | `4321` | Port for `homepage_review.sh` |\n\n---\n\n## Deprecated Scripts\n\n| Old script | Replaced by |\n|-----------|-------------|\n| `bin/RebuildYourHomepage.sh` | `bin/homepage_build.sh` |\n| `bin/LocalPreview.sh` | `bin/homepage_review.sh` |\n| `bin/PushAndPublish.sh` | `bin/homepage_publish.sh` |\n\nThe old scripts called `publisher.rebuild_pages()` which generated Astro `.astro` source files and required `npm run build`. The new scripts have no npm dependency.\n\n---\n\n## Data Sources (Resolved)\n\n| Data | Source | Notes |\n|------|--------|-------|\n| Site branding & bio | `GAME/config/site_config.md` | YAML frontmatter + Markdown body. Stays in GAME project, not Specifications repo. |\n| Tag colors | `GAME/data/tag_colors.json` | Resolved to inline style attributes at build time, not CSS classes |\n| Image URLs | Derived at build time | `base_path + \"/images/{name}.webp\"` |\n| Resume content | `GAME/static/contents/Edward_Barlow.md` | Rendered to HTML; injected as `resume_html` |\n\n---\n\n## Open Question\n\n**publish/ git repository structure:**\n\n- **Option A (default):** `publish/` is a subdirectory of `PUBLISHER_TARGET`. Commit and push happen at `PUBLISHER_TARGET` root. Lowest-friction migration \u2014 `My_Github/` already has the right git remote; `publish/` replaces the Astro `dist/` subdirectory.\n- **Option B:** `publish/` is itself a standalone git repo with its own `origin` remote pointing directly to the GitHub Pages source. Cleaner separation; requires re-initializing a git repo in `publish/`.\n\nSpecification default: Option A. Document Option B as an advanced configuration in `.env.sample`.\n",
  "HOMEPAGE": "# Homepage\n\n**Version:** 20260326.1\n**Description:** Portfolio homepage branding, contact details, and bio content for the Publisher screen\n\n## Branding\n\n```\nlogo:              Ed Barlow\nname:              Ed Barlow\ncopyright:         Web Cloud Studio \u2014 Ed Barlow\nsection_title:     My Projects\nsection_subtitle:\n```\n\n## Contact\n\n```\nemail:      edward.m.barlow@gmail.com\nphone:      (914) 837-4798\nphone_e164: +19148374798\n```\n\n## Bio\n\n**AI Assisted Developer**\n\nMy Methods can one shot small and mid sized projects with prebuilt technical guidance.\nMy Methods provide standards conformity:\n\n- Workflow And Specification Based Design\n- Scaled Automation and Monitoring\n- Seamless Standard Conformity\n- Metrics\n\n**Principal Engineer/Director** at major hedge funds, investment banks, and startups\n\n**Author, Speaker, Game Developer, Data Engineer**\n\n## Feature Workflow\n\n![Feature Workflow](/webcloudstudio/diagrams/v3-feature-workflow.png)\n\n## Project Definition\n\n![Project Definition](/webcloudstudio/diagrams/v3-project-definition.png)\n\n## AI Workflow\n\n![AI Workflow](/webcloudstudio/diagrams/v3-ai-workflow.png)\n\n## Notes\n\n- Site config is read from `GAME/config/site_config.md` (the project's own directory, not the Specifications repo). `HOMEPAGE.md` in the Specifications repo is the human-readable reference for branding values; `site_config.md` is the live editable source.\n- Image paths are `base_path`-relative absolute paths (e.g., `/sitename/images/name.webp`), generated at build time by `homepage_build.py` using the `GITHUB_PAGES_BASE_URL` env var.\n\nSee `HOMEPAGE-PUBLISHER.md` for the full build specification.\n",
  "IDEAS": "# Ideas\n\n**Version:** 20260323 V1\n**Purpose:** Low-friction inbox for raw ideas. Process into specifications, then delete.\n\n> Format: One idea per bullet. No formatting required. Claude processes these into ACCEPTANCE_CRITERIA.md, REFERENCE_GAPS.md, or direct specification edits when told \"process ideas\" or \"update the specification\". Processed ideas are deleted from this file.\n\n---\n",
  "INTENT": "## Intent\n\n**Purpose 1: Dashboard for the Project Owner**\n\nManage projects you want to keep around and update \u2014 software, books, or any project type. See everything in one place: status, health, operations, logs, documentation.\n\n**Purpose 2: Conform projects to standards**\n\nStandard workflow benefits any Technical Product Owner:\n- One-shot project creation from templates\n- Project conformity via CLAUDE_RULES injection\n- Conformed projects expose: Start/Stop, Operations, Health, Logging, Documentation, Testing\n- Exposed capabilities appear automatically in the dashboard\n\n**Purpose 3: Prototype workflow**\n\n- Feature tickets tracked from idea to done\n- AI transaction logs capture decisions and rationale\n- Specification management links specifications to running code",
  "METADATA": "# GAME\n\nGeneric AI-assisted projects and prototypes Management Environment.\n\nname: GAME\ndisplay_name: GAME\ntitle: GAME \u2014 Generic AI Management Environment\ngit_repo: GAME\nshort_description: Dashboard for managing, monitoring, and operating AI-assisted projects\nport: 5001\nversion: 2026-03-20.1\nupdated: 20260320\nstatus: PROTOTYPE\nstack: Python/Flask/SQLite/Bootstrap5\nhealth: /health\nshow_on_homepage: true\ntags: dashboard, tool, platform\ndesired_state: on-demand\nnamespace: development\ndescription:Simple Product Framework For Project Owners \n",
  "README": "# GAME \u2014 Generic AI Management Environment\n\nA dashboard for project owners managing AI-assisted prototypes.\n\nCommon built-in standards provide enterprise features out of the box. Projects conform to a simple set of development best practices which your agent implements for you. Each project has a minimal configured set of instructions in its rules which expose operations, endpoints, capabilities, documentation, and command-and-control in a standard way.\n\n## The Prototyper Application\n\n- Flask UI with configurable snap-in screens\n- Best-practice screens for managing all project features\n- Filter and sort by project, status, tags, namespace\n- Simple elegant design \u2014 form follows function, less is more\n\n## Stack\n\n- **Language:** Python\n- **Framework:** Flask (app factory, blueprints, HTMX for partial updates)\n- **Database:** SQLite (WAL mode, single file at `data/prototyper.db`)\n- **Frontend:** Bootstrap 5 (dark theme, CDN)\n- **Port:** 5001\n\nEach stack component maps to a prescriptive reference file in `../RulesEngine/stack/`.\n\n## Specifications\n\nAll project integration standards are defined in `../RulesEngine/CLAUDE_RULES.md`.\n\n| Document | Answers |\n|----------|---------|\n| **FUNCTIONALITY.md** | End-to-end flows: trigger \u2192 sequence \u2192 result |\n| **ARCHITECTURE.md** | How is code organized? Modules, routes, data flow |\n| **DATABASE.md** | Tables, columns, constraints, field sources |\n| **UI-GENERAL.md** | Shared UI patterns: nav bar, headers, dark theme, HTMX |\n| **SCREEN-*.md** | Per-screen: route, layout, interactions |\n\n**Flow:** ARCHITECTURE describes modules \u2192 DATABASE defines storage \u2192 UI-GENERAL defines shared patterns \u2192 SCREEN-* defines per-screen layout.\n\n## Building From This Specification\n\n```bash\nbash ../bin/validate.sh GAME\nbash ../bin/oneshot.sh GAME > build-prompt.md\n```\n\nThe generated prompt includes all stack reference files followed by all specification files. An AI agent reading this prompt has everything needed to build GAME from scratch.\n",
  "REFERENCE_GAPS": "# Reference Gaps\n\n**Version:** 20260326 V3\n**Build-ref:** oneshot/GAME/2026-03-26.1\n**Purpose:** Features not yet specified, organized by target specification file. Drives iteration priority.\n\n> Format: Sections are specification filenames. `(NEW)` = file does not exist yet. Each gap is a checkbox: `- [ ]` open, `- [x]` specified. Include GAME reference file, priority (P0=critical \u2192 P10=someday), and one-line description.\n\n## Priority Levels\n\n| Level | Meaning |\n|-------|---------|\n| P0 | Must have \u2014 blocks other work |\n| P1 | Must have \u2014 core feature gap |\n| P2 | Should have \u2014 important for quality |\n| P3 | Should have \u2014 operational feature |\n| P4 | Should have \u2014 testing/validation |\n| P5 | Nice to have \u2014 analytics/intelligence |\n| P6 | Nice to have \u2014 specification tooling |\n| P7 | Nice to have \u2014 publishing polish |\n| P8 | Someday \u2014 infrastructure improvements |\n| P9\u2013P10 | Backlog |\n\n---\n\n## FUNCTIONALITY.md\n\n- [x] **P0 \u2014 Service Catalog API (Flow 12):** `GET /api/catalog` returns every project, its endpoints, bin/ scripts, health path, port. Specified in FEATURE-SERVICE-CATALOG.md.\n- [x] **P0 \u2014 Script Endpoint API (Flow 11):** `POST /api/{name}/run/{script}` exposes bin/ scripts as REST. Specified in FEATURE-SERVICE-CATALOG.md.\n- [x] **P0 \u2014 Project Health API (Flow 13):** `GET /api/{name}/health` proxies to each project's health endpoint. Specified in FEATURE-HEALTHCHECK.md.\n- [ ] **P0 \u2014 CLI/Bash Gateway:** `bin/game-cli.sh` wrapper for catalog, run, health commands from bash without curl. No specification yet.\n- [x] **P2 \u2014 Heartbeat Polling (Flow 6):** Background poller fully specified in FEATURE-HEALTHCHECK.md (concurrent threading, state transitions, uptime_pct).\n- [x] **P3 \u2014 Schedule Fire (Flow 7):** Cron loop specified in SCREEN-DASHBOARDS-SCHEDULER.md; startup catch-up in FUNCTIONALITY.md Flow 7.\n- [x] **P3 \u2014 Missed-Run Recovery:** FUNCTIONALITY.md Flow 7 startup catch-up fires ONE immediate run for each missed schedule.\n- [ ] **P3 \u2014 Dynamic Port Management:** Track ports in use, detect conflicts at scan time. Not yet specified.\n\n## ARCHITECTURE.md\n\n- [x] **P1 \u2014 monitoring.py / healthcheck.py module:** Full `Health Monitor (monitoring.py)` section now in ARCHITECTURE.md with poller thread, log ingestor thread, and provided functions.\n- [x] **P1 \u2014 scheduler.py module:** Full `Scheduler (scheduler.py)` section now in ARCHITECTURE.md with cron loop, catch-up logic, and provided functions.\n- [x] **P1 \u2014 Routes table update:** Routes table in ARCHITECTURE.md now includes all FEATURE-SERVICE-CATALOG and FEATURE-HEALTHCHECK routes (lines 115\u2013125).\n- [ ] **P8 \u2014 Request timing middleware:** Log requests >50ms.\n- [ ] **P8 \u2014 TTL caches:** Cache workflow states and tag colors (30s).\n- [ ] **P8 \u2014 Dead process cleanup:** Detect stale PIDs, mark op_runs as error.\n\n## DATABASE.md\n\n- [x] **P1 \u2014 Add FEATURE-HEALTHCHECK tables:** `health_check_log`, `log_positions`, `log_filter` now documented in DATABASE.md schema section with summary table and retention notes.\n- [x] **P1 \u2014 Promote tag_colors to DB table:** Full `tag_colors` schema now in DATABASE.md; migration path from `data/tag_colors.json` documented.\n- [ ] **P1 \u2014 has_tests and has_specs flags:** Remain in DATABASE.md Open Questions only \u2014 not yet added to the `projects` table schema or Field Source Mapping table.\n- [ ] **P3 \u2014 git_last_commit_date column:** Still in Open Questions \u2014 not added to projects table schema. Requires `git log` during scan.\n- [x] **P8 \u2014 Database migrations:** `_add_column_if_missing()` pattern documented in DATABASE.md Conventions section.\n\n## SCREEN-SETTINGS-LOGFILTER.md (NEW)\n\n- [ ] **P2 \u2014 Log filter rule editor:** `log_filter` table is defined in FEATURE-HEALTHCHECK.md with seed rules, but no UI screen exists to view, edit, add, or reorder classification rules. Needed for production tuning.\n\n## SCREEN-PROTOTYPES-DETAIL.md (NEW)\n\n- [ ] **P2 \u2014 Prototype detail view:** `GET /prototypes/{name}` is referenced in SCREEN-PROTOTYPES.md but has no specification. Should show parsed specification files as a rendered HTML index with file list, Open Questions, and links to the oneshot flow.\n\n## SCREEN-SETTINGS-WORKFLOWS.md (NEW)\n\n- [ ] **P3 \u2014 Workflow type management screen:** `workflow_types` table is seeded on startup; SCREEN-PROJECTS-WORKFLOW.md notes \"until that screen exists, types are edited directly in the DB.\" Needs a proper settings screen for CRUD on workflow type definitions.\n\n## SCREEN-HOMEPAGE.md\n\n- [x] **P1 \u2014 Publish edit page:** Cover is provided by the SCREEN-HOMEPAGE.md Build/Publish/Preview/Homepage sections. Per-project card editing is handled via Configuration screen (`card_show`, `card_title`, etc.).\n- [ ] **P1 \u2014 Publish preview:** Local Astro preview server start/stop at port 4321. SCREEN-HOMEPAGE.md references this but `bin/LocalPreview.sh` is not specified.\n- [ ] **P7 \u2014 Card image generation:** `bin/generate_card_images.py` not yet specified.\n\n## SCREEN-PROJECTS-VALIDATION.md\n\n- [ ] **P2 \u2014 Schedule nightly validation:** `Validate All` triggered automatically on schedule. Not yet wired to scheduler. When specified, add a `validation_schedule` key to settings table and reference FUNCTIONALITY.md Flow 7.\n\n## SCREEN-DASHBOARDS-WORKFLOW.md\n\n- [ ] **P2 \u2014 AI agent submission mechanism:** READY tickets can be \"submitted to an AI agent\" but the trigger mechanism (queue, webhook, API call to Claude) is unspecified. Needs a concrete flow or FEATURE-AI-SUBMISSION.md.\n\n## tests/ (no specification file needed)\n\n- [ ] **P4 \u2014 Test framework:** Create `tests/` with conftest.py, fixtures (app, client, db).\n- [ ] **P4 \u2014 Unit tests \u2014 db layer:** init_db, query, execute, upsert, migrations.\n- [ ] **P4 \u2014 Unit tests \u2014 scanner:** detect_project, parse_metadata_md, scan_bin_operations.\n- [ ] **P4 \u2014 Unit tests \u2014 operations:** launch, stop, monitor, log capture.\n- [ ] **P4 \u2014 Unit tests \u2014 routes:** All API endpoints.\n- [ ] **P4 \u2014 Unit tests \u2014 publisher:** build_portfolio, card metadata.\n- [ ] **P4 \u2014 Unit tests \u2014 claude_convention:** parse_agents_md, @AGENTS.md redirect.\n- [ ] **P4 \u2014 Integration tests:** scan \u2192 discover \u2192 run \u2192 check \u2192 view log.\n\n## bin/ scripts (no specification file needed)\n\n- [ ] **P0 \u2014 Published API docs:** Auto-generate API reference at `/api/docs`. No specification yet.\n- [ ] **P3 \u2014 bin/test.sh:** Run test suite.\n- [ ] **P3 \u2014 bin/PushAndPublish.sh:** Full GitHub Pages publish pipeline (referenced in FUNCTIONALITY.md Flow 5, not yet a formal script specification).\n- [ ] **P3 \u2014 bin/LocalPreview.sh:** Astro preview server (referenced in SCREEN-HOMEPAGE.md).\n- [ ] **P6 \u2014 bin/create_project.py:** Scaffold new projects from templates (lives in GAME project, referenced from Specifications AGENTS.md).\n\n## Unspecified Features (backlog)\n\n- [ ] **P5 \u2014 Usage analytics:** `usage_analyzer.py` (454 LOC). Token tracking, cost estimation, HTML reports.\n- [ ] **P5 \u2014 AI Transaction Log UI:** `ai_decisions` table exists in DATABASE.md; no screen renders it outside of ticket detail.\n- [ ] **P5 \u2014 Health KPIs dashboard:** Compliance, uptime, self-test, specification-drift aggregated in one view. Partially covered by SCREEN-PROJECTS-VALIDATION.md.\n- [ ] **P6 \u2014 Specification-to-code traceability:** Specifications \u2192 commits \u2192 tickets linked.\n- [ ] **P7 \u2014 Consistent doc branding:** Standard structure across all projects.\n- [ ] **P9 \u2014 Smart git commits:** Descriptive labels, auto-commit integration.\n- [ ] **P9 \u2014 Secrets management:** Detect/protect .env files, warn on commit.\n\n---\n\n## Closed\n\n| Gap | Resolved in | Date |\n|-----|-------------|------|\n| P0 Service Catalog API | FEATURE-SERVICE-CATALOG.md | 2026-03-23 |\n| P0 Script Endpoint API | FEATURE-SERVICE-CATALOG.md | 2026-03-23 |\n| P0 Project Health API | FEATURE-HEALTHCHECK.md | 2026-03-23 |\n| P2 Heartbeat Polling | FEATURE-HEALTHCHECK.md | 2026-03-23 |\n| P3 Schedule Fire | SCREEN-DASHBOARDS-SCHEDULER.md | 2026-03-25 |\n| P3 Missed-Run Recovery | FUNCTIONALITY.md Flow 7 | 2026-03-20 |\n| P1 Tag management screen | SCREEN-SETTINGS-TAG.md | 2026-03-25 |\n| P1 Settings screen | SCREEN-SETTINGS-GENERAL.md | 2026-03-26 |\n| P5 Project Maturity Scorecard | SCREEN-PROJECTS-VALIDATION.md (conformity levels) | 2026-03-25 |\n| P6 Specification management | SCREEN-PROTOTYPES.md + SCREEN-PROJECTS-WORKFLOW.md | 2026-03-24 |\n| P1 monitoring.py module | ARCHITECTURE.md (Health Monitor section) | 2026-03-26 |\n| P1 scheduler.py module | ARCHITECTURE.md (Scheduler section) | 2026-03-26 |\n| P1 Routes table update | ARCHITECTURE.md (routes table lines 115\u2013125) | 2026-03-26 |\n| P1 FEATURE-HEALTHCHECK tables in DATABASE.md | DATABASE.md (health_check_log / log_positions / log_filter section) | 2026-03-26 |\n| P1 tag_colors DB table | DATABASE.md (tag_colors schema + migration note) | 2026-03-26 |\n| P8 Database migrations | DATABASE.md Conventions (_add_column_if_missing note) | 2026-03-26 |\n",
  "SCREEN-DASHBOARDS-MONITORING": "# Screen: Monitoring\n\n**Version:** 20260320 V1  \n**Description:** Specification for the Monitoring screen\n\n**Service health dashboard and event timeline.** Polls running services, shows status, alerts on failure.\n\n## Menu Navigation\n\n`Dashboards / Monitoring`\n\n## Route\n\n```\nGET /monitoring\n```\n\n## Layout\n\nTwo sections: Health Table (top), Event Timeline (bottom).\n\n## Health Table\n\n| Column | Source | Content |\n|--------|--------|---------|\n| Project name | `projects.display_name` | Standard row header |\n| Endpoint | `port` + `health_endpoint` | e.g., `localhost:5001/health` |\n| Status | Heartbeat poller | UP (green) / DOWN (red) / UNKNOWN (gray) badge |\n| Last checked | `heartbeats.last_checked` | Timestamp |\n| Response time | `heartbeats.response_ms` | Milliseconds |\n| Uptime | `heartbeats.uptime_pct` | Rolling 24h percentage |\n\nOnly projects with both `port` and `health_endpoint` appear.\n\n## Event Timeline\n\nChronological list of platform events from the `events` table. Each row:\n\n| Column | Content |\n|--------|---------|\n| Timestamp | When it happened |\n| Project | Which project (or \"Platform\") |\n| Event | Type + summary (e.g., \"operation_completed: Start Server exited 0\") |\n\nFilter by project or event type. Most recent events first.\n\n## Alerts\n\nBanner notification when a service changes state (UP\u2192DOWN or DOWN\u2192UP). Links to the affected project.\n\n**States:** `UNKNOWN \u2192 UP \u2192 DOWN \u2192 UP` (cycle). SNOOZED suppresses alerts but continues polling.\n\n## Interactions\n\n| Action | Trigger | Effect |\n|--------|---------|--------|\n| Refresh | Button or auto-timer | Re-polls all health endpoints |\n| Snooze | Click on alert | Suppresses alerts for that service |\n| Filter events | Dropdown/text | Filters timeline |\n| Click project | Name link | Navigates to SCREEN-DRILLDOWN-PROJECT |\n\n## Data Flow\n\n| Reads | Writes |\n|-------|--------|\n| `projects` (port, health) | `heartbeats` table |\n| HTTP health endpoints | `events` table (state transitions) |\n| Process engine (running state) | Alert notifications |\n\n## Open Questions\n\n- What should the polling interval be? Per-project via `health_check_interval` column (default 60s); see FEATURE-HEALTHCHECK.md. No global override needed.\n- Should alerts use browser notifications or just in-page banners? In-page banners only. Browser notification permissions are intrusive; the dashboard is intended for active monitoring sessions.\n",
  "SCREEN-DASHBOARDS-PROCESSES": "# Screen: Processes\n\n**Version:** 20260320 V1\n**Row structure from:** SCREEN-DEFAULT (status badge, icon, project name \u2014 fixed columns only; does not use Baseline table or filter button)\n**Description:** Specification for the Processes screen\n\n**Live log viewer and process control.** Shows what is running, what ran, and the output.\n\n## Menu Navigation\n\n`Dashboards / Processes`\n\n## Route\n\n```\nGET /processes\n```\n\n## Layout\n\nProject list with expandable rows. If a project has running processes, they show inline with a View Log button. Expand a row to see prior run history.\n\n## Process List\n\nStandard header per SCREEN-DEFAULT (status badge, icon, name). Each row expands to show:\n\n| Column | Source | Content |\n|--------|--------|---------|\n| Operation | `op_runs.name` | Derived from script filename |\n| Status | `op_runs.status` | RUNNING / DONE / ERROR / STOPPED badge |\n| Started | `op_runs.started_at` | Timestamp |\n| Duration | Calculated | Elapsed (if running) or total |\n| View Log | Button | Opens log viewer |\n| Stop | Button | Sends SIGTERM (shown only when RUNNING) |\n\nThe list is sortable and filterable. Short names only \u2014 no full pathnames since project and script are known.\n\n## Log Viewer\n\nMonospace output area. Auto-scrolls while process is running. Stops on exit.\n\nHeader: project name, operation name, status badge, start time.\n\nControls: Stop (if running), Back to list.\n\n## State Machine\n\n```\nIDLE \u2192 STARTING \u2192 RUNNING \u2192 DONE\n                           \u2192 ERROR (non-zero exit)\n                           \u2192 STOPPED (user cancelled)\n```\n\nPlatform parses `[$PROJECT_NAME]` status lines from output to track transitions.\n\n## Log Files\n\nNamed per CLAUDE_RULES: `logs/{project}_{script}_{yyyymmdd_hhmmss}.log`. Project name prepended for sorting.\n\n## Interactions\n\n| Action | Trigger | Effect |\n|--------|---------|--------|\n| Expand row | Click project | Shows run history |\n| View log | Click button | Opens log viewer panel |\n| Stop process | Click Stop | SIGTERM to process group |\n| Filter | Text/status | Client-side filtering |\n\n## Data Flow\n\n| Reads | Writes |\n|-------|--------|\n| `op_runs` table | Stop signal \u2192 process |\n| Log files | Running count \u2192 nav bar badges |\n\n## Open Questions\n\n- Should log viewer support text search within output?\n",
  "SCREEN-DASHBOARDS-SCHEDULER": "# Screen: Scheduler\n\n**Version:** 20260325 V1\n**Description:** Specification for the Scheduler screen \u2014 view and manage all scheduled operations across projects\n\nOverview of all operations that have a `# Schedule:` header. Allows enabling/disabling schedules and editing cron expressions. The scheduler itself runs as a background loop in the platform (see FUNCTIONALITY.md Flow 7).\n\n## Menu Navigation\n\n`Dashboards / Scheduler`\n\n## Route\n\n```\nGET /scheduler\n```\n\n## Layout\n\nTwo sections stacked vertically: Schedule Table (top), Recent Schedule Events (bottom).\n\n## Schedule Table\n\nOne row per operation that has a non-null `schedule` value. Sorted by project name, then operation name.\n\n### Row Structure\n\n| Column | Source | Content |\n|--------|--------|---------|\n| Status badge | `projects.status` | Standard status pill |\n| Icon + project | `projects.display_name` | Standard project row header |\n| Operation | `operations.name` | Operation display name |\n| Category | `operations.category` | `service` / `local` / `maintenance` badge |\n| Schedule | `operations.schedule` | Cron expression \u2014 inline editable |\n| Enabled | `operations.schedule_enabled` | Toggle switch \u2014 on/off |\n| Last Run | `operations.last_scheduled_run` | Timestamp or `\u2014` if never run |\n| Next Run | `operations.next_scheduled_run` | Calculated next fire time; `\u2014` if disabled |\n| Last Status | `op_runs.status` (most recent scheduled run) | DONE / ERROR / STOPPED badge |\n\n### Schedule Inline Edit\n\nClicking the cron expression opens an inline editor for that row:\n\n| Element | Behavior |\n|---------|----------|\n| Text input | Pre-filled with current cron expression |\n| Validate | Real-time validation \u2014 shows human-readable description (e.g. \"every day at 02:00\") |\n| Save | Writes new expression to `operations.schedule` in DB and patches `# Schedule:` header in the script file |\n| Cancel | Reverts to read-only display |\n\nSaving recalculates `next_scheduled_run` immediately.\n\n### Enable/Disable Toggle\n\nClicking the toggle flips `operations.schedule_enabled`. No page reload \u2014 HTMX swap of the row. Does not alter the script file \u2014 allows pausing a schedule without removing the header.\n\n## Bulk Controls\n\nAction bar above the table:\n\n| Control | Behavior |\n|---------|----------|\n| `Disable All` | Sets `schedule_enabled = false` for all shown rows |\n| `Enable All` | Sets `schedule_enabled = true` for all rows that have a schedule |\n| Project filter | Dropdown \u2014 filter rows by project |\n\n## Recent Schedule Events\n\nLast 30 rows from the `events` table where `event_type IN ('schedule_fired', 'schedule_missed')`. Columns:\n\n| Column | Content |\n|--------|---------|\n| Timestamp | When it fired or was missed |\n| Project | Which project |\n| Operation | Script name |\n| Event | `schedule_fired` (green) or `schedule_missed` (amber) badge |\n| Status | Exit code / run outcome (linked to op_run if available) |\n\n## Empty State\n\nIf no operations have a `# Schedule:` header:\n\n> *No scheduled operations.*\n> Add `# Schedule: <cron>` to a `bin/` script header to register it.\n\nShown centered, muted text, inside the table area.\n\n## Startup Behavior\n\nOn platform startup, the scheduler loop starts automatically. Startup catch-up fires one immediate run for each missed schedule (per FUNCTIONALITY.md Flow 7). The Scheduler screen reflects what the loop last recorded \u2014 no additional polling is needed for the table; the Recent Events section auto-refreshes every 30 seconds via HTMX.\n\n## Data Flow\n\n| Reads | Writes |\n|-------|--------|\n| `operations` table (schedule, schedule_enabled, last/next run) | `operations.schedule_enabled` (toggle) |\n| `op_runs` table (last scheduled run status) | `operations.schedule` + script `# Schedule:` header (cron edit) |\n| `events` table (schedule_fired, schedule_missed) | `operations.next_scheduled_run` (recalculated on edit) |\n\n## Open Questions\n\n- Should the cron expression editor show a visual picker (minute/hour/day selectors) in addition to the raw expression?\n- Should `schedule_missed` events trigger a visible alert banner on this screen?\n",
  "SCREEN-DASHBOARDS-SERVICECATALOG": "# Screen: Service Catalog\n\n**Version:** 2026-04-06 V2\n**Row structure from:** SCREEN-DEFAULT (status badge, icon, project name \u2014 row header only; does not use Baseline table or filter button)\n**Description:** Specification for the Service Catalog screen \u2014 browse services, fire scripts, stream logs, manage MCP servers, and monitor queues\n\nService-oriented view of the platform. Shows all registered services (platform and project-provided) across all transports: REST, CLI, MCP, async queue, and web UI. Each service shows its tools, available transports, and operational status. Scripts can be run directly. MCP servers can be started, stopped, and exposed. Queue depths are visible at a glance.\n\n## Menu Navigation\n\n`Dashboards / Service Catalog`\n\n## Route\n\n```\nGET /servicecatalog\n```\n\n## Layout\n\nThree-panel. Left: service list (grouped). Top-right: service detail. Bottom-right: activity feed (recent runs, queue drains, MCP events).\n\n```\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502  Services            \u2502  Service: Batch Runner                    \u2502\n\u2502  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500  \u2502  Platform service  v1.0.0                 \u2502\n\u2502                      \u2502  Transports: REST CLI MCP                 \u2502\n\u2502  PLATFORM SERVICES   \u2502  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 \u2502\n\u2502  \u25cf Batch Runner      \u2502  Tools                                    \u2502\n\u2502  \u25cf Workflow          \u2502  run_script  POST /api/services/batch-r.. \u2502\n\u2502  \u25cf AsyncQueue        \u2502  run_status  GET  /api/services/batch-r.. \u2502\n\u2502                      \u2502  run_log     GET  /api/services/batch-r.. \u2502\n\u2502  PROJECT SERVICES    \u2502  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 \u2502\n\u2502  \u25b6 MyApp             \u2502  Active Runs        Recent Runs           \u2502\n\u2502    \u25cf pricing (MCP)   \u2502  deploy  RUNNING    test  done 2m ago     \u2502\n\u2502  \u25b6 Other Project     \u2502                                           \u2502\n\u2502    \u25cf sync (REST)     \u251c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2524\n\u2502                      \u2502  Activity                                 \u2502\n\u2502  \u2139 Button Key        \u2502  14:02 batch-runner/run_script myapp/dep  \u2502\n\u2502                      \u2502  14:01 async-queue/drain voice (3 msgs)   \u2502\n\u2502                      \u2502  13:58 workflow/transition ticket-42 \u2192test \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2534\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\nOn narrow viewports: service list collapses to a selector dropdown; panels stack vertically.\n\n## Help Icon and Button Key\n\nA help icon (\u2139 circle-info) is pinned at the bottom of the left panel. Clicking it opens a popover with a legend explaining the colored indicators used throughout the screen:\n\n| Indicator | Meaning |\n|-----------|---------|\n| Green dot (\u25cf) | Service healthy / MCP server running |\n| Yellow dot (\u25cf) | Service degraded / queue has pending items |\n| Red dot (\u25cf) | Service error / MCP server failed |\n| Gray dot (\u25cf) | Service stopped / not monitored |\n| Blue badge | REST transport available |\n| Green badge | CLI transport available |\n| Purple badge | MCP transport available |\n| Orange badge | Async transport available |\n| Pulsing ring | Operation currently running |\n\nThe popover also shows a compact transport legend:\n- **REST** \u2014 call via HTTP from any language\n- **CLI** \u2014 call via `game-cli` from bash scripts\n- **MCP** \u2014 call from Claude or other AI agents\n- **Async** \u2014 submit to file queue, processed on drain\n\nThe help icon badge shows \"?\" and is always visible. Dismiss popover by clicking outside or pressing Escape.\n\n## Service List (left panel)\n\nGrouped by source: **Platform Services** (from GAME), then **Project Services** (from managed projects, grouped by project name as collapsible sections).\n\nEach service row:\n\n| Element | Content |\n|---------|---------|\n| Health dot | Colored indicator (see Button Key) |\n| Service name | From manifest `display_name` or `name` |\n| Transport badges | Small colored pills showing enabled transports |\n| Type label | `(MCP)` / `(REST)` / `(Queue)` for project services \u2014 dim text |\n\nClicking a service loads the detail panel. Selected row highlighted.\n\n## Detail Panel (top-right)\n\n### Service Header\n\n| Field | Source |\n|-------|--------|\n| Service name | `services.display_name` or `services.name` |\n| Source | \"Platform service\" or \"Project: {name}\" |\n| Version | From manifest |\n| Description | From manifest |\n| Transport badges | Colored badges for each enabled transport with labels |\n\n### Tools Table\n\nOne row per tool defined in the service manifest.\n\n| Column | Content |\n|--------|---------|\n| Name | Tool name |\n| Description | One-line description from manifest |\n| Endpoint | REST path (click to copy curl command) |\n| CLI | `game-cli {service} {tool}` (click to copy) |\n| Actions | **Try** button (opens inline form with input fields from schema) |\n\n**Try button behavior:**\n1. Opens an inline form below the tool row with input fields generated from the tool's input schema\n2. User fills in required fields\n3. Submit fires `POST /api/services/{service}/{tool}` with the form data as JSON\n4. Response shown inline below the form\n5. For batch-runner tools: response includes run_id and auto-opens the active run tracker\n\n### MCP Controls (shown only for MCP-enabled services)\n\n| Element | Content |\n|---------|---------|\n| MCP Status | Running / Stopped / Error badge |\n| Expose toggle | Switch: exposed (network port) vs. unexposed (stdio only) |\n| Port | Assigned port when exposed |\n| Config snippet | \"Copy Config\" button \u2014 copies `.mcp.json` snippet to clipboard |\n| Start / Stop | Buttons to manage the MCP server process |\n\n### Queue Status (shown only for async-enabled services or AsyncQueue itself)\n\n| Element | Content |\n|---------|---------|\n| Queue name(s) | List of queues this service reads from |\n| Pending | Count of pending messages |\n| Processing | Count of currently processing messages |\n| Last drained | Timestamp of last drain |\n| Drain button | Triggers `POST /api/services/async-queue/drain?queue={name}` |\n\n### Run Controls\n\nSame as V1: Run button fires scripts, inline status row shows active runs with polling, View Log opens the log drawer. No changes to existing behavior.\n\n### Active Run Row (inline, below the triggering tool row)\n\n| Element | Content |\n|---------|---------|\n| Run ID | `#42` |\n| Status badge | Polls `GET /api/runs/{run_id}` every 2 seconds; badge cycles RUNNING \u2192 DONE / ERROR / STOPPED |\n| Duration | Elapsed seconds (live) |\n| Stop button | `POST /api/runs/{run_id}/stop` \u2014 shown only while RUNNING |\n| View Log button | Opens log drawer |\n\n### Log Drawer\n\nSlide-in panel from the right (or bottom on narrow screens). Same as V1:\n\n| Element | Content |\n|---------|---------|\n| Header | Service name + tool name + run ID + status badge |\n| Log area | Monospace, scrollable, auto-scrolls while RUNNING |\n| Source | `GET /api/runs/{run_id}/log` \u2014 re-fetched every 3 seconds while RUNNING |\n| Stop button | Shown while RUNNING |\n| Close | X button or Escape |\n| Download | Downloads log as `.log` file |\n\n### Recent Runs\n\nBelow the tools table. Last 10 runs for this service (across all tools).\n\n| Column | Content |\n|--------|---------|\n| Tool | Tool name |\n| Status | Badge |\n| Started | Relative time |\n| Duration | Seconds |\n| Exit | Exit code |\n| Log | Link to open log drawer |\n\n## Activity Feed (bottom-right panel)\n\nChronological feed of recent service activity across all services. Sources:\n- Batch Runner: operation started/completed/failed\n- Workflow: state transitions\n- AsyncQueue: drain events, message submissions\n- MCP: server started/stopped/exposed\n\nEach entry: timestamp, service name, tool name, one-line summary. Clicking an entry navigates to the relevant service detail.\n\nAuto-refreshes every 10 seconds. Shows last 50 entries. Filter dropdown: All / Batch Runner / Workflow / Queue / MCP.\n\n## Interactions\n\n| Action | Trigger | Effect |\n|--------|---------|--------|\n| Select service | Click row | Loads detail panel (HTMX swap) |\n| Try tool | Click Try | Opens inline form with schema-driven inputs |\n| Run script | Click Run on batch-runner tool | POST fire \u2192 inline status row |\n| Stop run | Click Stop | POST stop \u2192 status updates |\n| View log | Click View Log | Opens log drawer |\n| Copy endpoint | Click endpoint cell | Copies curl command to clipboard |\n| Copy CLI | Click CLI cell | Copies game-cli command to clipboard |\n| Copy MCP config | Copy Config button | Copies .mcp.json snippet |\n| Expose MCP | Toggle expose switch | POST expose \u2192 starts MCP server on port |\n| Drain queue | Drain button | POST drain \u2192 processes pending messages |\n| View help | Click \u2139 icon | Opens button key popover |\n\n## Data Flow\n\n| Reads | Writes |\n|-------|--------|\n| `services` table (all active) | `op_runs` (via batch-runner) |\n| `service_tools` table | `mcp_servers` (expose/unexpose/start/stop) |\n| `mcp_servers` table (status, port) | `events` (service activity) |\n| `op_runs` (recent runs) | Queue files (drain) |\n| Queue files (pending counts) | |\n| `events` (activity feed) | |\n\n## Open Questions\n\n- Should the Try button support saving and replaying tool invocations (like Postman collections)? Useful for repeated testing. Could store saved invocations in a `service_invocations` table.\n- Should the Activity Feed support WebSocket or SSE for real-time updates instead of polling? Polling is simpler but misses events between refreshes.\n- Should project services be auto-collapsed in the left panel, or expanded by default? Auto-collapsed if there are more than 5 projects to avoid overwhelming the list.\n",
  "SCREEN-DASHBOARDS-WORKFLOW": "# Screen: Workflow\n\n**Version:** 20260320 V1  \n**Description:** Specification for the Workflow screen\n\n**Kanban board for prototype lifecycle management.** Tracks features and prototypes from idea through implementation to completion. Sources from `spec_tickets` \u2014 the same table used by the Projects / Workflow screen, so tickets created there appear here immediately.\n\n## Menu Navigation\n\n`Dashboards / Workflow`\n\n## Route\n\n```\nGET /workflow\n```\n\n## Layout\n\nKanban columns (one per state) spanning the viewport. Filter bar at top: filter by project, tag, priority. New Ticket button.\n\n## States\n\nKanban columns map to `spec_tickets.kanban_state`:\n\n| State | Meaning |\n|-------|---------|\n| `idea` | First capture, not reviewed |\n| `proposed` | Has summary and plan |\n| `ready` | Has acceptance criteria, scheduled for work |\n| `in_development` | AI session running or recently finished |\n| `testing` | Work complete, human validating |\n| `done` | Accepted |\n\nStates are fixed. New tickets enter at `idea` regardless of how they were created.\n\n## Ticket Card\n\nEach card shows:\n\n| Field | Content | Source |\n|-------|---------|--------|\n| Title | Ticket title, clickable to open detail | `spec_tickets.title` |\n| Type badge | Workflow type pill (PATCH / SCREEN / FEATURE / AC) | `workflow_types.name` via `spec_tickets.workflow_type_id`; omitted if NULL |\n| Project | Project badge (colored by project) | `projects.display_name` |\n| Priority | Low / Medium / High / Critical indicator | `spec_tickets.priority` |\n| Tags | Ticket-level tag pills | `spec_tickets.tags` |\n| File | Filename pill when a specification file has been written | `spec_tickets.filename`; amber if `file_status = pending`, green if `applied` |\n| Age | Time since creation or last transition | `spec_tickets.created_at` |\n\n## Ticket Detail (modal or slide-out)\n\n| Section | Content |\n|---------|---------|\n| Title + description | Editable text |\n| State | Current state with transition buttons |\n| Acceptance criteria | Required at READY state |\n| AI Transaction Log | What was decided, what was built, why (populated during IN DEVELOPMENT) |\n| Test notes | Human validation notes (at TESTING) |\n| History | State transition timeline |\n\n## Transitions\n\n```\nIDEA \u2192 PROPOSED \u2192 READY \u2192 IN DEVELOPMENT \u2192 TESTING \u2192 DONE\n                               \u2191                |\n                             READY \u2190\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518 (rework)\n                           PROPOSED \u2190\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 (redesign)\n```\n\nDrag ticket between columns or click state buttons. Validation enforced:\n- IDEA \u2192 PROPOSED requires summary\n- PROPOSED \u2192 READY requires acceptance criteria\n- IN DEVELOPMENT \u2192 TESTING requires work completed\n\n## Prototype Lifecycle View\n\nFilter to a single project to see its prototype lifecycle:\n- All tickets for that project across all states\n- Progress bar showing tickets by state\n- Links to specification files if `has_specs = true`\n\n## AI Integration\n\nTickets in READY state can be submitted to an AI agent for automated implementation. The agent:\n1. Reads ticket description + acceptance criteria\n2. Implements changes\n3. Logs decisions to the AI Transaction Log\n4. Moves ticket to TESTING when done\n\n## Interactions\n\n| Action | Trigger | Effect |\n|--------|---------|--------|\n| Create ticket | New Ticket button | Opens creation form |\n| Move ticket | Drag to column | Validates and transitions state |\n| Open detail | Click card | Shows ticket detail |\n| Filter | Project/tag/priority controls | Filters visible cards |\n| Submit to AI | Button on READY tickets | Queues for automated implementation |\n\n## Data Flow\n\n| Reads | Writes |\n|-------|--------|\n| `spec_tickets` (kanban_state, all columns) | `spec_tickets.kanban_state` (drag / transition) |\n| `workflow_types` (type badge labels) | `spec_tickets.priority`, `tags`, `body` (detail edits) |\n| `projects` (display_name, has_specs) | `ai_decisions` table (during IN DEVELOPMENT) |\n| | `events` table (`ticket_transition`) |\n\n## Open Questions\n\n- Should DONE tickets auto-archive after a configurable period?\n- How should the AI agent integration be triggered \u2014 queue, webhook, or manual?\n",
  "SCREEN-DEFAULT": "# Screen: Baseline Layout\n\n**Version:** 20260320 V1\n**Type:** abstract \u2014 base layout, not a routed screen\n**Description:** Reusable project list layout. Named views extend this by declaring `Extends: SCREEN-DEFAULT` and specifying their middle columns.\n\n**Inherited by:** SCREEN-PROJECTS-OVERVIEW, SCREEN-PROJECTS-CONFIGURATION, SCREEN-PROJECTS-VALIDATION, SCREEN-PROJECTS-MAINTENANCE, SCREEN-PROJECTS-WORKFLOW\n\nA sortable, filterable, configurable project list. Middle columns are passed as arguments, making this a reusable base for named views.\n\n## Route\n\n```\nGET /default?title=DEFAULT&columns=Links,Actions,Help&filter=normal&sort=name\n```\n\n| Param | Default | Purpose |\n|-------|---------|---------|\n| `title` | DEFAULT | Section header and nav label |\n| `columns` | Links,Actions,Help | Comma-separated middle column keys |\n| `filter` | normal | Filter state: `normal` / `all` / `idea` / `archive` |\n| `sort` | name | `name`, `status_asc`, `status_desc` |\n\n## Layout\n\nFull viewport width \u2014 no max-width cap. Sortable table. Column header click sorts; current direction shown with arrows.\n\n## Filter Button\n\nLives in the **project sub-bar** (right side) \u2014 see Navigation Bar in UI-GENERAL. Present whenever a Projects sub-screen (Dashboard, Configuration) is active.\n\nState cycles on click, encoded as URL query param `?filter=`:\n\n| State | Shows |\n|-------|-------|\n| `normal` | All except IDEA and ARCHIVED |\n| `all` | All projects |\n| `idea` | Status = IDEA only |\n| `archive` | Status = ARCHIVED only |\n\n## Table Structure\n\n### Fixed Columns (every row)\n\n| Position | Content | Source | Interaction |\n|----------|---------|--------|-------------|\n| First | Status badge | `projects.status` | Click \u2192 cycle IDEA/PROTOTYPE/ACTIVE/PRODUCTION/ARCHIVED; writes DB + METADATA.md |\n| Second | Namespace badge | `projects.namespace` | Hidden when value is `development` |\n| Third | Icon + project name | `projects.project_type`, `projects.display_name` | Name links to `/project/{id}`; nowrap |\n| Last | Settings cog | \u2014 | Links to `/project/{id}` |\n\n### Middle Columns\n\n| Column Key | Header | Source | Renders |\n|------------|--------|--------|---------|\n| `Tags` | Tags | `projects.tags` | Colored tag pills |\n| `Port` | Port | `projects.port` | Port number; clickable inline edit |\n| `Stack` | Stack | `projects.stack` | Monospace string |\n| `Actions` | Actions | `operations` (category != maintenance) | Operation buttons per UI-GENERAL |\n| `Links` | Links | `projects.extra.links` | Link buttons; fallback to server link if port set |\n| `Claude` | CLAUDE.md | `projects.has_claude` | Opens AGENTS.md content in modal |\n| `Help` | Help | `projects.has_docs` + `extra.doc_path` | Green Documentation button \u2192 proxy route \u2192 new tab; `has_docs` is true when any of `doc/index.htm`, `doc/index.html`, `docs/index.htm`, `docs/index.html` exists (glob: `doc*/index.htm*`) |\n| `Maintenance` | Maintenance | `operations` (category = maintenance) | Operation buttons |\n| `LastUpdate` | Updated | `projects.version` | Date portion only; strips `.N` suffix |\n| `Configuration` | Configuration | `projects.port`, `card_show`, `tags` | Inline-editable fields per SCREEN-CONFIGURATION |\n| `Workflows` | Workflows | `workflow_types` (is_active = 1) + `projects.has_specs` | One button per active workflow type; disabled with \"No specifications\" tooltip when `has_specs = false` |\n\n## Open Questions\n\n- Should column selection be persisted per-user (localStorage) or always from URL params?\n",
  "SCREEN-DRILLDOWN-PROJECT": "# Screen: Project Detail\n\n**Version:** 20260320 V1  \n**Description:** Specification for the Project Detail screen\n\n**Single-project deep view.** Shows all configuration information for a project grouped by source.  Fields are correctly edittable.  Script headers and other items can be just described (ie. all bin scripts should have a listing for their relevant metadata) .env file variables etc.  ALl metadata for one project should be editable. Lets users edit file based  serves as the metadata editor for the project.\n\n## Menu Navigation\n\nTop bar: `Projects` (active \u2014 detail drill-down, not a direct nav item). No project sub-bar on this screen.\n\nThis page is navigated to when the gear icon is selected to see details of individual projects.\n\n## Route\n\n```\nGET /project/{id}\n```\n\nRest call should return service catalog data for the project enabling completed layouts. \n\n## Behavior\n\n- Should the metadata editor support adding new custom fields not in the METADATA.md template?\n    METADATA.md template needs to be updated in RulesEngine but i think it is possible the template version in the project is out of date.  this is a display program - The UI should render it after the other fields.  Indicate on the UI that the field is newly discovered / out of specification and colorize it - MAKE IT NOTICEABLE SO I CAN UPDATE THE TEMPLATE. \n\n## Layout\n\nTwo-column layout. Left: project info card + metadata editor. Right: operations + recent activity.\n\n## Project Info Card (top-left)\n\n| Field | Source | Editable |\n|-------|--------|----------|\n| Display name | `projects.display_name` | Yes |\n| Status badge | `projects.status` | Yes (click to cycle) |\n| Short description | `projects.description` | Yes |\n| Stack | `projects.stack` | Yes |\n| Port | `projects.port` | Yes |\n| Namespace | `projects.namespace` | Yes |\n| Tags | `projects.tags` | Yes (inline tag editor) |\n| Version | `projects.version` | Display only |\n| Health endpoint | `projects.health_endpoint` | Yes |\n| Desired state | `projects.desired_state` | Yes (toggle) |\n\nFields save on blur/tab-out. Writes go to both database and METADATA.md per DATABASE.md rules.\n\n## Metadata Editor (below info card)\n\nOrganized by source:\n\n**From METADATA.md** \u2014 editable key:value fields, grouped by category (Identity, Technology, Portfolio).\n\n**From Scanner** \u2014 read-only detected flags: `has_git`, `has_venv`, `has_node`, `has_claude`, `has_docs`, `has_tests`, `has_specs`. Shown as boolean indicators.\n\n**From bin/ scripts** \u2014 read-only operations list with script name, category, schedule, timeout.\n\n## Operations Panel (top-right)\n\nAll registered operations for this project. Each shows:\n\n| Element | Content |\n|---------|---------|\n| Button | Operation name, styled by category per UI-GENERAL |\n| Status | Running indicator if active |\n| Last run | Timestamp and exit status of most recent run |\n\n## Recent Activity (bottom-right)\n\nLast 20 events for this project from the `events` table. Each row: timestamp, event type, summary.\n\n## Quick Links\n\n| Link | Source | Behavior |\n|------|--------|----------|\n| Server | `port` | Opens `localhost:{port}` in new tab |\n| Documentation | `extra.doc_path` | Opens doc index in new tab |\n| CLAUDE.md | `has_claude` | Opens AGENTS.md content in modal |\n| Git repo | `extra.links` | Opens repo URL in new tab |\n| Specifications | `has_specs` | Opens specification directory index in new tab |\n\n## Interactions\n\n| Action | Trigger | Effect |\n|--------|---------|--------|\n| Edit field | Tab out / blur | Saves to DB + METADATA.md |\n| Run operation | Click button | Launches script |\n| View log | Click last-run link | Navigates to log in SCREEN-PROCESSES |\n| Back to list | Back button or nav | Returns to Dashboard |\n\n## Open Questions",
  "SCREEN-HOMEPAGE": "# Screen: Publisher\n\n**Description:** Portfolio site management. Builds and publishes a static GitHub Pages portfolio from project METADATA.md fields. Shows editable project cards for homepage inclusion.\n\n## Menu Navigation\n\n`Publisher`\n\n## Route\n\n```\nGET /publisher\nPOST /publisher/build\nPOST /publisher/publish\nPOST /publisher/{project_id}/card\n```\n\n## Layout\n\nThree sections stacked vertically: Build & Publish Controls, Publishing Config, and Project Cards.\n\n### Section 1: Build & Publish Controls\n\nTop section with status and action buttons.\n\n| Element | Content |\n|---------|---------|\n| Description | \"Build and publish a portfolio site from your projects.\" |\n| Build button | \"Rebuild\" \u2014 triggers POST `/publisher/build` |\n| Build status | Last build timestamp and status (success/error) |\n| Error output | Collapse/expand panel showing build errors (shown only on failure) |\n| Preview button | \"Preview\" \u2014 opens portfolio preview URL in new tab |\n| Publish button | \"Publish\" \u2014 triggers POST `/publisher/publish`, pushes to GitHub Pages |\n| Publish status | Last publish timestamp |\n| Homepage link | \"View Live\" \u2014 opens production portfolio URL in new tab |\n\n### Section 2: Publishing Config\n\nConfiguration fields for portfolio publishing:\n\n| Field | Type | Source | Editable |\n|-------|------|--------|----------|\n| Publish location | URL input | `.env` or config | No (informational only) |\n| Site title | Text input | `config/site_config.md` | Yes, POST on change |\n\n### Section 3: Project Cards\n\nTable of projects with editable homepage card fields. Only projects where `show_on_homepage = true` are shown. Prototypes are NOT shown on this page.\n\n**Table columns:**\n\n| Column | Source | Editable | Behavior |\n|--------|--------|----------|----------|\n| Status badge | `projects.status` | No | Colored pill: IDEA/PROTOTYPE/ACTIVE/PRODUCTION |\n| Project name | `display_name` | No | Clickable \u2192 project detail |\n| Include in homepage | `show_on_homepage` | Yes | Checkbox toggle |\n| Card title | `card_title` (fallback: `display_name`) | Yes | Inline edit \u2192 save |\n| Card description | `card_desc` (fallback: `short_description`) | Yes | Inline edit \u2192 save |\n| Card tags | `card_tags` (fallback: `tags`) | Yes | Inline edit (comma-separated) \u2192 save |\n| Card image | `card_image` (fallback: `logo`) | Yes | Inline edit (URL) \u2192 save |\n\nCheckbox and inline fields send HTMX POST requests to `/publisher/{project_id}/card` with field updates. Server writes updated fields to METADATA.md.\n\n**Sorting:** Alphabetical by display_name.\n\n**Filtering:** Show/hide archived projects toggle (default: show active + prototype only).\n\n## How It Works\n\n1. Scan all projects where `show_on_homepage = true`\n2. Parse card fields: `card_title` (fallback: `display_name`), `card_desc` (fallback: `short_description`), `card_tags` (fallback: `tags`), `card_image` (fallback: `logo`)\n3. If project has `docs/index.html`, add documentation link to card\n4. Generate static site from card fields + site branding\n5. Serve locally or push to GitHub Pages\n\n## Interactions\n\n| Action | Trigger | Effect |\n|--------|---------|--------|\n| Rebuild | Click button | POST `/publisher/build`, regenerates site |\n| Edit card field | Click inline text | Allows edit, saves on blur or Enter \u2192 POST `/publisher/{project_id}/card` |\n| Toggle homepage | Checkbox | POST `/publisher/{project_id}/card` with `show_on_homepage` flag |\n| Publish | Click button | POST `/publisher/publish`, pushes to GitHub Pages |\n| View live | Click link | Opens production URL in new tab |\n| View preview | Click button | Opens localhost preview URL in new tab |\n\n## Data Flow\n\n| Reads | Writes |\n|-------|--------|\n| `projects` table (card fields, show_on_homepage) | `projects.card_title`, `card_desc`, `card_tags`, `card_image` |\n| `settings` table (site config) | `settings` table (site config) |\n| Project `doc/` directories | Static site output files |\n| | GitHub Pages branch (git push) |\n| | METADATA.md (card fields) |\n\n## Open Questions\n\n- Should the preview section show a card grid preview inline, or only via the external URL? External URL only \u2014 the preview server runs at a known port; inline iframe adds unnecessary complexity.\n- Should editing card fields automatically trigger a rebuild, or require manual rebuild? Manual rebuild required \u2014 changes to card fields don't immediately rebuild the site. User clicks Rebuild after editing.\n",
  "SCREEN-PROJECTS-CONFIGURATION": "# Screen: Configuration\n\n**Version:** 20260320 V1\n**Extends:** SCREEN-DEFAULT\n**Description:** Specification for the Configuration screen\n\nA screen for editing project metadata across projects in a view\n\n## Menu Navigation\n\n`Projects / Configuration`\n\n## Route\n\n```\nGET /project-config\n```\n\nRenders SCREEN-DEFAULT (Baseline) with `columns=Configuration`.\n\n## Configuration Column\n\nEditable fields per project row:\n\n| Field | Label | Source | Input |\n|-------|-------|--------|-------|\n| Port | `port:` | `projects.port` | number |\n| Show on homepage | `show:` | `projects.card_show` | checkbox |\n| Stack | `stack:` | `projects.stack` | text |\n| Tags | `tags:` | `projects.tags` | text |\n\nFields persist on change per DATABASE.md rules. Each field saves independently \u2014 no Save button.\n\n## Single-Project Editor\n\nClicking the cog icon navigates to SCREEN-PROJECT for full metadata editing organized by source.\n\n## Open Questions\n\n- Should the batch Configuration column include additional fields (namespace, desired_state)? The Configuration screen shows the most-commonly-edited fields. Full metadata editing (including namespace and desired_state) is available via SCREEN-DRILLDOWN-PROJECT when the cog is clicked. The batch column stays minimal.\n",
  "SCREEN-PROJECTS-MAINTENANCE": "# Screen: Maintenance\n\n**Version:** 20260326 V1\n**Extends:** SCREEN-DEFAULT\n**Description:** Specification for the Maintenance screen \u2014 project list showing maintenance-category operations for each project\n\n## Menu Navigation\n\n`Projects / Maintenance`\n\n## Route\n\n```\nGET /project-maintenance\n```\n\nRenders SCREEN-DEFAULT (Baseline) with `columns=Maintenance`.\n\n## Maintenance Column\n\nShows all operations with `category = maintenance` for each project row. Uses the standard operation button pattern from UI-GENERAL: idle \u2192 running (green pulse) \u2192 done/error flash.\n\nMaintenance operations are typically long-running or infrequently-triggered scripts (cleanup, backup, rebuild, batch jobs). Separating them from the main Dashboard keeps the primary action surface uncluttered.\n\nIf a project has no maintenance-category operations, the cell is empty.\n\n## Open Questions\n\n- Should rows with no maintenance operations be hidden by default, with a toggle to show all?\n",
  "SCREEN-PROJECTS-OVERVIEW": "# Screen: Dashboard\n\n**Version:** 20260320 V1\n**Extends:** SCREEN-DEFAULT\n**Description:** Specification for the Dashboard screen\n\n**The main view.** Shows every discovered project with status, operations, and quick links. This is the landing page.\n\n## Menu Navigation\n\n`Projects / Overview` \n\n## Route\n\n```\nGET /\n```\n\nRenders SCREEN-DEFAULT (Baseline) with `columns=Links,Actions,Help`.\n\n## Layout\n\nFull-width project list. One row per project. Two-tier nav at top per UI-GENERAL; filter button in project sub-bar. Text/tag filter controls below sub-bar.\n\n## Middle Columns\n\nRenders Baseline with `columns=Links,Actions,Help`. Inherits all fixed columns and filter button from SCREEN-DEFAULT.\n\n| Column | Source | Interaction |\n|--------|--------|-------------|\n| Links | `extra.links`, server link from `port` | Click \u2192 open URL in new tab |\n| Actions | `operations` (category != maintenance) | Operation buttons per UI-GENERAL |\n| Help | `has_docs`, `extra.doc_path` | Green Documentation button \u2192 `/project/{id}/doc/` in new tab |\n\nRunning projects show a green dot indicator in the project name cell.\n\n## Project Detail (click project name or cog)\n\nNavigates to SCREEN-DRILLDOWN-PROJECT for the selected project.\n\n## Actions\n\n| Action | Trigger | Effect |\n|--------|---------|--------|\n| Run operation | Click button | Launches script, button shows running state |\n| Stop operation | Click running button | Sends SIGTERM |\n| Filter | Text/tag/status/namespace controls | Client-side row filtering |\n| Rescan Your Projects | Nav bar button (Project Sub-Bar, right) | POST `/api/scan`, refreshes project list |\n| Push | Per-project (shown when `git_unpushed > 0`) | POST `/api/push/{id}` |\n\n## Startup Behavior\n\nScanner reads METADATA.md, AGENTS.md, and bin/ headers. Missing files produce compliance gaps, not errors. Projects removed from disk are marked inactive.\n\n## Data Flow\n\n| Reads | Writes |\n|-------|--------|\n| Project scanner results | Operation launch requests |\n| Process engine run states | Git push commands |\n| Tag color config | |\n\n## Open Questions\n\n- Should the dashboard auto-refresh running project status on a timer, or only on explicit action?\n",
  "SCREEN-PROJECTS-SETUP": "# Screen: Project Setup\n\n**Version:** 20260325 V1\n**Description:** Specification for the Project Setup screen \u2014 discover unregistered GitHub repos and bring them into GAME\n\nFetches the user's GitHub repository list and compares against projects already registered in GAME. Shows un-registered repos with a `Make A Project` action and registered projects with a `Conform` action.\n\nThis screen does **not** extend SCREEN-DEFAULT. It has its own layout and column set because the source of truth is the GitHub API, not the GAME database.\n\n## Menu Navigation\n\n`Projects / Setup`\n\n(Appears as a tab in the Project sub-bar alongside Dashboard and Configuration.)\n\n## Route\n\n```\nGET /project-setup\n```\n\n## Prerequisites\n\nThe screen requires `GITHUB_USERNAME` (and optionally `GITHUB_TOKEN`) to be set in `.env`. If not configured, the screen shows a configuration notice instead of the project list.\n\n## Layout\n\nSingle-panel full-width table. Action bar at top. Two logical sections within the table: **Unregistered** repos (top, default visible) and **Registered** repos (bottom, collapsed by default). A filter control switches between sections.\n\n## Action Bar\n\n| Element | Position | Behavior |\n|---------|----------|----------|\n| `Refresh from GitHub` button | Left | Re-fetches GitHub repo list (calls `GET /api/github/repos`) |\n| Section toggle | Center | Pills: `Unregistered (N)` / `Registered (N)` |\n| Search input | Right | Client-side filter on repo name |\n\n## Unregistered Repos Table\n\nRepos present on GitHub but absent from `projects` table (matched by comparing `METADATA.md \u2192 git_repo` against `repo.clone_url` / `repo.ssh_url`).\n\n| Column | Source | Content |\n|--------|--------|---------|\n| Repo name | GitHub API `repo.name` | Full slug (e.g. `my-app`) |\n| Description | GitHub API `repo.description` | One-line, truncated |\n| Language | GitHub API `repo.language` | Primary language badge |\n| Last push | GitHub API `repo.pushed_at` | Relative time |\n| Visibility | GitHub API `repo.private` | `Private` / `Public` pill |\n| Action | \u2014 | `Make A Project` button |\n\n### Make A Project Button\n\n**What it does:**\n1. `git clone <ssh_url> ~/Projects/<repo.name>` (uses SSH; requires SSH key configured \u2014 see SCREEN-PROJECTS-WELCOME.md)\n2. Creates a minimal `METADATA.md` in the cloned directory:\n   ```\n   display_name: <repo.name title-cased>\n   status: PROTOTYPE\n   git_repo: <ssh_url>\n   ```\n3. Triggers `POST /api/scan` to register the project in GAME\n4. Row moves from Unregistered to Registered section\n\n**Button states:**\n- Idle: `Make A Project` (outline primary)\n- In progress: spinner + `Cloning\u2026` (disabled)\n- Success: `\u2713 Done` (green, briefly), row disappears from this section\n- Error: `Failed` (red), inline error message below the row (e.g. SSH auth error, disk full)\n\n**Feasibility note:** Button requires SSH authentication to be configured. The Welcome screen's Git SSH Setup guide covers this. If SSH is not available, the clone step fails and surfaces the error inline \u2014 it does not crash the platform.\n\n## Registered Repos Table\n\nRepos where a GAME project exists with a matching `git_repo` URL. Collapsed by default; expands via the section toggle.\n\n| Column | Source | Content |\n|--------|--------|---------|\n| Status badge | `projects.status` | Lifecycle status pill |\n| Project name | `projects.display_name` | Display name |\n| Compliance level | `heartbeats.current_state` (compliance type) | IDEA / PROTOTYPE / ACTIVE / PRODUCTION level badge |\n| Issues | Validation check count | Number of failing checks at current level |\n| Action | \u2014 | `Conform` button |\n\n### Conform Button\n\nRuns the equivalent of `bin/project_manager.py update` for this project:\n\n1. Injects latest `CLAUDE_RULES.md` into the project's `AGENTS.md`\n2. Copies missing template files (`common.sh`, `common.py`, `index.html`)\n3. Adds missing `METADATA.md` default fields\n4. Triggers `POST /api/scan` to refresh the project record\n\n**Button states:**\n- Idle: `Conform` (outline secondary)\n- In progress: spinner + `Updating\u2026` (disabled)\n- Success: `\u2713 Done` (green, briefly), compliance badge refreshes\n- Error: `Failed` (red), inline error below the row\n\n**Feasibility note:** Conform requires `SPECIFICATIONS_PATH` to be set in `.env` (so GAME can locate `CLAUDE_RULES.md`). If not configured, the button is disabled with a tooltip: \"Set SPECIFICATIONS_PATH in .env to enable.\"\n\n## No Configuration State\n\nIf `GITHUB_USERNAME` is not set in `.env`:\n\n```\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502  GitHub not configured                                  \u2502\n\u2502  Set GITHUB_USERNAME in .env to discover repositories. \u2502\n\u2502  Optionally add GITHUB_TOKEN for private repos.        \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\n## Data Flow\n\n| Reads | Writes |\n|-------|--------|\n| GitHub API `GET /users/{GITHUB_USERNAME}/repos` | `git clone` to `~/Projects/{name}` |\n| `projects` table (registered projects + git_repo) | New `METADATA.md` in cloned project dir |\n| `heartbeats` table (compliance state) | Updated `AGENTS.md`, templates (Conform) |\n| `.env` (`GITHUB_USERNAME`, `GITHUB_TOKEN`) | `POST /api/scan` (refresh on success) |\n\nGitHub API calls are server-side (token stays in `.env`, never exposed to browser). Results are cached per session; `Refresh from GitHub` clears the cache.\n\n## Open Questions\n\n- Should `Make A Project` also run `setup.sh` to create a Specifications entry for the new project? Yes \u2014 if `SPECIFICATIONS_PATH` is configured, offer an optional \"Also create specification directory\" checkbox. Default checked.\n- Should the screen support GitLab or Bitbucket as an alternative to GitHub? V1 GitHub only. Abstract the provider behind a `GIT_HOST` env var for future extension.\n- Should the target clone path be configurable? Always inferred from `PROJECTS_DIR` in `.env`. No additional configuration needed.\n- Should Conform show a diff preview of what will change before applying? Yes \u2014 show a collapsible diff panel before the operation runs. Blocked until `project_manager.py update --dry-run` output is parseable.\n",
  "SCREEN-PROJECTS-VALIDATION": "# Screen: Validation\n\n**Version:** 20260325 V1\n**Extends:** SCREEN-DEFAULT\n**Description:** Specification for the Validation screen \u2014 run and review project compliance checks across all registered projects\n\nA SCREEN-DEFAULT-based list view where each project row shows its current validation state and exposes controls to run checks individually or as a batch. Two validation categories: **Repo/Project Quality** and **Workflow Conformity**.\n\n## Menu Navigation\n\n`Projects / Validation`\n\n(Appears as a tab in the Project sub-bar alongside Dashboard, Configuration, and Setup.)\n\n## Route\n\n```\nGET /project-validation\n```\n\nRenders SCREEN-DEFAULT (Baseline) with `columns=Validation`.\n\n## Validation Column\n\nEach project row shows a compact summary of its validation state plus a `Validate` button.\n\n| Element | Content |\n|---------|---------|\n| Compliance level badge | Highest level fully satisfied: IDEA / PROTOTYPE / ACTIVE / PRODUCTION |\n| Quality score | Fraction of quality checks passing (e.g. `5/7`) |\n| Conformity score | Fraction of conformity checks passing (e.g. `3/4`) |\n| Issues indicator | Count of failing checks; amber if > 0, green if 0 |\n| `Validate` button | Runs all checks for this project; refreshes the row |\n\n### Result Expansion\n\nClicking the issues indicator (or the project row) expands an inline detail panel below the row showing two check groups:\n\n**Repo/Project Quality**\n\n| Check | Description | Pass Indicator |\n|-------|-------------|----------------|\n| `has_git` | `.git/` directory present | \u2713 / \u2717 |\n| `has_venv` | `venv/` or `.venv/` present | \u2713 / \u2717 |\n| `has_claude` | `CLAUDE.md` present | \u2713 / \u2717 |\n| `has_docs` | `doc[s]/index.html` present | \u2713 / \u2717 |\n| `has_tests` | `tests/` or `bin/test.sh` present | \u2713 / \u2717 |\n| `has_specs` | Matching entry in Specifications repo | \u2713 / \u2717 |\n| `version_format` | `projects.version` matches `YYYY-MM-DD.N` | \u2713 / \u2717 |\n\n**Workflow Conformity** (mirrors `bin/project_manager.py` compliance levels)\n\n| Level | Checks |\n|-------|--------|\n| IDEA | `METADATA.md` present; required fields: `display_name`, `status`, `short_description` |\n| PROTOTYPE | `AGENTS.md` present with `CLAUDE_RULES_START` marker; `common.sh` and `common.py` in `bin/` |\n| ACTIVE | `git_repo` set; `port` set; `health` endpoint set; `version` field present |\n| PRODUCTION | `desired_state: running`; `has_docs = true`; `has_tests = true`; `namespace` != development |\n\nEach level shows: \u2713 (all checks pass) or \u2717 N issues (N failing checks).\n\n## Batch Controls\n\nAction bar above the table (rendered in the project sub-bar area):\n\n| Control | Behavior |\n|---------|----------|\n| `Validate All` button | Runs checks for all visible projects sequentially; updates rows as results arrive |\n| Progress indicator | Shown during batch run: `N of M projects checked` |\n| `Show failing only` toggle | Filters to rows with at least one failing check |\n\n## Validate Action\n\nClicking `Validate` on a row (or `Validate All`):\n\n1. Calls `POST /api/validate/{project_id}`\n2. Server runs all checks against the project's filesystem and DB state\n3. Updates `heartbeats` table: `heartbeat_type = 'compliance'`, `current_state` = highest passing level, detail in JSON\n4. Returns updated row fragment (HTMX swap)\n\nNo external tools run \u2014 checks are purely filesystem and DB reads. Validation is fast (< 1 second per project).\n\n## Metrics Summary Bar\n\nAbove the table: aggregate counts across all visible projects.\n\n| Metric | Content |\n|--------|---------|\n| Compliant | Projects with 0 failing checks |\n| Needs attention | Projects with 1\u20133 failing checks |\n| Non-compliant | Projects with > 3 failing checks |\n| Average conformity | Mean compliance level across all projects |\n\n## Data Flow\n\n| Reads | Writes |\n|-------|--------|\n| `projects` table (filesystem flags, metadata) | `heartbeats` table (compliance state) |\n| Filesystem (presence checks for each project path) | `events` table (`compliance` event on state change) |\n| SPECIFICATIONS_PATH (has_specs check) | |\n| `operations` table (bin/ script headers for PROTOTYPE check) | |\n\n## Open Questions\n\n- Should validation results be persisted between sessions? Yes \u2014 results are stored in the `heartbeats` table (`heartbeat_type = 'compliance'`). The Validation screen shows the last stored result; clicking `Validate` refreshes it. Results survive restart.\n- Should `Validate All` run automatically on a schedule? Yes \u2014 wire to the scheduler loop via a `validation_schedule` key in the `settings` table (e.g., `0 2 * * *` for 2am nightly). Add to SCREEN-SETTINGS-GENERAL.md fields when implemented.\n- Should failing PRODUCTION checks surface as alerts on the Monitoring screen? Yes \u2014 compliance state changes (from the `heartbeats` table) should appear in the Monitoring event timeline as `compliance` event type. Existing event pipeline handles this; no new mechanism needed.\n",
