*, *::before, *::after { box-sizing: border-box; }
body {

/* ── Topbar (hidden in iframe embed) ── */

.tb-brand {

}
.tb-brand b { color: var(--c-accent); margin-right: 5px; }

}

.tb-crumb-name { color: #fff; font-weight: 600; }
.tb-spacer { flex: 1; }
.tb-btn {
  font-size: 12px; color: var(--c-side-link);
  padding: 0 14px; height: 100%; display: flex; align-items: center;
  border-left: 1px solid var(--c-side-border); text-decoration: none; white-space: nowrap;

}

/* ── Main ── */
#main { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar (hidden in iframe embed) ── */
#sidebar {
  width: 200px; min-width: 200px; background: var(--c-side-bg);
  border-right: 1px solid var(--c-side-border);

#sidebar::-webkit-scrollbar { width: 4px; }

.nav-sep { border-top: 1px solid var(--c-side-border); margin: 5px 0; }

.nav-item.active { color: var(--c-accent); border-left-color: var(--c-accent); background: rgba(44,182,125,.07); }

const DOCS = {
  "AGENTS": "# AGENTS.md \u2014 Specifications Repository\n\nTHIS REPOSITORY IS EXEMPT FROM CLAUDE_RULES INJECTION \u2014 IT IS NOT A CODE REPOSITORY\n\nThis repository contains project specifications only.\nThe prototyper tooling lives in the **prototyper** repository at `../prototyper/`.\n\n---\n\n## Purpose\n\nEach subdirectory is a project specification \u2014 a set of concise markdown files that define what to build. The prototyper's `bin/` scripts read specs from this directory via the `specification_directory: ../Specifications` field in `../prototyper/METADATA.md`.\n\nWhen working in this directory you are **authoring specifications**, not building code. Your job is to write the WHAT precisely enough that the build pipeline can infer the HOW.\n\n---\n\n## Specification Authoring Rules\n\n### 1. Write the WHAT, not the HOW\n\nThe author writes column names, screen layouts, trigger conditions, numbered sequences, and interactions. The build pipeline (via `oneshot_build_rules.md` + stack files) expands types, defaults, constraints, HTMX attributes, error handling, and test structure. **Do not duplicate what the stack files already define.**\n\n- Write: `created_at | TEXT | timestamp`\n- Not: `created_at | TEXT | DEFAULT datetime('now') NOT NULL`\n\n- Write: `Button \u2192 POST /save \u2192 reload table`\n- Not: `Button \u2192 hx-post=\"/save\" hx-target=\"#table\" hx-swap=\"outerHTML\"`\n\n### 2. Be concise by default\n\nUse tables, bullet lists, and short imperative phrases. Complete sentences are not required. Prose belongs in `README.md` and `INTENT.md` only \u2014 specification files (SCREEN-*, FEATURE-*, DATABASE, ARCHITECTURE) should read like structured notes.\n\n### 3. Every spec file ends with `## Open Questions`\n\nAll specification files except `README.md`, `METADATA.md`, and generated files (`IDEAS.md`, `REFERENCE_GAPS.md`, `SPEC_SCORECARD.md`) must end with:\n\n```markdown\n## Open Questions\n- None.\n```\n\nDuring authoring, put all unresolved decisions here rather than leaving placeholder text in the body. A question answered is a question removed. An empty section reads `- None.`\n\n### 4. Mark speculative features with `[ROADMAP]`\n\nFeatures that are intended but not yet specified belong in the relevant section with a `[ROADMAP]` prefix. Do not write implementation detail for roadmap items \u2014 just preserve the intent and any open questions.\n\n```markdown\n| [ROADMAP] Email notifications | Send digest on daily close | |\n```\n\nThe build pipeline will implement a minimal stub for roadmap items.\n\n### 5. Use the term \"specification\" not \"spec\" \n\n\"specification\" is the correct word in documentation, comments, and instructions. \"spec\" is acceptable only in script names (e.g. `spec_iterate.sh`).\n\n### 6. Do not create build-phase files during authoring\n\nThese files are generated by tooling **after** the specification is ready to build. Do not create them manually while actively authoring:\n\n| File | Created by |\n|------|-----------|\n| `REFERENCE_GAPS.md` | `bin/spec_iterate.sh` |\n| `SPEC_SCORECARD.md` | `bin/spec_iterate.sh` |\n| `SPEC_ITERATION.md` | `bin/spec_iterate.sh` |\n| `SCREEN-NNN-*.md` | Post-build iteration only |\n| `FEATURE-NNN-*.md` | Post-build iteration only |\n| `PATCH-NNN-*.md` | Post-build iteration only |\n| `AC-NNN-*.md` | Post-build iteration only |\n\n### 7. You are an Editor taking down my instructions into these Files. \n\nDo not delete specification files without checking (temporary files are ok).  The system to build these applications is out of scope so please check when you have big decisions and ask before proceeding.  The user is highly technical.\n\n---\n\n## Specification File Types\n\n| File | Purpose | Required |\n|------|---------|----------|\n| `METADATA.md` | Project identity: `name`, `display_name`, `short_description`, `status`, `stack` | Yes |\n| `AGENTS.md` | Callable surface area: `## Endpoints`, `## Capabilities` (JSON), `## Links` \u2014 format defined in RulesEngine | If exposes services |\n| `README.md` | One-line description + `## Intent` section (why it exists, who it's for) | Yes |\n| `INTENT.md` | Goals, constraints, success criteria \u2014 standalone intent document | Yes |\n| `ARCHITECTURE.md` | Modules, responsibilities, directory layout | Yes |\n| `FUNCTIONALITY.md` | High-level feature summary \u2014 what the app does | Yes |\n| `DATABASE.md` | Table names, column names, types, brief notes (schema only) | If has DB |\n| `UI-GENERAL.md` | Shared UI patterns used across screens | If has UI |\n| `SCREEN-{Name}.md` | Per-screen: route, layout sections, interactions | If has UI |\n| `FEATURE-{Name}.md` | Per-feature: trigger, numbered sequence, reads, writes | As needed |\n| `IDEAS.md` | Feature backlog \u2014 written by `tran_logger.sh` or manually | No |\n| `ACCEPTANCE_CRITERIA.md` | Acceptance criteria for the current build | No |\n\n---\n\n## Per-File Content Rules\n\n### METADATA.md\nKey-value format (not YAML). Required fields:\n```\nname: ProjectName\ndisplay_name: Human Readable Name\nshort_description: One sentence.\nstatus: IDEA|PROTOTYPE|ACTIVE|PRODUCTION|ARCHIVED\nstack: Python/Flask/SQLite\n```\nOptional: `port`, `git_repo`, `health`, `version`, `updated`.\n\n### README.md\n```markdown\nOne-line description of the project.\n\n## Intent\nWhy this project exists and who it is for.\n```\nNo `## Open Questions` section.\n\n### ARCHITECTURE.md\nModule names, their single responsibility, and the directory layout. Route table if the project has HTTP routes. No implementation detail \u2014 name the modules, not the function signatures.\n\n### DATABASE.md\nTables and columns only. Author writes: table name, column names, types, and a brief note. Do not write defaults, constraints, or indexes \u2014 those are inferred by the build pipeline from the stack rules.\n\n```markdown\n## tablename\n| Column | Type | Notes |\n|--------|------|-------|\n| id | INTEGER PK | |\n| name | TEXT | unique |\n| status | TEXT | IDEA/ACTIVE/DONE |\n| created_at | TEXT | timestamp |\n```\n\n### SCREEN-{Name}.md\n```markdown\n## Route\nGET /path\n\n## Layout\n- Section one: description\n- Section two: description\n\n## Interactions\n| Action | Trigger | Result |\n|--------|---------|--------|\n| Save | Button click | POST /save, reload section |\n\n## Open Questions\n- None.\n```\n\n### FEATURE-{Name}.md\n```markdown\n## Trigger\nWhat initiates this feature (user action, schedule, event, etc.)\n\n## Sequence\n1. Step one\n2. Step two\n3. Step three\n\n## Reads\n- table.column\n\n## Writes\n- table.column \u2190 value\n\n## Open Questions\n- None.\n```\n\n### UI-GENERAL.md\nComponent name, purpose, and key visual details. Do not write Bootstrap class names or HTMX attributes \u2014 those are expanded by the build pipeline.\n\n---\n\n## Lifecycle: When to Signal Readiness\n\n1. **Authoring** \u2014 edit spec files, add Open Questions, mark roadmap items\n2. **Review** \u2014 run `bash ../prototyper/bin/validate.sh <ProjectName>` to check for errors\n3. **Ready to build** \u2014 tell the operator the specification is complete; they run `oneshot.sh`\n4. **Post-build iteration** \u2014 numbered ticket files (`SCREEN-NNN-*`, etc.) are created here; `iterate.sh` applies them\n\nDo not run `spec_iterate.sh` or `iterate.sh` until the operator signals the specification is ready to build or iterate against an existing codebase.\n\n---\n\n## Running Tooling (from the prototyper)\n\nAll tooling runs from `../prototyper/`. The scripts find this directory automatically via `specification_directory:` in prototyper's `METADATA.md`.\n\n```bash\ncd ../prototyper\n\n# Scaffold a new specification directory here\nbash bin/setup.sh <ProjectName>\n\n# Validate a specification\nbash bin/validate.sh <ProjectName>\n\n# Generate build prompt (run when spec is ready)\nbash bin/oneshot.sh <ProjectName> > ../Specifications/<ProjectName>/oneshot-prompt.md\n\n# Gap analysis and quality scoring (post-authoring)\nbash bin/spec_iterate.sh <ProjectName>\n```\n\n---\n\n## Projects in This Repository\n\n| Directory | Description |\n|-----------|-------------|\n| `GAME/` | GAME dashboard specification |\n| `Wyckoff/` | Wyckoff trading system specification |\n| `Proposed.AlexaPrototypeOne/` | Alexa prototype specification |\n",
  "CLAUDE": "# CLAUDE.md\n\nThis file provides guidance to Claude Code (claude.ai/code) when working with code in this repository.\n\n@AGENTS.md\n",
  "Initial_Spec": "# CreditBubble: Private Credit Stress Intelligence System\n## Initial Specification \u2014 May 2026\n\n---\n\n## INTENT - THIS IS THE AUTHORS INTENT for INTENT.md\n\nThis system replicates the analytical process used by top trading desks (e.g., Millennium, Citadel) to systematically read SEC filings and identify stress signals before they are widely recognized. The goal is to generate actionable long/short trading signals by detecting deterioration in large organizations books.  The specific area of current interest\nis Private Credit Organizations \u2014 specifically Business Development Companies (BDCs) and alternative asset managers \u2014 using publicly available data.\n\nWe would like to replicate some business rules that top analysts use when discussing what has been revealed in the filings.  The interesting point is that they focused on \nparticular parts of the filings and could extrapolate on credit quality at financial institutions based on behavior.  \n\nThis project is to read the filings.  \n\nPhase 1 core thesis: private credit funds mark illiquid assets quarterly using internal models with every incentive to be optimistic. Stress signals appear in the filings many quarters before a fund cuts its distribution, caps redemptions, or faces a regulatory investigation. While true analyists will for sure know the market better than we can do, these signals will certainly beat most investors - few humans have the time to read and analyze these documents - investment companies do - and i want a private trading algorithm  with signals and analytics over time... \n\nThere may be some document model training but i would like to have that done as much as possible preprocessing in python to minimize context.  Use other techniques to minimize LLM context as large documents will lower accuracy and cost more. \n\n---\n\n## Target Universe\n\n### Tier 1 \u2014 Publicly Traded BDCs (Primary Focus)\nThese file 10-Qs with EDGAR and are the richest data sources.\n\n| Ticker | Name | Manager | Notes |\n|--------|------|---------|-------|\n| ARCC | Ares Capital Corporation | Ares Management | Largest BDC by AUM |\n| MFIC | MidCap Financial Investment Corp | Apollo Global | Already showing NAV decline |\n| TCPC | BlackRock TCP Capital Corp | BlackRock | Under DOJ investigation, 19% NAV cut Jan 2026 |\n| FSCO | FS Credit Opportunities Corp | FS Investments | User's benchmark \u2014 closed-end, no redemption risk |\n| OBDC | Blue Owl Capital Corporation | Blue Owl | Large retail-distributed BDC |\n| BXSL | Blackstone Secured Lending Fund | Blackstone | Listed Blackstone BDC |\n| CGBD | TCG BDC (Carlyle) | Carlyle | Mid-size BDC |\n| TPVG | TriplePoint Venture Growth | TriplePoint | Tech-focused, higher risk |\n\n### Tier 2 \u2014 Management Company Stocks (Potential Shorts)\nThese are the parent managers. Stress in Tier 1 funds eventually damages their fee income, fundraising ability, and reputation.\n\n| Ticker | Name | Key Exposure |\n|--------|------|-------------|\n| APO | Apollo Global Management | MidCap Financial, AAPL credit, $3B fund sale signal |\n| ARES | Ares Management | ARCC, direct lending, capped redemptions at 5% |\n| BX | Blackstone | BCRED, BXSL, BREIT \u2014 massive retail private credit |\n| BLK | BlackRock | TCPC under DOJ investigation |\n| OWL | Blue Owl Capital | OBDC, heavy BDC origination |\n| KKR | KKR & Co | Infrastructure credit, private lending |\n\n### Tier 3 \u2014 Non-Traded / Interval Funds (Limited Direct Data, Monitored via 8-Ks)\n| Fund | Manager | Red Flag Status |\n|------|---------|----------------|\n| BCRED | Blackstone | $3.2B in redemptions, non-accruals 0.6% to 2.4% in one quarter |\n| Ares Direct Lending | Ares | Capped redemptions at 5%, requests at 11.6% |\n| Apollo Direct Lending | Apollo | Weighing $3B fund sale |\n\n---\n\n## Data Sources and Download Process\n\n### Primary Source: SEC EDGAR\n\nAll BDC filings are publicly available via EDGAR. The system must download and parse:\n\n1. 10-Q (quarterly reports) \u2014 filed within 45 days of quarter end. Primary data source.\n2. 10-K (annual reports) \u2014 filed within 60-75 days of fiscal year end. Includes audited financials and full portfolio schedule.\n3. 8-K (material events) \u2014 filed within 4 business days. Critical for catching distribution cuts, NAV announcements, and redemption cap announcements in real time.\n4. N-2 / N-CEN (for registered investment companies) \u2014 supplemental data for some funds.\n\n### EDGAR API Endpoints\n\n# Get all filings for a company by CIK number\nhttps://data.sec.gov/submissions/CIK{10-digit-CIK}.json\n\n# Search for recent filings by ticker\nhttps://efts.sec.gov/LATEST/search-index?q=%22{TICKER}%22&dateRange=custom&startdt={DATE}&enddt={DATE}&forms=10-Q\n\n# Full text search across all filings\nhttps://efts.sec.gov/LATEST/search-index?q=%22payment+in+kind%22&forms=10-Q&dateRange=custom&startdt=2025-01-01\n\n# Get specific filing index\nhttps://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&CIK={TICKER}&type=10-Q&dateb=&owner=include&count=10\n\n# Direct filing content (HTML)\nhttps://www.sec.gov/Archives/edgar/data/{CIK}/{accession-number}/{primary-document}.htm\n\n### CIK Numbers for Target Universe\n\n| Ticker | CIK |\n|--------|-----|\n| ARCC | 0001278752 |\n| MFIC | 0001655888 |\n| TCPC | 0001452936 |\n| FSCO | 0001552198 |\n| OBDC | 0001655888 |\n| BXSL | 0001822928 |\n| APO | 0001858681 |\n| ARES | 0001555280 |\n| BX | 0001393818 |\n| BLK | 0001364742 |\n| OWL | 0001823584 |\n\nNote: Verify all CIKs against EDGAR before first run. CIKs are permanent and do not change.\n\n### Download Protocol\n\nFor each ticker in target universe:\n  1. GET submissions JSON from EDGAR API\n  2. Extract accession numbers for all 10-Q filings from past 8 quarters\n  3. For each accession number:\n     a. GET filing index page\n     b. Identify primary document (usually the .htm file)\n     c. Download and store raw HTML\n     d. Parse using extraction logic (see below)\n  4. Also monitor 8-K feed daily for material events\n  5. Store all raw files locally with timestamp and filing\n",
  "METADATA": "# AUTHORITATIVE PROJECT METADATA - THE FIELDS IN THIS FILE SHOULD BE CURRENT\n\nname: Specifications\ndisplay_name: Project Specifications\nshort_description: Project Specifications  \nstatus: ACTIVE\nupdated: 20260408_000000\n",
  "README": "# Specifications\n\nPlatform standards and project specifications for AI-orchestrated development.\n\n## Roles\n\n1. **RulesEngine** (`RulesEngine/`) \u2014 agent behavior contract, stack patterns, branding, and spec templates. Distributed to all projects by `create_project.py` / `update_projects.sh`.\n2. **Project specifications** (`GAME/`, etc.) \u2014 concise specs (screens, features, architecture) that `build.sh` assembles into AI build prompts.\n\nOperational tasks (pushing repos, running services) live in GAME. This repo is the standards authority.\n\n## Workflow\n\n```bash\n# 1. Create a spec directory\nbash bin/setup.sh <ProjectName>\n\n# 2. Validate it\nbash bin/validate.sh <ProjectName>\n\n# 3. Build an AI prompt from the spec\nbash bin/build.sh <ProjectName> > build-prompt.md\n\n# 4. Promote to a live code project (run from GAME/)\npython3 bin/create_project.py <ProjectName>\nbash bin/update_projects.sh\n\n# 5. Regenerate agent rules after editing RulesEngine/BUSINESS_RULES.md\nbash bin/summarize_rules.sh > rules-prompt.md\n# Feed rules-prompt.md to an AI agent \u2192 paste output over RulesEngine/CLAUDE_RULES.md\n```\n\n## Structure\n\n```\nSpecifications/\n  RulesEngine/                     Governance standards \u2014 rules, branding, process\n    BUSINESS_RULES.md              Source for CLAUDE_RULES.md \u2014 edit here, then regenerate\n    CLAUDE_RULES.md                Generated agent behavior contract (injected into projects)\n    BRANDING.md                    Color variables, typography, theme standards\n    PROTOTYPE_PROCESS.md           Lifecycle state machine (build and iteration workflow)\n    stack/                         Prescriptive tech patterns (flask.md, sqlite.md, ...)\n    spec_template/                 Template files for setup.sh\n    templates/                     Canonical common.sh and common.py for code projects\n    gitignore                      Standard .gitignore distributed to projects\n\n  bin/                             Spec tooling (accept any directory: name, /abs, or ./rel)\n    setup.sh                       Scaffold or update a spec directory from templates\n    validate.sh                    Validate a spec directory for completeness and correctness\n    convert.sh                     Generate concise\u2192detailed expansion prompt\n    build.sh                       Tag commit + generate complete build prompt\n    summarize_rules.sh       Regenerate CLAUDE_RULES.md from BUSINESS_RULES.md\n    test.sh                        Self-test the specification system\n\n  GAME/                            GAME project specification\n  data/                            HTML viewer templates (used by build_documentation.py)\n  docs/                            Generated documentation\n  archive/                         Superseded documents \u2014 not current spec\n```\n\n## Key Conventions\n\n- **METADATA.md** \u2014 `key: value` format (not YAML). Single source of project identity.\n- **AGENTS.md** \u2014 AI context file. Each project's `CLAUDE.md` is a bare `@AGENTS.md` pointer.\n- **BUSINESS_RULES.md** \u2014 Edit rules here; never edit `CLAUDE_RULES.md` directly.\n- **RulesEngine/stack/** \u2014 One prescriptive `.md` per technology. Referenced by build and convert prompts.\n- **Version format** \u2014 `YYYY-MM-DD.N` (e.g., `2026-03-20.1`).\n",

function groupFiles(keys) {
  const coreSet = new Set(['README', 'INTENT', 'ARCHITECTURE', 'DATABASE', 'UI', 'UI-GENERAL']);
  const featureSet = new Set(['FEATURE_MAP', 'FUNCTIONALITY']);
  const groups = { 'Project Core': [], 'Project Features': [], 'Screens': [], 'Other': [] };
  keys.forEach(k => {
    if (k === 'METADATA') return;
    if (coreSet.has(k)) groups['Project Core'].push(k);
    else if (featureSet.has(k) || k.startsWith('FEATURE-')) groups['Project Features'].push(k);
    else if (k.startsWith('SCREEN-')) groups.Screens.push(k);
    else groups.Other.push(k);
  });
  return groups;
}

function parseMeta(text) {
  const f = {};
  text.split('\n').forEach(line => {
    const m = line.match(/^([\w]+):\s*(.*)/);
    if (m) f[m[1]] = m[2].trim();
  });
  return f;
}

function buildNav(groups) {
  const nav = document.getElementById('nav');
  const order = ['Project Core', 'Project Features', 'Screens', 'Other'];
  order.forEach(group => {
    const files = groups[group];
    if (!files.length) return;
    const div = document.createElement('div');
    div.innerHTML = '<div class="nav-group-label">' + group + '</div>';
    files.forEach(key => {
      const a = document.createElement('a');
      a.className = 'nav-item';
      a.textContent = key + '.md';
      a.dataset.key = key;
      a.onclick = () => showDoc(key);
      div.appendChild(a);
    });
    nav.appendChild(div);
    nav.appendChild(Object.assign(document.createElement('div'), { className: 'nav-sep' }));
  });
}

function buildProjectCard(meta) {
  const card = document.getElementById('project-card');
  const name = meta.display_name || meta.name || '';
  const title = meta.title || '';
  const desc = meta.short_description || '';
  card.innerHTML =
    '<div class="pc-name">' + name + '</div>' +
    (title ? '<div class="pc-title">' + title + '</div>' : '') +
    (desc  ? '<div class="pc-desc">'  + desc  + '</div>' : '');
}

function buildFileGrid(groups) {
  const area = document.getElementById('file-grid-area');
  const order = ['Project Core', 'Project Features', 'Screens', 'Other'];
  let html = '';
  order.forEach(group => {
    const files = groups[group];
    if (!files.length) return;
    html += '<div class="group-label">' + group + '</div><div class="file-grid">';
    files.forEach(key => {
      html += '<div class="file-card" data-key="' + key + '" onclick="showDoc(\'' + key + '\')">' + key + '.md</div>';
    });
    html += '</div>';
  });
  area.innerHTML = html;
}

function showDoc(key) {
  if (!DOCS[key]) return;
  // File grid stays visible as navigation header
  const dc = document.getElementById('doc-content');
  dc.style.display = 'block';
  dc.innerHTML = marked.parse(DOCS[key]);
  document.getElementById('doc-sep').className = 'doc-sep visible';
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.file-card').forEach(el => el.classList.remove('active'));
  const navLink = document.querySelector('.nav-item[data-key="' + key + '"]');
  if (navLink) { navLink.classList.add('active'); navLink.scrollIntoView({ block: 'nearest' }); }
  const card = document.querySelector('.file-card[data-key="' + key + '"]');
  if (card) card.classList.add('active');
  dc.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

const keys = Object.keys(DOCS).sort();
const groups = groupFiles(keys);
const meta = DOCS['METADATA'] ? parseMeta(DOCS['METADATA']) : {};
buildProjectCard(meta);
buildNav(groups);
buildFileGrid(groups);

// Iframe embed mode — hide navigation chrome, content fills full width
if (window !== window.top) {
  document.getElementById('topbar').style.display = 'none';
  document.getElementById('sidebar').style.display = 'none';
}
</script>
</body>
</html>
