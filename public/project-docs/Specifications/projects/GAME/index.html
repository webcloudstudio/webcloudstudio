  "SCREEN-PROJECTS-WELCOME": "# Screen: Welcome\n\n**Description:** Landing screen shown when the user first enters the application. START HERE checklist, project discovery overview, and help resources.\n\n## Menu Navigation\n\n`Projects / Welcome`\n\n## Route\n\n```\nGET /welcome   (default \u2014 also served at GET /)\n```\n\nThe app root (`/`) redirects to `/welcome` when no other default is set.\n\n## Layout\n\nSingle-column centered content, max-width 900px, padded. Four stacked sections:\n\n```\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502                                            \u2502\n\u2502         \u2588\u2588 WELCOME TO PROTOTYPER \u2588\u2588        \u2502\n\u2502      Your local prototype operations hub   \u2502\n\u2502                                            \u2502\n\u251c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2524\n\u2502  \ud83d\udfe2 START HERE                             \u2502\n\u2502  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2502\n\u2502  [checklist with status indicators]        \u2502\n\u251c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2524\n\u2502  \ud83d\udcc1 Project Discovery                      \u2502\n\u2502  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2502\n\u2502  XX Projects | XX Prototypes               \u2502\n\u2502  [Alphabetical list of projects]           \u2502\n\u251c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2524\n\u2502  \u2753 Service Help                           \u2502\n\u2502  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2502\n\u2502  [help page links]                         \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\n## Welcome Banner\n\nFull-width hero section at top of page. Dark surface (`--cc-surface`), large centered text.\n\n| Element | Content |\n|---------|---------|\n| Headline | `Welcome to Prototyper` \u2014 large (32px), bold, accent color |\n| Subheadline | `Your local prototype operations hub` \u2014 muted, 16px |\n| Decoration | Subtle horizontal rule below subheadline |\n\nNo buttons or actions in the banner. Visual only.\n\n## START HERE Card\n\nCard (`cc-card`) highlighted with an accent background color. Purpose: quick checklist to verify the application is properly configured.\n\n### Card Header\n\n`START HERE` \u2014 large, bold, highlighted in accent color with a green circle indicator (\u25cf).\n\n### Checklist Items\n\nFour checklist items with status indicators. Status icons use a stoplight pattern:\n\n| Item | Status Source | Icon | Description |\n|------|---------------|------|-------------|\n| PROJECTS_DIR | Environment config | \u2705/\u26a0\ufe0f/\u274c | Shows the configured directory path. Displays directory value inline. Green if accessible, amber if not found, red if missing. |\n| Startup Scan | Backend metric | \u2705 | Displays: \"Startup Scan Detected {count} Projects and {count} Prototypes\" \u2014 produced by the startup scanner on app initialization. Green check always (informational, not a failure condition). |\n| Ready to Use | Derived state | \u2705 | \"Application ready\" \u2014 shown when scan has completed and projects list is populated. Green check. |\n| Next Steps | \u2014 | \ud83d\udccc | \"Use the Projects tab above or Rescan to update\" \u2014 informational only, not a failure state. |\n\nEach item is a row with icon + label + value/description. Use emoji or Font Awesome icons for stoplight effect (\u25cf red, \u26a0\ufe0f amber, \u2705 green).\n\n### Content Layout\n\nDisplayed as a vertical checklist. Not a form\u2014purely informational with read-only values.\n\n## Project Discovery Card\n\nCard (`cc-card`) below the START HERE section. Purpose: show project discovery overview and list all discovered projects.\n\n### Card Header\n\n`Project Discovery` with a folder icon (\ud83d\udcc1).\n\n### Summary Line\n\nTwo-column summary: `XX Projects | XX Prototypes` \u2014 count of discovered projects and prototypes from the startup scan.\n\n### Project List\n\nOne-column alphabetical list of project names below the summary. Each project name is clickable and links to `/project/{id}` for detail view.\n\nExample:\n```\nAnalytics\nDashboard\nDataPipeline\nMLExperiment\nWebApp\n```\n\nList is sorted alphabetically. One project per row. Space reserved for future KPI columns (do not implement yet).\n\n## Service Help Links Card\n\nCard below the project discovery card. Purpose: quick links to commonly needed external help pages.\n\n### Card Header\n\n`Help & Resources` with a question-mark icon (\u2753).\n\n### Links\n\nDisplayed as a grid of link buttons (2-column on desktop, 1-column on narrow).\n\n| Label | Destination | Notes |\n|-------|-------------|-------|\n| GitHub Docs | `https://docs.github.com` | Opens new tab |\n| Flask Documentation | `https://flask.palletsprojects.com` | Opens new tab |\n| Bootstrap 5 Docs | `https://getbootstrap.com/docs/5.3` | Opens new tab |\n| Prototyper Workflow | `../doc/index.html` | Local documentation |\n\nAll links open in a new tab. Cards are static \u2014 no data fetch required.\n\n## Data Flow\n\n| Reads | Writes |\n|-------|--------|\n| `projects` table (count + list) | None |\n| Startup scan metrics | |\n\nReads from backend: project count, project list, prototype count, PROJECTS_DIR value from env.\n\n## Open Questions\n\n- Should the welcome banner display the logged-in username (if auth is added later)?\n- Should the START HERE checklist be collapsible once all items are green?\n- Should the help links be editable from the Settings screen?\n",
  "SCREEN-PROJECTS-WORKFLOW": "# Screen: Project Workflow\n\n**Version:** 20260326 V1\n**Extends:** SCREEN-DEFAULT\n**Description:** Specification for the Project Workflow screen \u2014 create specification ticket files for any project from a configurable set of workflow types\n\nOne-click entry point for raising specification tickets (PATCH-NNN, SCREEN-NNN, FEATURE-NNN, etc.) against any project that has a linked specification directory. Each active `workflow_types` row appears as a button per project row. Clicking opens a modal; submitting writes the file to disk and records it in `spec_tickets`.\n\n## Menu Navigation\n\n`Projects / Workflow`\n\n## Route\n\n```\nGET /project-workflow\n```\n\nRenders SCREEN-DEFAULT (Baseline) with `columns=Workflows`.\n\n## Workflows Column\n\nOne button per row in `workflow_types` where `is_active = 1`, ordered by `sort_order`.\n\n| State | Appearance |\n|-------|------------|\n| Project has specifications (`has_specs = true`) | Active buttons, one per workflow type |\n| Project has no specifications (`has_specs = false`) | Buttons rendered dim/disabled; tooltip: \"No specification directory found\" |\n\nButtons use the workflow type's `name` as label. Style: small outline buttons, consistent width within the column.\n\n## Create Ticket Modal\n\nOpens when any workflow button is clicked.\n\n**Title:** `New {workflow_type.name} \u2014 {project.display_name}`\n\n### Fields\n\n| Field | Type | Required | Notes |\n|-------|------|----------|-------|\n| Short description | Text input | Yes | Becomes the filename slug: lowercased, spaces \u2192 hyphens, non-alphanumeric stripped. Max 60 chars. Preview of resulting filename shown below input. |\n| Body | Textarea | No | Free-form markdown. Pre-filled with `workflow_types.template` where `{title}` is substituted. User edits before submitting. |\n\n### Filename Preview\n\nLive preview below the description input:\n\n```\nPATCH-004-fix-nav-scroll.md\n```\n\nNNN is calculated server-side on submit (scan for highest existing `{PREFIX}-NNN-*` in the specification directory + 1). Preview shows `NNN` as `???` until submit.\n\n### Buttons\n\n| Button | Behaviour |\n|--------|-----------|\n| `Create` (primary) | Disabled until description passes validation. Submits the form. |\n| `Cancel` | Closes modal, discards input. |\n\n### Validation (client-side)\n\n| Rule | Message |\n|------|---------|\n| Empty description | *Description is required.* |\n| Description too short (< 3 chars) | *Description must be at least 3 characters.* |\n\n### Submit Sequence\n\n1. `POST /api/specification-tickets` with `{ project_id, workflow_type_id, title, body }`\n2. Server scans `{SPECIFICATIONS_PATH}/{project.name}/` for existing `{PREFIX}-NNN-*` files \u2192 calculates next NNN\n3. Renders file content from `workflow_types.template` substituting `{title}` and `{body}`\n4. Writes file: `{SPECIFICATIONS_PATH}/{project.name}/{PREFIX}-{NNN}-{slug}.md`\n5. Inserts row into `spec_tickets` (status = `pending`)\n6. Emits `spec_ticket_created` event\n7. Returns `{ ok: true, filename }` \u2014 modal closes, brief success toast shown on the row\n\nOn error: modal stays open, error shown in red below the Body field.\n\n## Pending Tickets Indicator\n\nIn the Workflows column, if a project has any `spec_tickets` rows with `status = pending`, a small amber badge shows the count next to the button group: e.g. `3 pending`. Clicking it links to the specification directory (if `has_specs` and `SPECIFICATIONS_PATH` configured).\n\n## Data Flow\n\n| Reads | Writes |\n|-------|--------|\n| `workflow_types` (active rows, ordered) | File on disk: `{SPECIFICATIONS_PATH}/{project.name}/{file}` |\n| `projects` (has_specs, display_name) | `spec_tickets` table (new row, status = pending) |\n| `spec_tickets` (pending count per project) | `events` table (`spec_ticket_created`) |\n| Filesystem (NNN calculation on submit) | |\n\n## Workflow Type Configuration\n\nWorkflow types are managed via Settings (future: Settings / Workflow Types screen). Until that screen exists, types are edited directly in the `workflow_types` table. Seed data is inserted on first startup if the table is empty \u2014 see DATABASE.md.\n\n## Open Questions\n\n- Should the Body textarea render a live markdown preview pane? Yes \u2014 split-pane preview is useful given that body content is markdown. Implement as a toggle (Edit / Preview) rather than always-split to keep the modal compact.\n- Should submitting a ticket also trigger a git commit in the Specifications repo? Yes \u2014 auto-commit with message `Add {PREFIX}-{NNN}-{slug}.md for {project_name}` immediately after the file is written. No-op if the Specifications repo has no `.git/` or git is unavailable.\n- Should the pending badge click navigate to the Prototypes screen filtered to that project? Yes \u2014 navigate to `/prototypes?filter={project.name}` so the user sees all specification files for that project in context.\n",
  "SCREEN-PROTOTYPES": "# Screen: Prototypes\n\n**Version:** 20260324 V2\n**Description:** Top-level screen listing all known prototypes (specification directories inside the Specifications repo) with their names and current status.\n\n## Menu Navigation\n\n`Prototypes`\n\n## Route\n\n```\nGET /prototypes\n```\n\n## Layout\n\nFull-width single-panel list. Action bar at top (New Prototype button + filter/search), prototype rows below.\n\n```\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502  [+ New Prototype]      [search] [status pills]\u2502\n\u2502  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 \u2502\n\u2502  PROTOTYPE  MyApp       short description      \u2502\n\u2502  IDEA       NewThing    short description      \u2502\n\u2502  ACTIVE     CoreService short description      \u2502\n\u2502  ...                                           \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\n## Prototype List\n\nOne row per prototype specification directory found in the Specifications repo. Sorted by name (default). Each row:\n\n| Element | Content | Source |\n|---------|---------|--------|\n| Status badge | Colored pill (see UI-GENERAL status colors) | `METADATA.md \u2192 status` |\n| Name | `display_name` | `METADATA.md \u2192 display_name` |\n| Short description | One-line summary | `METADATA.md \u2192 short_description` |\n| Specification link | `View Specification \u2192` | Links to `/prototypes/{name}` (detail \u2014 future) |\n\nClicking a row (or the link) navigates to the prototype detail view (not yet implemented \u2014 placeholder route).\n\n## New Prototype Button\n\nProminent primary button at the left of the action bar: `+ New Prototype`. Large enough to be the clear primary action on the screen.\n\nClicking opens the **New Prototype Modal**.\n\n### New Prototype Modal\n\nBootstrap modal. Title: `New Prototype`.\n\n| Field | Type | Validation |\n|-------|------|------------|\n| Short name | Text input | Required. Lowercase letters, digits, hyphens only (`[a-z0-9-]+`). Max 40 chars. |\n\nHelper text below the input: *This becomes the directory name under Specifications/ (e.g. `my-app` \u2192 `Specifications/my-app/`).*\n\nButtons:\n- `Create` (primary) \u2014 disabled until input passes validation. Submits the form.\n- `Cancel` \u2014 closes modal, clears input.\n\n### Create Sequence\n\n1. User clicks `Create`.\n2. Modal shows spinner; `Create` button disabled.\n3. Client posts `POST /api/prototypes/create` with `{ \"name\": \"<short-name>\" }`.\n4. Server runs `bash {SPECIFICATIONS_PATH}/bin/setup.sh <short-name>` in `SPECIFICATIONS_PATH`.\n5. On success (exit 0): modal closes, list reloads (`GET /api/prototypes`), new row highlighted briefly.\n6. On error (non-zero exit or stderr): modal stays open, error message shown below the input in red (include stderr output truncated to 3 lines).\n\n### Validation rules (client-side, before submit)\n\n| Rule | Error message |\n|------|---------------|\n| Empty | *Name is required.* |\n| Invalid chars | *Only lowercase letters, digits, and hyphens allowed.* |\n| Already exists | *A prototype named `{name}` already exists.* (checked against current list) |\n\n## Filter Bar\n\nLives above the list. Client-side filtering (no round-trip).\n\n| Filter | Behavior |\n|--------|----------|\n| Text search input | Filters rows by name + description match |\n| Status pill buttons | Toggle visibility by status (IDEA / PROTOTYPE / ACTIVE / PRODUCTION / ARCHIVED) |\n\nDefault state: all statuses shown.\n\n## Empty State\n\nIf no prototypes are found (Specifications repo path not configured or empty):\n\n> *Prototypes go here.*\n> Configure `SPECIFICATIONS_PATH` in `.env` to point to your Specifications directory.\n\nShown centered, muted text, inside the list area.\n\n## Data Flow\n\n| Reads | Writes |\n|-------|--------|\n| `GET /api/prototypes` \u2014 list of prototype dirs with parsed METADATA.md fields | `POST /api/prototypes/create` \u2014 scaffold new prototype via `setup.sh` |\n\n`GET /api/prototypes`: Server scans `SPECIFICATIONS_PATH` (from `.env`) for subdirectories containing `METADATA.md`, parses `name`, `display_name`, `short_description`, `status` fields, returns as JSON array.\n\n`POST /api/prototypes/create`: Accepts `{ \"name\": \"<short-name>\" }`. Validates name format server-side. Runs `bash {SPECIFICATIONS_PATH}/bin/setup.sh <name>` as a subprocess. Returns `{ \"ok\": true }` on success or `{ \"ok\": false, \"error\": \"<stderr>\" }` on failure. Does not return until `setup.sh` completes.\n\n## Open Questions\n\n- Should clicking a row open a detail view (parsed specification files rendered as HTML) or just link to the raw Specifications directory? A future SCREEN-PROTOTYPES-DETAIL.md will define a rendered detail view. Until it exists, clicking a row shows the specification file list as a plain index.\n- Should this screen also show prototypes that are missing `METADATA.md` (as \"unconfigured\")? Yes \u2014 show them with a dim \"unconfigured\" badge so the user can investigate. A missing METADATA.md is a setup issue, not a reason to hide the entry.\n- Should status badges on this screen be clickable to cycle status? Read-only here \u2014 status changes go through SCREEN-DRILLDOWN-PROJECT or the Dashboard.\n- Should `SPECIFICATIONS_PATH` default to a sibling directory? Yes \u2014 default to `../Specifications` relative to `PROJECTS_DIR` when `SPECIFICATIONS_PATH` is not explicitly set in `.env`.\n",
  "SCREEN-SETTINGS-GENERAL": "# Screen: General Settings\n\n**Version:** 20260326 V1\n**Description:** Specification for the General Settings screen \u2014 application-level configuration\n\n## Menu Navigation\n\n`Settings / General`\n\n## Route\n\n```\nGET  /settings/general\nPOST /settings/general\n```\n\nSub-bar is active when any `/settings/*` route is loaded. General is the default sub-tab.\n\n## Layout\n\nSingle-column centered form, max-width 600px. Card (`cc-card`) per logical group. Save and Cancel at the bottom.\n\n```\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502  General Settings                               \u2502\n\u2502  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500  \u2502\n\u2502                                                 \u2502\n\u2502  Application Name                               \u2502\n\u2502  [ Command Center                             ] \u2502\n\u2502  The name displayed in the upper-left corner    \u2502\n\u2502                                                 \u2502\n\u2502  Homepage URL                                   \u2502\n\u2502  [ https://webcloudstudio.github.io           ] \u2502\n\u2502  Your live homepage URL (shown on Homepage)     \u2502\n\u2502                                                 \u2502\n\u2502  [Save Settings]  [Cancel]                      \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\n## Fields\n\n| Field | Key | Type | Default | Description shown below field |\n|-------|-----|------|---------|-------------------------------|\n| Application Name | `app_name` | Text input | `Command Center` | The name displayed in the upper-left corner of the application |\n| Homepage URL | `homepage_url` | URL input | `` | Your live homepage URL (shown on Homepage) |\n\nFields are populated from the `settings` table on page load. All values are optional \u2014 saving an empty field stores an empty string (not NULL).\n\n## Buttons\n\n| Button | Behaviour |\n|--------|-----------|\n| `Save Settings` (primary) | `POST /settings/general` with all field values; flashes \"Settings saved.\" on success; page reloads |\n| `Cancel` (outline) | Navigates back (browser history); no writes |\n\n## Data Flow\n\n| Reads | Writes |\n|-------|--------|\n| `settings` table (all keys) | `settings` table (UPDATE value WHERE key = ?) |\n\nNo full-page reload on save \u2014 HTMX `hx-post` replaces the form fragment; success flash rendered inline above the form.\n\n## Effect of Settings\n\n| Key | Where used |\n|-----|-----------|\n| `app_name` | Top-bar brand label (replaces `Command Center` / `cc-brand` text) |\n| `homepage_url` | Homepage screen \u2014 live site link; shown next to the Publish button |\n\n## Open Questions\n\n- Should additional settings (polling interval, PROJECTS_DIR, SPECIFICATIONS_PATH) be editable here, or remain `.env`-only? Path-level settings (`PROJECTS_DIR`, `SPECIFICATIONS_PATH`) remain `.env`-only \u2014 changing them requires a restart and the risk of misconfiguration is high. Operational settings (polling interval, app branding) belong here.\n- Should `app_name` changes take effect immediately? Yes \u2014 the server reads the `settings` table on each request for the brand label. No restart required.\n",
  "SCREEN-SETTINGS-HELP": "# Screen: Help\n\n**Description:** Help and documentation page for Prototyper application.\n\n## Menu Navigation\n\n`Settings / Help`\n\n## Route\n\n```\nGET /settings/help\n```\n\n## Layout\n\nSingle-column centered content, max-width 900px, padded. Sections stacked vertically.\n\n```\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502  Help & Documentation                       \u2502\n\u2502  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500  \u2502\n\u2502                                             \u2502\n\u2502  [Help section content]                     \u2502\n\u2502                                             \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\n## Content Sections\n\n### Getting Started\n\nBrief introduction to Prototyper and its key features:\n- Automatic project discovery from PROJECTS_DIR\n- Running operations (scripts) from projects\n- Monitoring project health and status\n- Publishing portfolio sites\n\n### Key Concepts\n\n| Concept | Description |\n|---------|-------------|\n| Projects | Discovered repositories containing METADATA.md and bin/ scripts |\n| Prototypes | Specification directories in the Specifications repository |\n| Operations | Executable scripts with CommandCenter headers, auto-discovered and launchable |\n| Health | Periodic checks of project status via HTTP or TCP |\n| Workflow | Custom workflow types for batch operations |\n\n### FAQ\n\nCommon questions and answers:\n- How are projects discovered?\n- How do I add a new project?\n- How do I create an operation?\n- How do I publish to the portfolio?\n- How do I monitor project health?\n- How do I configure settings?\n\n### External Resources\n\nLinks to official documentation:\n\n| Resource | URL |\n|----------|-----|\n| Prototyper Workflow Guide | `../doc/index.html` |\n| GitHub Docs | `https://docs.github.com` |\n| Flask Documentation | `https://flask.palletsprojects.com` |\n| Bootstrap 5 Docs | `https://getbootstrap.com/docs/5.3` |\n\n## Data Flow\n\n| Reads | Writes |\n|-------|--------|\n| None \u2014 static content | None |\n\nThis is a static information page. No data reads or writes.\n\n## Open Questions\n\n- Should the FAQ be searchable?\n- Should help content be editable from the admin interface?\n- Should the Help page include a changelog or version history?\n",
  "SCREEN-SETTINGS-TAG": "# Screen: Tag Settings\n\n**Version:** 20260325 V1\n**Description:** Specification for the Tag Settings screen \u2014 assign display colors to tags from a curated preset palette\n\nTags are discovered automatically from `projects.tags` across all projects. This screen assigns a foreground/background color pair to each tag. Colors are drawn from a curated preset list chosen for legibility on the dark theme.\n\n## Menu Navigation\n\n`Settings / Tags`\n\n## Route\n\n```\nGET /settings/tags\n```\n\n## Layout\n\nTwo-column layout. Left: tag list with color assignment. Right: live preview panel showing tags as pills and buttons.\n\n```\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u252c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502  Tags                         \u2502  Preview                  \u2502\n\u2502  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2502  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2502\n\u2502  python    [\u25cf Emerald   \u25bc]    \u2502  \u25cf python   \u25cf flask       \u2502\n\u2502  flask     [\u25cf Coral     \u25bc]    \u2502  \u25cf ml       \u25cf data        \u2502\n\u2502  ml        [\u25cf Violet    \u25bc]    \u2502  [python]  [flask]        \u2502\n\u2502  data      [\u25cf Sky       \u25bc]    \u2502  (button style preview)  \u2502\n\u2502  ...                          \u2502                           \u2502\n\u2502                               \u2502                           \u2502\n\u2502  [Reset All]  [Save Changes]  \u2502                           \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2534\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\n## Tag List (left panel)\n\nOne row per distinct tag found across all projects. Tags are collected by scanning `projects.tags` (comma-separated) across all active projects. Sorted alphabetically.\n\n### Row Structure\n\n| Element | Content |\n|---------|---------|\n| Color swatch dot | Small filled circle in the currently assigned color |\n| Tag name | The raw tag string |\n| Color picker dropdown | Preset color selector (see Preset Palette below) |\n| Usage count | Dim badge: number of projects carrying this tag |\n\n### Color Picker Dropdown\n\nA compact dropdown showing the preset palette. Each option renders as:\n\n```\n\u25cf Color Name     (swatch + label)\n```\n\nThe currently selected color is highlighted. Selecting a new color updates the swatch immediately (client-side preview) but does not save until `Save Changes` is clicked.\n\n### Unassigned Tags\n\nTags with no assigned color render with a default neutral color (`--cc-muted` background). The dropdown shows `\u25cb None (default)` as the first option.\n\n## Preset Palette\n\nA fixed list of foreground/background pairs designed for legibility on the dark theme. All combinations meet 4.5:1 contrast ratio.\n\n| Name | Background | Foreground | Use for |\n|------|------------|------------|---------|\n| Emerald | `#10b981` | `#fff` | Services, active |\n| Sky | `#0ea5e9` | `#fff` | Frontend, UI |\n| Violet | `#8b5cf6` | `#fff` | ML, AI |\n| Coral | `#f43f5e` | `#fff` | Alerts, critical |\n| Amber | `#f59e0b` | `#000` | In-progress, warning |\n| Slate | `#64748b` | `#fff` | Neutral, infra |\n| Teal | `#14b8a6` | `#fff` | Data, pipelines |\n| Rose | `#fb7185` | `#000` | Deprecated, legacy |\n| Indigo | `#6366f1` | `#fff` | Core, platform |\n| Lime | `#84cc16` | `#000` | Scripts, tooling |\n| Orange | `#f97316` | `#fff` | Prototypes, experiments |\n| Zinc | `#a1a1aa` | `#000` | Archived, muted |\n\n## Preview Panel (right panel)\n\nLive preview updating as the user selects colors. Shows two views:\n\n**Pill view** \u2014 tags rendered as `<span class=\"badge\">` pills, same as they appear on the Dashboard.\n\n**Button view** \u2014 tags rendered as small outline buttons, as they might appear in filters or the tag filter bar.\n\nPreview pulls from the currently unsaved draft colors \u2014 updates on each dropdown change without a server round-trip.\n\n## Save Behavior\n\n`Save Changes` button (primary, bottom-left of tag list):\n1. Collects all color assignments\n2. `POST /settings/tags` with JSON payload: `{ \"tag_colors\": { \"<tag>\": { \"bg\": \"#hex\", \"fg\": \"#hex\" }, ... } }`\n3. Server writes to `data/tag_colors.json` and updates the `tag_colors` table (if implemented per DATABASE.md open question)\n4. Flash: \"Tag colors saved.\" Success.\n5. Dashboard and all tag pills reflect the new colors immediately on next page load.\n\n`Reset All` button (outline, secondary): Clears all custom assignments, reverts to default neutral. Prompts a confirmation before executing.\n\n## Data Sources\n\n| Source | Content |\n|--------|---------|\n| `projects.tags` (all active projects) | Discover existing tags |\n| `data/tag_colors.json` | Current color assignments (read on load) |\n| `tag_colors` DB table | Future canonical source per DATABASE.md |\n\n## Open Questions\n\n- Should the palette be user-extensible (custom hex input) or strictly preset?\n- Should tag color assignments be per-namespace (different colors in production vs development)?\n- Should unused tags (no active projects carrying them) be hidden, greyed out, or shown with a dim indicator?\n",
  "SCREEN-SETTINGS-VOICEFORWARD-CONFIG": "# Screen: VoiceForward \u2014 Button Configuration\n\n**Version:** 20260328 V1\n**Description:** Manage voice recorder buttons \u2014 set label, target file, color, and display order.\n\n## Menu Navigation\n\n`Settings / Voice`\n\n## Route\n\n```\nGET  /settings/voiceforward/config\nGET  /settings/voiceforward  (redirect \u2192 /settings/voiceforward/config)\n```\n\nSettings sub-bar is active. Voice tab is selected.\n\n## Layout\n\nSingle-column, max-width 700px. Button list in a `cc-card`. Add button at the top right.\n\n```\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502  Voice Buttons                              [+ Add Button]   \u2502\n\u2502  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500  \u2502\n\u2502  \u25a0  BOOK IDEAS    TheTruth/ideas.md              \u2191\u2193  \u270f  \ud83d\uddd1  \u2502\n\u2502  \u25a0  GAME SPEC     Specifications/GAME/ideas.md   \u2191\u2193  \u270f  \ud83d\uddd1  \u2502\n\u2502  \u25a0  GAME          GAME/queue.md                  \u2191\u2193  \u270f  \ud83d\uddd1  \u2502\n\u2502                                                              \u2502\n\u2502  (empty state: \"No buttons configured. Add one above.\")      \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\nAdd/Edit form (appears inline below the list):\n\n```\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502  Button Text      [ BOOK IDEAS                             ] \u2502\n\u2502  File to Append   [ TheTruth/ideas.md                      ] \u2502\n\u2502  (relative to $PROJECTS_DIR)                                 \u2502\n\u2502  Color            [\u25a0 #fdab3d ]                               \u2502\n\u2502  Active           [\u2713]                                        \u2502\n\u2502                                                              \u2502\n\u2502  [Save]  [Cancel]                                            \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\n## Button List Columns\n\n| Column | Content |\n|--------|---------|\n| Color swatch | 20\u00d720px square; background = `color` hex value |\n| Label | Button text in normal weight |\n| Target file | Relative path in muted monospace (`--cc-muted`, `font-family: monospace`) |\n| Reorder | \u2191\u2193 arrows; PUT `/api/voice/buttons/{id}/reorder` with swapped sort_order values |\n| Edit | Pencil icon; expands inline form pre-populated with current values |\n| Delete | Trash icon; opens confirm modal before DELETE call |\n\n## Add / Edit Form Fields\n\n| Field | Key | Type | Validation | Helper text |\n|-------|-----|------|-----------|-------------|\n| Button Text | `label` | Text input | Required; must be unique | Displayed on the recorder button |\n| File to Append To | `target_file` | Text input | Required | Relative to `$PROJECTS_DIR` \u2014 e.g. `TheTruth/ideas.md` |\n| Color | `color` | Color picker (hex) | Required | Background color of the recorder button |\n| Active | `active` | Toggle/checkbox | \u2014 | Hidden from recorder when off |\n\n## Interactions\n\n| Action | Trigger | Behavior |\n|--------|---------|----------|\n| Add button | Click `+ Add Button` | Inline form appended below list; Save \u2192 POST `/api/voice/buttons`; success refreshes list |\n| Edit | Click pencil | Row expands to form with current values; Save \u2192 PUT `/api/voice/buttons/{id}` |\n| Delete | Click trash | Confirm modal: \"Delete {label}?\" \u2014 Yes \u2192 DELETE `/api/voice/buttons/{id}`; list refreshes |\n| Reorder | Click \u2191 or \u2193 | Swaps sort_order with adjacent row; PUT to update both; list re-renders |\n| Cancel | Click Cancel in form | Collapses form; no write |\n\n## Data Flow\n\n| Reads | Writes |\n|-------|--------|\n| `voice_buttons` (all rows, ORDER BY sort_order) | `voice_buttons` INSERT / UPDATE / DELETE |\n\nHTMX partial updates: list fragment replaces on each successful write. No full-page reload.\n\n## Open Questions\n\n- Should inactive buttons be shown in the list (greyed out) or hidden? Show them greyed so the user knows they exist.\n- Should there be a max button count? No constraint in V1 \u2014 the mobile recorder will scroll if there are many buttons.\n",
  "SCREEN-SETTINGS-VOICEFORWARD-DOCS": "# Screen: VoiceForward \u2014 Setup Documentation\n\n**Version:** 20260328 V1\n**Description:** Static documentation page explaining how to install dependencies, configure WSL2 network access, and connect an iPhone to the VoiceForward recorder.\n\n## Menu Navigation\n\n`Settings / Voice Docs`\n\n## Route\n\n```\nGET /settings/voiceforward/docs\n```\n\nSettings sub-bar is active. Voice Docs tab is selected.\n\n## Layout\n\nSingle-column, max-width 800px. Five `cc-card` sections in sequence. No dynamic data \u2014 content is static HTML rendered server-side.\n\n```\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502  VoiceForward Setup                                          \u2502\n\u2502  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500  \u2502\n\u2502  \u250c\u2500 1. Prerequisites \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510  \u2502\n\u2502  \u2502  Install ffmpeg and openai-whisper...           [Copy] \u2502  \u2502\n\u2502  \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518  \u2502\n\u2502  \u250c\u2500 2. WSL2 Network Setup \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510  \u2502\n\u2502  \u2502  netsh portproxy command...                     [Copy] \u2502  \u2502\n\u2502  \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518  \u2502\n\u2502  \u250c\u2500 3. Finding Your Laptop IP \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510  \u2502\n\u2502  \u2502  ipconfig instructions...                              \u2502  \u2502\n\u2502  \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518  \u2502\n\u2502  \u250c\u2500 4. Connecting from iPhone \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510  \u2502\n\u2502  \u2502  http://[IP]:5001/voice walkthrough...                 \u2502  \u2502\n\u2502  \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518  \u2502\n\u2502  \u250c\u2500 5. Managing Buttons \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510  \u2502\n\u2502  \u2502  Relative path format + link to config screen          \u2502  \u2502\n\u2502  \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518  \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\n## Sections\n\n### 1. Prerequisites\n\n**Install ffmpeg** (WSL2 / Ubuntu):\n```bash\nsudo apt update && sudo apt install -y ffmpeg\n```\n\n**Install Whisper** (in the GAME virtualenv):\n```bash\npip install openai-whisper\n```\n\nNote: `openai-whisper` pulls PyTorch and several other dependencies \u2014 expect ~1 GB install size. The Whisper `base` model (~140 MB) downloads automatically on the first transcription request and is cached locally.\n\n---\n\n### 2. WSL2 Network Setup\n\nThe GAME server runs inside WSL2. To reach it from a phone on the same WiFi, Windows must forward the port from its network interface to WSL2.\n\n**Run these commands in Windows PowerShell (as Administrator):**\n\nAdd port proxy (run once; survives reboots):\n```powershell\nnetsh interface portproxy add v4tov4 listenport=5001 listenaddress=0.0.0.0 connectport=5001 connectaddress=127.0.0.1\n```\n\nAllow port 5001 through Windows Firewall:\n```powershell\nnetsh advfirewall firewall add rule name=\"GAME VoiceForward\" dir=in action=allow protocol=TCP localport=5001\n```\n\nTo verify the proxy is active:\n```powershell\nnetsh interface portproxy show v4tov4\n```\n\nTo remove it later:\n```powershell\nnetsh interface portproxy delete v4tov4 listenport=5001 listenaddress=0.0.0.0\n```\n\n---\n\n### 3. Finding Your Laptop IP\n\n1. Open **Command Prompt** on Windows (`Win + R` \u2192 `cmd` \u2192 Enter)\n2. Run: `ipconfig`\n3. Find the **Wi-Fi** adapter section\n4. Note the **IPv4 Address** \u2014 looks like `192.168.x.x` or `10.x.x.x`\n\nThis is the address your phone will use. The IP may change if your router reassigns it \u2014 if the connection stops working, re-run `ipconfig` to check.\n\n---\n\n### 4. Connecting from iPhone\n\n1. Make sure your iPhone and laptop are on the **same WiFi network**\n2. Open **Safari** on iPhone\n3. Navigate to: `http://[YOUR-LAPTOP-IP]:5001/voice`\n   - Example: `http://192.168.1.42:5001/voice`\n4. On first use, Safari will prompt: **\"[site] would like to access the microphone\"** \u2014 tap **Allow**\n5. The recorder page appears with your configured buttons\n\n**Add to Home Screen (optional):**\n- Tap the Share button (box with arrow) \u2192 **Add to Home Screen**\n- This creates a bookmark icon that opens the recorder directly\n\n---\n\n### 5. Managing Buttons\n\nButtons are configured in GAME settings \u2014 not in code. Each button needs:\n\n| Field | Description | Example |\n|-------|-------------|---------|\n| Button Text | Label shown on the button | `BOOK IDEAS` |\n| File to Append To | Path relative to `$PROJECTS_DIR` | `TheTruth/ideas.md` |\n| Color | Hex background color | `#fdab3d` |\n\n`$PROJECTS_DIR` is set in your GAME `.env` file. A target of `TheTruth/ideas.md` resolves to `{PROJECTS_DIR}/TheTruth/ideas.md`. The file and any missing parent directories are created automatically on first use.\n\n\u2192 [Manage Buttons](/settings/voiceforward/config)\n\n## Elements\n\n| Element | Description |\n|---------|-------------|\n| Section cards | Five `cc-card` blocks; each has a `cc-card-header` with section number and title |\n| Code blocks | `<pre class=\"bg-dark border rounded p-3\">` with monospace text |\n| Copy buttons | `[Copy]` button in top-right of each code block; JS copies `innerText` to clipboard; label flashes \"Copied!\" for 1.5s |\n| Internal link | Section 5 button links to `/settings/voiceforward/config` using standard Bootstrap outline button |\n\n## Data Flow\n\nNo reads or writes. Static content rendered once server-side. Template contains the full documentation text; no DB queries.\n\n## Open Questions\n\n- Should the docs page detect whether Whisper is installed and show a status indicator (installed / not installed)? Could be useful; adds a server-side check on page load.\n- Should the WSL2 portproxy section auto-populate the correct port from `$GAME_PORT`/`.env` instead of hard-coding 5001?\n",
  "SCREEN-SETTINGS-VOICEFORWARD": "# Screen: VoiceForward \u2014 Mobile Recorder\n\n**Version:** 20260328 V1\n**Description:** Mobile-optimized voice recorder page served by the GAME server. No GAME navigation bar rendered \u2014 standalone full-viewport page designed for iPhone Safari.\n\n## Route\n\n```\nGET /voice\n```\n\nNot nested under `/settings/`. Standalone route with no top bar or sub-bar. Intended to be bookmarked on iPhone home screen.\n\n## Layout\n\nFull viewport, single centered column, max-width 480px. Dark theme (matching GAME's `data-bs-theme=\"dark\"`). Large touch targets throughout.\n\n```\n\u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502  VoiceForward              \u2699   \u2502  \u2190 header; \u2699 links to /settings/voiceforward/config\n\u2502  \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500  \u2502\n\u2502                                \u2502\n\u2502  \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510  \u2502\n\u2502  \u2502       BOOK IDEAS         \u2502  \u2502  \u2190 color: #fdab3d; min height 80px\n\u2502  \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518  \u2502\n\u2502                                \u2502\n\u2502  \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510  \u2502\n\u2502  \u2502        GAME SPEC         \u2502  \u2502  \u2190 color: #0073ea\n\u2502  \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518  \u2502\n\u2502                                \u2502\n\u2502  \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510  \u2502\n\u2502  \u2502          GAME            \u2502  \u2502  \u2190 color: #00c875\n\u2502  \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518  \u2502\n\u2502                                \u2502\n\u2502  \u250c\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510  \u2502  \u2190 result card (hidden until recording completes)\n\u2502  \u2502  \u2713 Saved to GAME/q...    \u2502  \u2502\n\u2502  \u2502  \"Check the queue and    \u2502  \u2502\n\u2502  \u2502   run daily build\"       \u2502  \u2502\n\u2502  \u2502  2026-03-28 14:32        \u2502  \u2502\n\u2502  \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518  \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\n## Elements\n\n| Element | Description |\n|---------|-------------|\n| Header bar | App name \"VoiceForward\" (small, muted); gear icon (\u2699) links to `/settings/voiceforward/config` |\n| Buttons | One per active `voice_buttons` row, ORDER BY sort_order; full width, min 80px tall, 8px border-radius, bold uppercase label, 18px font |\n| Result card | Hidden on load; shown below buttons after each recording completes |\n| Error banner | Red Bootstrap alert; shown on upload or transcription failure; includes Retry button |\n\n## Button State Machine\n\nEach button cycles through states independently. Only one recording may be active at a time \u2014 all other buttons are disabled while a recording is in progress.\n\n| State | Visual | Behavior |\n|-------|--------|----------|\n| **Idle** | Normal button color | Tap \u2192 request mic permission if needed; start MediaRecorder; transition to Recording |\n| **Recording** | Button pulses (CSS animation on `box-shadow`); label shows `\u23fa 0:12`; timer increments | Tap again \u2192 stop recording; OR auto-stop at 60 seconds |\n| **Uploading** | Button shows spinner; label `Uploading\u2026` | POSTing multipart audio + label to `/api/voice/upload` |\n| **Done** | Button flashes green briefly, returns to Idle | Result card updated with text + target file + timestamp |\n| **Error** | Red banner appears below buttons | Retry button re-submits the last recorded audio blob |\n\n## Recording\n\n- Uses `MediaRecorder` browser API (webm/ogg format)\n- Audio blob held in memory until upload completes; not stored to phone\n- On permission denied: show inline message \"Microphone access is required\"\n- On browser not supporting MediaRecorder: show \"This browser does not support recording. Use Safari on iOS 14.3+\"\n\n## Result Card\n\n| Field | Content |\n|-------|---------|\n| Status icon | \u2713 (green checkmark) |\n| Destination | `Saved to {target_file}` (truncated with `\u2026` if long) |\n| Transcript | Full transcribed text, wrapping |\n| Timestamp | `YYYY-MM-DD HH:MM` |\n\nCard is replaced on each new successful recording.\n\n## Data Flow\n\n| Reads | Writes |\n|-------|--------|\n| `GET /voice` \u2192 renders buttons from `voice_buttons` (server-side, on page load) | `POST /api/voice/upload` \u2192 appends to target file on server |\n\nButtons are rendered server-side at page load. No dynamic HTMX reloading of buttons during a session.\n\n## Open Questions\n\n- Should the page auto-refresh the button list periodically in case buttons are reconfigured from the desktop? Not in V1 \u2014 a manual page refresh is sufficient.\n- Should completed recordings be visually logged in a scrollable history section below the result card? Could be useful; defer to V2.\n",
  "SPEC_SCORECARD": "# Specification Scorecard: GAME\n\n**Generated:** 2026-03-26\n**Status:** PROTOTYPE\n\n## Dimension Scores\n\n| Dimension | Score | Rationale |\n|-----------|-------|-----------|\n| Completeness | 7/10 | All core screens and flows are specified; CLI gateway, has_tests/has_specs schema, and 3 screen specifications remain unwritten. |\n| Buildability | 8/10 | ARCHITECTURE.md names every module with entry points, DATABASE.md has full schemas, and FUNCTIONALITY.md has 13 concrete flows \u2014 an agent could build the core platform without guessing. |\n| Internal Consistency | 7/10 | DATABASE.md defers healthcheck table schemas to FEATURE-HEALTHCHECK.md while claiming to be the authoritative source; `tickets` table is superseded but retained; tag_colors.json migration path is informal. |\n| Architecture Clarity | 9/10 | All five backend modules are documented with signatures and threading model; routes table is complete and current; directory layout and configuration variables are fully specified. |\n| Screen Coverage | 7/10 | 15 screen specifications cover all navigable surfaces; SCREEN-PROTOTYPES-DETAIL, SCREEN-SETTINGS-LOGFILTER, and SCREEN-SETTINGS-WORKFLOWS are missing despite being referenced or implied by existing screens. |\n| Rules Alignment | 8/10 | METADATA.md, AGENTS.md, and directory layout conform to PROTOTYPE-level rules; `docs/` is used correctly; no tests/ or bin/test.sh yet, which is only required at ACTIVE. |\n| Open Questions Hygiene | 8/10 | Open Questions sections are substantive and actionable (ARCHITECTURE.md resolves one inline; DATABASE.md lists five concrete deferred decisions), with no empty placeholder sections found. |\n| **Overall** | **7.7/10** | Weighted average \u2014 strong core, specification gaps concentrated in secondary screens and the CLI gateway. |\n\n## Gap Summary\n\n| Priority | Open | Closed | Total |\n|----------|------|--------|-------|\n| P0 | 2 | 3 | 5 |\n| P1 | 2 | 8 | 10 |\n| P2 | 4 | 1 | 5 |\n| P3+ | 26 | 5 | 31 |\n\n## Priority Actions\n\n1. **[P0] CLI/Bash Gateway** \u2014 write `FEATURE-CLI-GATEWAY.md` specifying `bin/game-cli.sh` commands (catalog, run, health, status, log) so the platform is usable headlessly from other project scripts.\n2. **[P1] has_tests / has_specs schema** \u2014 add `has_tests` and `has_specs` columns to the `projects` table in DATABASE.md and the Field Source Mapping table; they are referenced by SCREEN-PROJECTS-VALIDATION.md but have no schema definition.\n3. **[P2] Log filter rule editor** \u2014 write `SCREEN-SETTINGS-LOGFILTER.md` for the `log_filter` table UI; without it, operators must edit classification rules directly in SQLite, making production log tuning impractical.\n4. **[P2] Prototype detail view** \u2014 write `SCREEN-PROTOTYPES-DETAIL.md` for `GET /prototypes/{name}`; the route is referenced in SCREEN-PROTOTYPES.md and ARCHITECTURE.md but the screen itself is unspecified.\n5. **[P2] AI agent submission mechanism** \u2014 resolve how READY tickets are handed off to an AI agent (queue, webhook, or direct Claude API call) and write either a concrete flow in FUNCTIONALITY.md or a new `FEATURE-AI-SUBMISSION.md`.\n\n## What This Specification Does Well\n\n- **Architecture depth:** Every backend module (`scanner.py`, `ops.py`, `spawn.py`, `publisher.py`, `monitoring.py`, `scheduler.py`) is named, described, and given a function signature \u2014 unusually complete for a PROTOTYPE specification.\n- **Route completeness:** The routes table covers 30+ endpoints with method, path, return type, and trigger, giving an agent a full map of the HTTP surface without reading any code.\n- **Database schema rigour:** All production tables have column-level definitions with types, defaults, and source attribution; the field source mapping table removes ambiguity about where every DB column originates.\n- **UI standards:** `UI-GENERAL.md` defines a consistent design language (dark theme, HTMX conventions, badge styles, filter bar patterns) that lets any screen specification stay concise by cross-referencing rather than repeating layout rules.\n\n## Regenerate\n\n```bash\nbash bin/spec_iterate.sh GAME\n```\n",
  "UI-GENERAL": "# UI General Standards\n\n**Version:** 20260320 V1  \n**Description:** Shared UI patterns and conventions across all screens\n\n**Shared UI patterns, components, and conventions used across all screens.**\n\nAll SCREEN-*.md files reference this document for shared elements. Screen specifications define only what is unique to that screen.\n\n---\n\n## Theme\n\nDark theme using Bootstrap 5 `data-bs-theme=\"dark\"`. Custom CSS in `static/style.css` extends Bootstrap with platform-specific variables:\n\n| Variable | Purpose | Value |\n|----------|---------|-------|\n| `--cc-surface` | Card/panel background | Dark surface |\n| `--cc-border` | Border color | Subtle dark border |\n| `--cc-muted` | Secondary text | Muted gray |\n\nNo JS build step. Bootstrap 5 via CDN. HTMX via CDN.\n\n---\n\n## Navigation Bar\n\nThree-tier navigation. Top bar is always visible. Sub-bars appear when their respective top-level items are active.\n\n### Top Bar\n\nFixed. Present on all screens. Components left to right:\n\n| Element | Behavior |\n|---------|----------|\n| **Brand** (`cc-brand`) | App name (\ud83c\udfae icon or command-line symbol). Click \u2192 Dashboard (`/`). |\n| **Top-level tabs** | Each tab has an icon before the label. Welcome (\ud83c\udfe0), Projects (\ud83d\udcc1), Processes (\u2699\ufe0f), Monitoring (\ud83d\udcca), Workflow (\ud83d\udccb), Publisher (\ud83d\udce2), Catalog (\ud83d\udcda), Prototypes (\ud83d\ude80). Active tab highlighted. Welcome is leftmost and is the default. |\n| **Documentation button** | Opens `docs/index.html` in new tab. |\n| **Settings** (gear icon) | \u2699\ufe0f Settings (far right). Click \u2192 activates Settings context and displays Settings sub-bar below. |\n| **Running badges** | Green pill badges for each currently-running project. Click \u2192 project detail. |\n\n### Project Sub-Bar\n\nVisible only when `Projects` is active in the top bar. Renders directly below the top bar.\n\n| Element | Position | Behavior |\n|---------|----------|----------|\n| **Dashboard** tab | Left | Links to `/` \u2014 default project list |\n| **Configuration** tab | Left | Links to `/project-config` \u2014 batch metadata editor |\n| **Rescan button** | Right | Text: \"Rescan Your Projects\". POST `/api/scan` on click, refreshes project list. |\n| **Filter button** | Right | Cycling view filter: `normal \u2192 all \u2192 idea \u2192 archive \u2192 normal`. State is a URL query param (`?filter=`). |\n\nDashboard is the default sub-tab when Projects is first selected. All SCREEN-DEFAULT-based screens render in this Projects context.\n\n### Settings Sub-Bar\n\nVisible only when `Settings` (gear icon in top bar) is active. Renders directly below the top bar, replacing the Project Sub-Bar.\n\n| Element | Position | Behavior |\n|---------|----------|----------|\n| **General** tab | Left | Links to `/settings/general` \u2014 application settings |\n| **Tags** tab | Left | Links to `/settings/tags` \u2014 tag color configuration |\n| **Help** tab | Left | Links to `/settings/help` \u2014 application help |\n| **Voice** tab | Left | Links to `/settings/voiceforward/config` \u2014 voice button management |\n| **Voice Docs** tab | Left | Links to `/settings/voiceforward/docs` \u2014 phone setup documentation |\n\nGeneral is the default sub-tab when Settings is first selected.\n\n---\n\n## Standard Row Header\n\nSeveral screens share a standard row header pattern for project rows:\n\n| Column | Content | Width |\n|--------|---------|-------|\n| Status badge | Colored pill: IDEA/PROTOTYPE/ACTIVE/PRODUCTION/ARCHIVED | Fixed |\n| Project icon | Emoji or type icon | Fixed |\n| Display name | `display_name` from METADATA.md, clickable | Flex |\n\nThis pattern appears on: Dashboard, Configuration, Processes (as project column), Publisher.\n\nStatus badge colors:\n\n| Status | Color | Hex |\n|--------|-------|-----|\n| IDEA | Slate | `#94a3b8` |\n| PROTOTYPE | Amber | `#fdab3d` |\n| ACTIVE | Blue | `#0073ea` |\n| PRODUCTION | Green | `#00c875` |\n| ARCHIVED | Gray | `#4a5568` |\n\n---\n\n## Settings Icon (Cog)\n\nUsed on multiple screens. The cog icon opens a detail/edit view for the project's METADATA.md fields. Context-dependent behavior:\n\n| Screen | Cog Action |\n|--------|------------|\n| Dashboard | Opens project detail with inline editing |\n| Configuration | Opens full METADATA.md field editor |\n| Publisher | Opens publication field editor |\n\n---\n\n## Tag Pills\n\nTags render as small colored pills. Color from `tag_colors` table/config. Inline editable on some screens.\n\n```html\n<span class=\"badge\" style=\"background: {tag_color}\">{tag_name}</span>\n```\n\n---\n\n## Cards\n\nContent panels use a card pattern:\n\n```html\n<div class=\"cc-card\">\n    <div class=\"cc-card-header\">Section Title</div>\n    <div style=\"padding: 1rem\">\n        <!-- content -->\n    </div>\n</div>\n```\n\n---\n\n## Modals\n\nTwo global modals defined in `base.html`:\n\n| Modal | ID | Purpose |\n|-------|----|---------|\n| CLAUDE.md Viewer | `claudeModal` | Shows AGENTS.md content for a project |\n| Command Output | `opOutputModal` | Shows operation stdout/stderr output |\n\nModals use dark surface background with themed borders.\n\n---\n\n## HTMX Conventions\n\nAll screen interactions use HTMX partial page updates:\n\n| Pattern | Usage |\n|---------|-------|\n| `hx-get` | Load fragments (project detail, log content) |\n| `hx-post` | Trigger actions (run op, stop, push, scan) |\n| `hx-target` | Replace specific DOM element with response |\n| `hx-swap` | Usually `innerHTML` or `outerHTML` |\n| `hx-trigger` | Click (default), or custom events |\n\nServer returns HTML fragments, never JSON (except `/health`).\n\n---\n\n## Operation Buttons\n\nRendered per-operation on dashboard rows and project detail:\n\n| State | Appearance | Action |\n|-------|------------|--------|\n| Idle | `op-btn` styled button with operation name | Click --> run |\n| Running | Green pulsing indicator, \"Stop\" label | Click --> SIGTERM |\n| Recently completed | Brief success/error flash | Auto-reverts to idle |\n\nCategory determines button style:\n\n| Category | Style Class |\n|----------|-------------|\n| `service` | `op-btn--service` |\n| `local` | `op-btn--local` |\n| `maintenance` | `op-btn--maintenance` |\n\n---\n\n## Filter Bar\n\nDashboard and other list screens share a filter pattern:\n\n| Filter | Type | Behavior |\n|--------|------|----------|\n| Text search | Input field | Filters rows by name/description match |\n| Status filter | Pill buttons | Toggle visibility by status |\n| Tag filter | Pill buttons | Filter by selected tags |\n| Namespace filter | Dropdown | Filter by namespace |\n\nFilters are client-side (no server round-trip) for responsiveness.\n\n---\n\n## Flash Messages\n\nStandard Bootstrap 5 alert dismissible pattern. Categories: `success`, `danger`, `warning`, `info`.\n\n---\n\n## Typography\n\nSystem font stack (no web fonts). Monospace for logs and code output.\n\n| Element | Font | Size |\n|---------|------|------|\n| Body | System sans-serif | 14px |\n| Headings | System sans-serif | 16-20px |\n| Log output | System monospace | 13px |\n| Badges/pills | System sans-serif | 11px |\n\n---\n\n## Responsive Behavior\n\nDesigned for desktop use (operations center). Minimum supported width: 1024px. Nav bar scrolls horizontally on smaller screens. No mobile-first breakpoints.\n\n## Open Questions\n\n- Should the nav bar's top-level tabs be configurable (show/hide per user preference)? Not in V1 \u2014 all tabs are always visible. A future settings option could hide infrequently-used tabs.\n- Should running badges in the nav bar auto-dismiss after a configurable timeout? Yes \u2014 badges clear when the process exits (already the design). No timeout behavior needed.\n",
};

marked.setOptions({ gfm: true, breaks: false });

function groupFiles(keys) {
  const coreSet = new Set(['README', 'INTENT', 'ARCHITECTURE', 'DATABASE', 'UI', 'UI-GENERAL']);
  const featureSet = new Set(['FEATURE_MAP', 'FUNCTIONALITY']);
  const groups = { 'Project Core': [], 'Project Features': [], 'Screens': [], 'Other': [] };
  keys.forEach(k => {
    if (k === 'METADATA') return;
    if (coreSet.has(k)) groups['Project Core'].push(k);
    else if (featureSet.has(k) || k.startsWith('FEATURE-')) groups['Project Features'].push(k);
    else if (k.startsWith('SCREEN-')) groups.Screens.push(k);
    else groups.Other.push(k);
  });
  return groups;
}

function parseMeta(text) {
  const f = {};
  text.split('\n').forEach(line => {
    const m = line.match(/^([\w]+):\s*(.*)/);
    if (m) f[m[1]] = m[2].trim();
  });
  return f;
}

function buildNav(groups) {
  const nav = document.getElementById('nav');
  const order = ['Project Core', 'Project Features', 'Screens', 'Other'];
  order.forEach(group => {
    const files = groups[group];
    if (!files.length) return;
    const div = document.createElement('div');
    div.innerHTML = '<div class="nav-group-label">' + group + '</div>';
    files.forEach(key => {
      const a = document.createElement('a');
      a.className = 'nav-item';
      a.textContent = key + '.md';
      a.dataset.key = key;
      a.onclick = () => showDoc(key);
      div.appendChild(a);
    });
    nav.appendChild(div);
    nav.appendChild(Object.assign(document.createElement('div'), { className: 'nav-sep' }));
  });
}

function buildProjectCard(meta) {
  const card = document.getElementById('project-card');
  const name = meta.display_name || meta.name || '';
  const title = meta.title || '';
  const desc = meta.short_description || '';
  card.innerHTML =
    '<div class="pc-name">' + name + '</div>' +
    (title ? '<div class="pc-title">' + title + '</div>' : '') +
    (desc  ? '<div class="pc-desc">'  + desc  + '</div>' : '');
}

function buildFileGrid(groups) {
  const area = document.getElementById('file-grid-area');
  const order = ['Project Core', 'Project Features', 'Screens', 'Other'];
  let html = '';
  order.forEach(group => {
    const files = groups[group];
    if (!files.length) return;
    html += '<div class="group-label">' + group + '</div><div class="file-grid">';
    files.forEach(key => {
      html += '<div class="file-card" data-key="' + key + '" onclick="showDoc(\'' + key + '\')">' + key + '.md</div>';
    });
    html += '</div>';
  });
  area.innerHTML = html;
}

function showDoc(key) {
  if (!DOCS[key]) return;
  // File grid stays visible as navigation header
  const dc = document.getElementById('doc-content');
  dc.style.display = 'block';
  dc.innerHTML = marked.parse(DOCS[key]);
  document.getElementById('doc-sep').className = 'doc-sep visible';
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.file-card').forEach(el => el.classList.remove('active'));
  const navLink = document.querySelector('.nav-item[data-key="' + key + '"]');
  if (navLink) { navLink.classList.add('active'); navLink.scrollIntoView({ block: 'nearest' }); }
  const card = document.querySelector('.file-card[data-key="' + key + '"]');
  if (card) card.classList.add('active');
  dc.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

const keys = Object.keys(DOCS).sort();
const groups = groupFiles(keys);
const meta = DOCS['METADATA'] ? parseMeta(DOCS['METADATA']) : {};
buildProjectCard(meta);
buildNav(groups);
buildFileGrid(groups);

// Iframe embed mode — hide navigation chrome, content fills full width
if (window !== window.top) {
  document.getElementById('topbar').style.display = 'none';
  document.getElementById('sidebar').style.display = 'none';
}
