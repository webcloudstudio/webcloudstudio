<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GAME — Specification</title>
<link rel="stylesheet" href="../doc/styles/spec.css">
<style>
*, *::before, *::after { box-sizing: border-box; }
body {
  display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden;
  background: var(--c-bg); color: var(--c-text);
  font-family: 'Segoe UI', 'Trebuchet MS', Arial, sans-serif; font-size: 14px; line-height: 1.5;
}

/* ── Topbar (hidden in iframe embed) ── */
#topbar {
  display: flex; align-items: center;
  background: var(--c-topbar-bg); border-bottom: 1px solid var(--c-side-border);
  height: 40px; flex-shrink: 0;
}
.tb-brand {
  font-size: 13px; font-weight: 700; color: #fff;
  padding: 0 16px; height: 100%; display: flex; align-items: center;
  border-right: 1px solid var(--c-side-border); text-decoration: none; white-space: nowrap;
}
.tb-brand b { color: var(--c-accent); margin-right: 5px; }
.tb-brand:hover { background: rgba(255,255,255,.07); }
.tb-crumb {
  font-size: 12.5px; color: var(--c-side-link);
  padding: 0 14px; height: 100%; display: flex; align-items: center; gap: 5px;
}
.tb-crumb-sep { color: var(--c-side-section); }
.tb-crumb-name { color: #fff; font-weight: 600; }
.tb-spacer { flex: 1; }
.tb-btn {
  font-size: 12px; color: var(--c-side-link);
  padding: 0 14px; height: 100%; display: flex; align-items: center;
  border-left: 1px solid var(--c-side-border); text-decoration: none; white-space: nowrap;
  transition: color .1s, background .1s;
}
.tb-btn:hover { color: #fff; background: rgba(255,255,255,.07); }

/* ── Main ── */
#main { display: flex; flex: 1; overflow: hidden; }

/* ── Sidebar (hidden in iframe embed) ── */
#sidebar {
  width: 200px; min-width: 200px; background: var(--c-side-bg);
  border-right: 1px solid var(--c-side-border);
  overflow-y: auto; display: flex; flex-direction: column;
}
#sidebar::-webkit-scrollbar { width: 4px; }
#sidebar::-webkit-scrollbar-thumb { background: var(--c-side-border); border-radius: 2px; }
.nav-sep { border-top: 1px solid var(--c-side-border); margin: 5px 0; }
.nav-group-label {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--c-side-section); padding: 8px 14px 3px;
}
.nav-item {
  display: block; padding: 3px 12px 3px 14px;
  font-family: 'Cascadia Code', Consolas, monospace; font-size: 11px;
  color: #fff; cursor: pointer;
  border-left: 3px solid transparent; transition: all .1s; text-decoration: none;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.nav-item:hover { color: #fff; background: rgba(255,255,255,.06); border-left-color: var(--c-accent); }
.nav-item.active { color: var(--c-accent); border-left-color: var(--c-accent); background: rgba(44,182,125,.07); }

/* ── Content ── */
#content { flex: 1; overflow-y: auto; padding: 16px 20px 32px; }

/* ── Project info card ── */
.project-card {
  background: var(--c-side-bg); border: 1px solid var(--c-side-border);
  border-radius: 5px; padding: 10px 14px; margin-bottom: 10px;
}
.pc-name { color: #fff; font-size: 18px; font-weight: 700; margin: 0 0 1px; }
.pc-title { color: var(--c-accent); font-size: 12px; font-weight: 500; margin: 0 0 3px; }
.pc-desc { color: var(--c-side-link); font-size: 12px; line-height: 1.4; margin: 0; }

/* ── File grid ── */
.group-label {
  font-size: 9px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--c-accent);
  margin: 10px 0 3px; padding-bottom: 2px;
  border-bottom: 1px solid rgba(44,182,125,0.25);
}
.file-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 3px; margin-bottom: 3px;
}
.file-card {
  background: var(--c-bg); border: 1px solid var(--c-td-border); border-radius: 3px;
  padding: 4px 8px; cursor: pointer; transition: border-color .12s; text-decoration: none;
  font-family: 'Cascadia Code', Consolas, monospace; font-size: 11.5px;
  color: var(--c-h2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.file-card:hover { border-color: var(--c-accent); color: var(--c-accent); }
.file-card.active { border-color: var(--c-accent); background: var(--c-callout-bg); color: var(--c-accent); }

/* ── Doc separator ── */
.doc-sep { border: none; border-top: 1px solid var(--c-td-border); margin: 12px 0 16px; display: none; }
.doc-sep.visible { display: block; }

/* ── Rendered markdown ── */
#doc-content { display: none; }
.md h1 { font-size: 20px; font-weight: 700; color: var(--c-h1); border-bottom: 2px solid var(--c-h1-border); padding-bottom: 4px; margin: 16px 0 10px; }
.md h1:first-child { margin-top: 0; }
.md h2 { font-size: 14px; font-weight: 600; color: var(--c-h2); border-bottom: 1px solid var(--c-h2-border); padding-bottom: 3px; margin: 14px 0 6px; }
.md h3 { font-size: 13px; font-weight: 600; color: var(--c-h3); margin: 10px 0 4px; }
.md h4 { font-size: 12px; font-weight: 600; color: var(--c-h3); margin: 8px 0 3px; }
.md p { margin: 6px 0; line-height: 1.6; }
.md ul, .md ol { margin: 4px 0 4px 16px; line-height: 1.6; }
.md li { margin: 2px 0; }
.md a { color: #1565C0; text-decoration: underline; }
.md a:visited { color: #1565C0; }
.md table { border-collapse: collapse; margin: 8px 0; font-size: 13px; width: 100%; }
.md th { background: var(--c-th-bg); color: var(--c-th-text); font-weight: 600; padding: 4px 10px; text-align: left; }
.md td { padding: 3px 10px; border-bottom: 1px solid var(--c-td-border); }
.md tr:nth-child(even) td { background: var(--c-tr-alt); }
.md pre { background: var(--c-pre-bg); color: var(--c-pre-text); border: 1px solid var(--c-side-border); border-radius: 4px; padding: 10px 12px; overflow-x: auto; margin: 6px 0; font-size: 12px; line-height: 1.5; }
.md code { font-family: 'Cascadia Code', Consolas, monospace; font-size: 12px; background: var(--c-code-bg); color: var(--c-code-text); padding: 1px 4px; border-radius: 3px; }
.md pre code { background: none; padding: 0; color: inherit; }
.md blockquote { border-left: 3px solid var(--c-accent); padding: 5px 10px; margin: 6px 0; background: var(--c-callout-bg); border-radius: 0 4px 4px 0; }
.md hr { border: none; border-top: 1px solid var(--c-td-border); margin: 12px 0; }
</style>
</head>

const DOCS = {
  "AC-001-MANUAL": "The scanner, health poller, and log ingestor must not all commit to the DB simultaneously at startup. Bump SQLite's default 5s lock timeout to 30s in both get_db() and _get_raw_connection().",
  "ACCEPTANCE_CRITERIA": "# Acceptance Criteria\n\n**Version:** 20260323 V1\n**Build-ref:** oneshot/GAME/2026-03-22.1\n**Purpose:** Testable MUST/MUST NOT statements discovered during prototype iteration.\n\n> Format: Grouped by topic. Each group has a `**Target:**` line naming the specification file(s) it refines. Each criterion uses MUST/MUST NOT. When folded into the target specification, move to `## Folded` at the bottom.\n\n---\n\n## Documentation Serving\n**Target:** FUNCTIONALITY.md (Flow 1), SCREEN-PROJECT.md\n\n- Documentation MUST be served from a single `docs/` directory per project\n- The master file is index.html.\n- If documentation is produced in `doc/`, change the process to move it to `docs/`.\n- Application documentation MUST resolve CSS and asset references that use relative paths within the `docs/` directory tree.\n- Scanner MUST detect `docs/index.html` for the `has_docs` flag.\n\n## Default Landing Screen\n**Target:** SCREEN-PROJECTS-WELCOME.md, UI-GENERAL.md\n\n- `GET /` MUST redirect to `/welcome` \u2014 Welcome is the default landing screen.\n- The Welcome tab MUST be active (highlighted) when the application first loads.\n- The top navigation brand link MUST navigate to `/welcome`, not `/`.\n\n## Environment Setup\n**Target:** ARCHITECTURE.md (Configuration section)\n\n- Only `SECRET_KEY` and `PROJECTS_DIR` are required to start the application.\n- `PROJECTS_DIR` SHOULD be set to the parent directory of the GAME project (e.g. `..` resolved to an absolute path).\n- `APP_PORT` is NOT a valid env var \u2014 configuration reads `GAME_PORT`; port also defaults from `METADATA.md`.\n- All other env vars (`DATABASE_PATH`, `GAME_PORT`, `FLASK_DEBUG`, `FLASK_ENV`) are optional with working defaults and MUST NOT be required for a first run.\n\n## Script Conventions\n**Target:** ARCHITECTURE.md, FUNCTIONALITY.md (Flow 2)\n\n- bin/ shell scripts MUST NOT contain Windows line endings (CR+LF).\n- Test suite SHOULD verify no `\\r` exists in any `.sh` or `.py` file under `bin/`.\n\n---\n\n## Folded\n<!-- Criteria that have been incorporated into their target specification files. Keep for history. -->\n\n",
  "ARCHITECTURE": "# Architecture\n\n**Version:** 20260320 V1  \n**Description:** Module layout, routes, and directory structure\n\n**Flask app with blueprints.** App factory pattern. Scanner, process engine, and publisher are backend modules that feed data to the screen routes.\n\n---\n\n## App Factory\n\n`create_app()` in `app.py`. Returns a configured Flask instance.\n\n1. Load config from environment and `.env`\n2. Initialize SQLite database (create tables if missing, run migrations)\n3. Register blueprints\n4. Start async project scan on first request\n\n## Blueprints\n\nSingle blueprint `cc` registered on `/`. All routes live in `routes.py`.\n\n## Backend Modules\n\n### Scanner (`scanner.py`)\n\nScans `$PROJECTS_DIR` for project directories. For each:\n1. Read METADATA.md \u2192 parse key:value fields\n2. Read AGENTS.md / CLAUDE.md \u2192 extract endpoints, bookmarks\n3. Read bin/ scripts \u2192 parse CommandCenter headers (any language: sh, py, js, pl)\n4. Upsert into `projects` and `operations` tables\n\nRuns asynchronously on startup (not blocking first page load). Triggered manually by rescan button.\n\n**Script header detection:** The scanner reads the first 20 lines of every executable file in `bin/`. Any script containing `# CommandCenter Operation` is registered as an operation. Supported languages: Bash, Python, Perl, JavaScript, Ruby \u2014 any language using `#` comments. This enables self-documentation as a core platform feature.\n\n### Process Engine (`ops.py` + `spawn.py`)\n\nLaunches bin/ scripts as background subprocesses.\n\n1. Receive launch request (project_id, operation_id)\n2. Create `runs` record with status STARTING\n3. Fork subprocess: execute script from project root\n4. Capture stdout/stderr to log file: `logs/{project}_{script}_{yyyymmdd_hhmmss}.log`\n5. Parse `[$PROJECT_NAME]` lines from output for status transitions\n6. Update `runs` record on exit (status, exit_code, finished_at)\n\nProvides: `launch(project_id, operation_id)`, `stop(run_id)`, `get_running()`, `get_log(run_id)`.\n\n### Publisher (`publisher.py` \u2192 `bin/homepage_build.py`)\n\nBuilds static portfolio site from METADATA.md fields using Jinja2 templates. No Astro, no npm.\n\n1. Optionally sync templates from `$SPECIFICATIONS_PATH/GAME/templates/` \u2192 `$PUBLISHER_TARGET/templates/`\n2. Load `config/site_config.md` (YAML frontmatter + Markdown body \u2192 `home_html`)\n3. Scan `$PROJECTS_DIR` for projects where `show_on_homepage = true`; resolve card fields and tag colors\n4. Render `$PUBLISHER_TARGET/templates/*.j2` with Jinja2 \u2192 write to `$PUBLISHER_TARGET/publish/`\n5. Copy static assets (images, diagrams, project docs) to `$PUBLISHER_TARGET/publish/`\n\n**Scripts:**\n\n| Script | Purpose |\n|--------|---------|\n| `bin/homepage_build.sh` | Bash wrapper; delegates to `homepage_build.py` |\n| `bin/homepage_review.sh` | Serve `$PUBLISHER_TARGET/publish/` via `python3 -m http.server` |\n| `bin/homepage_publish.sh` | `git add -A && git commit && git push origin main` in `$PUBLISHER_TARGET` |\n\nDeprecated: `bin/RebuildYourHomepage.sh`, `bin/LocalPreview.sh`, `bin/PushAndPublish.sh`.\n\n**New env vars:**\n\n| Variable | Default | Purpose |\n|----------|---------|---------|\n| `PUBLISHER_TARGET` | sibling `My_Github/` | TARGET directory (configurable on install) |\n| `HOMEPAGE_PREVIEW_PORT` | `4321` | Port for `homepage_review.sh` |\n\nSee `HOMEPAGE-PUBLISHER.md` for full specification including template variable contract and build algorithm.\n\n### Health Monitor (`monitoring.py`)\n\nPeriodic service health poller and log event ingestor. Runs as two background threads started at app startup.\n\n**Poller thread:** Checks each project with a port or `health_check_type`. Performs HTTP GET or TCP connect; writes `heartbeats` and `health_check_log`; appends `events` on state change. Per-project interval from `health_check_interval` column (default 60s).\n\n**Log ingestor thread:** Runs every 60 seconds. Incrementally reads new bytes from `{project.path}/data/logs/*.log` using cursor positions in `log_positions`. Classifies lines against `log_filter` rules; writes matched lines to `events`. `junk` lines are discarded.\n\nProvides: `start_poller()`, `stop_poller()`, `poll_now()`, `ingest_now()`.\n\n### Scheduler (`scheduler.py`)\n\nBackground cron loop. Started at app startup. Runs every 60 seconds.\n\nQueries `operations` where `schedule IS NOT NULL AND schedule_enabled = 1`. Evaluates each cron expression against current time using a standard cron parser. On match, delegates to the process engine (`ops.py`) to launch the operation. Tracks `last_scheduled_run` and calculates `next_scheduled_run`. On startup, checks for missed runs and fires one catch-up per operation.\n\nProvides: `start_scheduler()`, `stop_scheduler()`, `tick()`.\n\n### Service Registry (`service_registry.py`)\n\nDiscovers and manages platform services. On startup (after project scan), scans for service manifests:\n\n1. **Platform services** \u2014 `services/*.service.yaml` within the GAME project directory\n2. **Project services** \u2014 `{project}/services/*.service.yaml` for each managed project\n3. **MCP servers** \u2014 `{project}/mcp/*.service.yaml` for MCP-enabled services\n\nFor each manifest: parse name, description, version, transports, and tool definitions. Upsert into `services` and `service_tools` tables. Services removed from disk are marked `is_active = 0`.\n\nProvides: `scan_services()`, `get_service(name)`, `get_all_services()`, `dispatch_tool(service, tool, inputs)`.\n\n**Tool dispatch:** The `dispatch_tool()` function is the generic entry point for all service calls. It resolves the service, validates inputs against the tool's schema, and delegates to the appropriate handler module. Platform services (batch-runner, workflow, async-queue) have Python handler functions. Project services with `rest: true` are proxied to the project's endpoint if it has a port. MCP services delegate to the MCP server process.\n\n### MCP Host (`mcp_host.py`)\n\nManages the lifecycle of developer-created MCP servers. See FEATURE-MCP-Hosting.md for full specification.\n\n1. Discovers MCP server manifests during service scan (`mcp/*.service.yaml`)\n2. Registers entries in `mcp_servers` table\n3. Starts/stops MCP server processes on expose/unexpose (delegates to process engine)\n4. Assigns ports from configurable range (default 9100-9199)\n5. Generates `.mcp.json` config snippets for developers\n\nProvides: `get_mcp_servers()`, `start_mcp(id)`, `stop_mcp(id)`, `expose(id)`, `unexpose(id)`, `get_config_snippet(id)`.\n\n### Workflow Engine (`workflow_engine.py`)\n\nGeneric state machine service. See FEATURE-Workflow-Service.md for full specification.\n\n1. Loads workflow templates from `workflow_templates` table (seeded from YAML on first startup)\n2. Creates workflow instances with initial state from template\n3. Validates and executes state transitions\n4. Records transition history\n5. Emits `workflow_transition` events\n\nProvides: `create_workflow(name, type, project, payload)`, `transition(id, to_state, comment)`, `get_status(id)`, `list_workflows(filters)`, `list_types()`.\n\n### AsyncQueue (`async_queue.py`)\n\nFile-based store-and-forward message queue. See FEATURE-AsyncQueue.md for full specification.\n\n1. Reads/writes JSONL files in `data/queues/`\n2. Submits messages by appending lines (no server required for file-based submit via common.py)\n3. Drains pending messages by dispatching to the service registry's `dispatch_tool()`\n4. Manages queue rotation and archival\n\nProvides: `submit(queue, service, tool, payload)`, `drain(queue)`, `get_status(id, queue)`, `list_messages(queue)`, `list_queues()`.\n\n## Routes (HTMX)\n\nAll screen interactions use HTMX for partial page updates. Server returns HTML fragments, not JSON.\n\n| Method | Path | Returns | Trigger |\n|--------|------|---------|---------|\n| GET | `/` | Full dashboard page | Page load |\n| POST | `/api/scan` | Status message | Rescan button |\n| POST | `/api/run/{op_id}` | Updated button state | Operation click |\n| POST | `/api/stop/{run_id}` | Updated button state | Stop click |\n| POST | `/api/push/{project_id}` | Git status fragment | Push button |\n| GET | `/project/{id}` | Project detail page | Name/cog click |\n| GET | `/processes` | Process list page | Nav link |\n| GET | `/processes/{run_id}/log` | Log content fragment | View Log click |\n| GET | `/publisher` | Publisher page | Nav link |\n| POST | `/publisher/build` | Build status | Rebuild button |\n| POST | `/publisher/publish` | Publish status | Publish button |\n| POST | `/publisher/{project_id}/card` | Updated card row fragment | Card field edit or checkbox |\n| GET | `/project-config` | Configuration list | Nav link |\n| GET | `/monitoring` | Monitoring page | Nav link |\n| GET | `/workflow` | Workflow board | Nav link |\n| GET | `/health` | `{\"status\":\"ok\"}` | Health check |\n| GET | `/scheduler` | Scheduler page | Nav link |\n| GET | `/servicecatalog` | Service Catalog page | Nav link |\n| GET | `/prototypes` | Prototype list | Nav link |\n| POST | `/api/prototypes/create` | JSON | New prototype scaffold |\n| GET | `/api/prototypes` | JSON | List prototype dirs |\n| GET | `/welcome` | Welcome page | Nav link (default `/`) |\n| GET | `/project-setup` | Project Setup page | Nav link |\n| GET | `/project-validation` | Validation page | Nav link |\n| GET | `/project-maintenance` | Maintenance page | Nav link |\n| GET | `/project-workflow` | Workflow screen | Nav link |\n| POST | `/api/specification-tickets` | JSON | Create specification ticket + write file |\n| POST | `/api/validate/{project_id}` | HTMX row fragment | Run validation checks |\n| GET | `/settings/general` | Settings page | Settings gear icon \u2192 General tab |\n| POST | `/settings/general` | HTMX form fragment | Save settings |\n| GET | `/settings/tags` | Tag settings page | Settings gear icon \u2192 Tags tab |\n| POST | `/settings/tags` | JSON | Save tag colors |\n| GET | `/settings/help` | Help page | Settings gear icon \u2192 Help tab |\n| GET | `/api/catalog` | JSON | Service catalog (all projects + scripts) |\n| POST | `/api/{name}/run/{script}` | JSON 202 | Fire script headlessly |\n| GET | `/api/runs/{run_id}` | JSON | Poll run status |\n| GET | `/api/runs/{run_id}/log` | JSON | Fetch run log |\n| POST | `/api/runs/{run_id}/stop` | JSON | Stop run |\n| POST | `/api/heartbeat` | JSON 200 | Record script heartbeat |\n| POST | `/api/events` | JSON 200 | Record script event |\n| POST | `/api/health/poll` | JSON | Trigger immediate health poll |\n| GET | `/api/health/{name}` | JSON | Current health for one project |\n| POST | `/api/logs/ingest` | JSON | Trigger immediate log ingest |\n| GET | `/api/github/repos` | JSON | Fetch GitHub repo list |\n| GET | `/api/services` | JSON | List all registered services |\n| GET | `/api/services/{name}` | JSON | Get one service manifest with tools |\n| POST | `/api/services/{name}/{tool}` | JSON | Generic service tool dispatch |\n| GET | `/api/mcp` | JSON | List registered MCP servers |\n| POST | `/api/mcp/{id}/start` | JSON | Start MCP server |\n| POST | `/api/mcp/{id}/stop` | JSON | Stop MCP server |\n| POST | `/api/mcp/{id}/expose` | JSON | Expose MCP server on network port |\n| POST | `/api/mcp/{id}/unexpose` | JSON | Unexpose MCP server |\n| GET | `/api/mcp/{id}/config` | JSON | Get .mcp.json snippet |\n| POST | `/api/services/workflow/create` | JSON | Create workflow instance |\n| POST | `/api/services/workflow/transition` | JSON | Transition workflow state |\n| GET | `/api/services/workflow/status` | JSON | Get workflow status + history |\n| GET | `/api/services/workflow/list` | JSON | List workflows with filters |\n| GET | `/api/services/workflow/list_types` | JSON | List workflow templates |\n| POST | `/api/services/async-queue/submit` | JSON | Submit message to queue |\n| GET | `/api/services/async-queue/status` | JSON | Check message status |\n| GET | `/api/services/async-queue/list` | JSON | List queue messages |\n| POST | `/api/services/async-queue/drain` | JSON | Drain pending messages |\n| GET | `/api/services/async-queue/list_queues` | JSON | List queues with counts |\n\n## Directory Layout\n\n```\nGAME/\n  app.py                 App factory (create_app)\n  routes.py              All routes (single blueprint: cc)\n  scanner.py             Project discovery\n  ops.py                 Operation launch/stop/status\n  spawn.py               Subprocess management\n  publisher.py           Portfolio builder\n  monitoring.py          Health poller + log ingestor (background threads)\n  scheduler.py           Cron loop for scheduled operations\n  service_registry.py    Service discovery and tool dispatch\n  mcp_host.py            MCP server lifecycle management\n  workflow_engine.py     Generic state machine service\n  async_queue.py         File-based store-and-forward queue\n  models.py              PROJECT_TYPES registry\n  db.py                  Database access helpers\n  claude_convention.py   CLAUDE.md / AGENTS.md parsing\n  templates/             Flask/Jinja2 templates\n    base.html            Layout with nav bar\n    partials/            HTMX response fragments\n  static/\n    style.css            Custom styles (Bootstrap 5 dark theme)\n  bin/\n    common.sh            Shared script functions\n    common.py            Shared Python functions\n    start.sh             Start Flask dev server\n    stop.sh              Stop server\n    build_documentation.sh  Generate docs/ and docs/index.html\n  services/\n    batch-runner.service.yaml   Platform service manifest\n    workflow.service.yaml       Platform service manifest\n    async-queue.service.yaml    Platform service manifest\n  data/\n    game.db              SQLite database\n    tag_colors.json      Tag color assignments\n    queues/              AsyncQueue JSONL files\n      queue_config.yaml  Per-queue configuration\n      archive/           Rotated completed messages\n  docs/                  Generated documentation\n  logs/                  Operation log files\n  .env                   Local environment config (gitignored)\n  .env.sample            Environment variable reference template\n```\n\n## Configuration\n\nEnvironment variables loaded from `.env` at startup (via `python-dotenv`). A `.env.sample` at the project root documents all supported variables.\n\n| Variable | Required | Default | Purpose |\n|----------|----------|---------|---------|\n| `FLASK_ENV` | No | `development` | Flask environment; `production` disables debug mode |\n| `FLASK_DEBUG` | No | `1` | Enable Flask auto-reloader and debugger |\n| `SECRET_KEY` | Yes | \u2014 | Flask session signing key |\n| `PROJECTS_DIR` | Yes | \u2014 | Absolute path to the directory containing managed projects |\n| `SPECIFICATIONS_PATH` | No | \u2014 | Absolute path to the Specifications repo (enables `has_specs` detection and Conform) |\n| `GITHUB_USERNAME` | No | \u2014 | GitHub username for Project Setup screen repo discovery |\n| `GITHUB_TOKEN` | No | \u2014 | GitHub personal access token (required for private repos) |\n| `GAME_PORT` | No | `5000` | Port the GAME server listens on |\n| `DATABASE_PATH` | No | `data/game.db` | Path to SQLite database file |\n| `MCP_PORT_RANGE_START` | No | `9100` | First port in the MCP server port range |\n| `MCP_PORT_RANGE_END` | No | `9199` | Last port in the MCP server port range |\n\n`.env.sample` ships in the repo as a reference template; `.env` is gitignored.\n\n## Open Questions\n\n- Should routes.py be split into per-screen blueprint modules as the app grows? Not at PROTOTYPE \u2014 single routes.py until the file exceeds ~800 lines or team size demands it. Per-screen blueprints add indirection without benefit at current scale.\n",
  "DATABASE": "# Database\n\n**Version:** 20260320 V1  \n**Description:** Database schema: tables, columns, and types\n\n**SQLite with WAL mode.** Single file at `data/game.db`.\n\n---\n\n## Source-of-Truth Model\n\n| Layer | Role |\n|-------|------|\n| **Project files** (`METADATA.md`, `bin/`, filesystem) | Authoritative source of truth \u2014 committed to git, editable by developer |\n| **SQLite database** | Runtime cache \u2014 the sole source of data for all UI page renders |\n| **Startup scan** | Runs automatically in a background thread every time Flask starts; populates the DB from disk |\n| **Refresh button** | Re-runs the same scan without restarting; useful when files changed mid-session |\n\n**Page rendering reads the database only.** No template, route, or partial reads a file from disk during a normal page load.\n\n**Writes go to both.** When the UI changes a value (status badge click, port inline edit, etc.), Prototyper writes to the DB immediately and then patches the same value into the project's `METADATA.md`. This keeps the file current so git history tracks changes.\n\n```\nStartup / Refresh (slow path \u2014 filesystem I/O)\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nscan_projects()\n  \u2514\u2500 for each project directory:\n       detect_project()          \u2192 reads METADATA.md, bin/ headers, filesystem flags\n       parse_metadata_md()       \u2192 reads METADATA.md key-values and ## Links table\n       scan_bin_operations()     \u2192 reads first 20 lines of each bin/*.sh / bin/*.py\n       upsert_project()          \u2192 INSERT or UPDATE into SQLite\n\nNormal page load (fast path \u2014 DB only)\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\nRoute handler\n  \u2514\u2500 db.get_all_projects()           \u2192 SELECT * FROM projects\n  \u2514\u2500 db.get_all_operations_keyed()   \u2192 SELECT * FROM operations (one query, all projects)\n  \u2514\u2500 render_template()               \u2192 Jinja renders from dicts; no file I/O\n\nUI write (status click, port edit, etc.)\n\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n  \u2514\u2500 UPDATE projects SET ...     (SQLite)\n  \u2514\u2500 patch METADATA.md           (file \u2014 keeps disk in sync)\n```\n\n---\n\n## Field Source Mapping\n\nEvery field stored in the `projects` table, its source, and when it is read.\n\n| DB Column | Source File / Method | Read On | Notes |\n|-----------|---------------------|---------|-------|\n| `name` | Directory name | Scan | Machine slug; must match directory name |\n| `display_name` | `METADATA.md` \u2192 `display_name:` | Scan | Human-readable name for UI |\n| `title` | CamelCase split of directory name | Scan | Legacy; prefer `display_name` |\n| `path` | Filesystem (`os.path.abspath`) | Scan | Absolute path to project directory |\n| `status` | `METADATA.md` \u2192 `status:` | Scan | IDEA/PROTOTYPE/ACTIVE/PRODUCTION/ARCHIVED; also writable from UI |\n| `port` | `METADATA.md` \u2192 `port:` or auto-detected from `app.py` | Scan | Integer; also writable inline from UI |\n| `stack` | `METADATA.md` \u2192 `stack:` | Scan | Slash-separated tech summary |\n| `namespace` | `METADATA.md` \u2192 `namespace:` | Scan | Default: `development`; hidden in UI when default |\n| `tags` | `METADATA.md` \u2192 `tags:` | Scan | Comma-separated string |\n| `health_endpoint` | `METADATA.md` \u2192 `health:` | Scan | Default: `/health` |\n| `desired_state` | `METADATA.md` \u2192 `desired_state:` | Scan | `running` or `on-demand` |\n| `version` | `METADATA.md` \u2192 `version:` | Scan | Format: `YYYY-MM-DD.N` |\n| `project_type` | `METADATA.md` \u2192 `project_type:` or heuristic | Scan | `software` / `book` |\n| `has_git` | `.git/` directory present | Scan | Boolean flag |\n| `has_venv` | `venv/` or `.venv/` directory present | Scan | Boolean flag |\n| `has_node` | `node_modules/` directory present | Scan | Boolean flag |\n| `has_claude` | `CLAUDE.md` file present | Scan | Boolean flag; enables CLAUDE.md modal |\n| `has_docs` | Any subdir starting with `doc` containing `index.html` or `index.htm` (glob: `*/doc*/index.htm*`) | Scan | Boolean flag; enables \ud83d\udcd6 Help button |\n| `has_tests` | `tests/` directory or `bin/test.sh` present | Scan | Boolean flag; used by Validation screen |\n| `has_specs` | `{SPECIFICATIONS_PATH}/{project.name}/` exists | Scan | Boolean flag; requires SPECIFICATIONS_PATH env var; defaults to 0 if not configured |\n| `card_title` | `METADATA.md` \u2192 `title:` (card section) | Scan | Portfolio card; overrides `display_name` if set |\n| `card_desc` | `METADATA.md` \u2192 `short_description:` or `description:` | Scan | Portfolio card description |\n| `card_tags` | `METADATA.md` \u2192 `tags:` | Scan | Portfolio card tags |\n| `card_type` | `METADATA.md` \u2192 `card_type:` | Scan | Portfolio category label |\n| `card_url` | `METADATA.md` \u2192 `card_url:` | Scan | Portfolio card link |\n| `card_image` | `METADATA.md` \u2192 `image:` | Scan | Portfolio card image filename |\n| `card_show` | `METADATA.md` \u2192 `show_on_homepage:` | Scan | Boolean; include in generated portfolio |\n| `extra` (JSON) | Various | Scan | Stores: `links`, `bookmarks`, `doc_path`, `tech_stack`, `has_start_sh`, etc. |\n| `last_scanned` | System clock | Scan | Timestamp of last successful scan |\n| `created_at` | System clock | Insert only | Set once on first discovery |\n| `updated_at` | System clock | Scan + UI writes | Updated on every upsert |\n\n### `extra` JSON sub-fields\n\n| Key | Source | Notes |\n|-----|--------|-------|\n| `links` | `METADATA.md` \u2192 `## Links` table | List of `{label, url}` shown in Links column |\n| `bookmarks` | `AGENTS.md` / `CLAUDE.md` \u2192 `## Bookmarks` | Quick-access links for AI context |\n| `doc_path` | Filesystem detection | Relative path to doc index (e.g., `docs/index.html`); used to build Flask proxy URL `/project/{id}/doc/index.html` |\n| `tech_stack` | Auto-detected from `app.py`, `package.json`, etc. | Fallback for `stack` column |\n| `has_start_sh` | `bin/start.sh` present | Legacy flag; bin operations supersede this |\n\n### Operations table field sources\n\n| DB Column | Source | Read On |\n|-----------|--------|---------|\n| `project_id` | FK to projects | Scan |\n| `name` | `# Name:` header in bin script | Scan |\n| `category` | `# Category:` header; default `local` | Scan |\n| `cmd` | Derived from filename (`bin/start.sh`) | Scan |\n| `cwd` | Project path | Scan |\n| `default_port` | `# Port:` header | Scan |\n| `health_path` | `# Health:` header | Scan |\n| `schedule` | `# Schedule:` header | Scan |\n| `timeout` | `# Timeout:` header | Scan |\n\nOperations are deleted and re-seeded on every scan (only `bin/` operations \u2014 custom operations survive).\n\n---\n\n## Startup / Refresh Sequence\n\nBoth server startup and the Refresh button execute the same `scan_projects()` function in `scanner.py`. `scanner.py` is a library module \u2014 it has no entry point; it is called by `app.py` (startup) and by the `/api/sync` route (Refresh button).\n\nOn startup, the scan runs in a **background thread** so the server is immediately ready to serve requests; the DB will be fully populated within a few seconds. After a restart, the Refresh button is redundant \u2014 the startup scan has already run. Use Refresh only when project files change *while the server is running* and you want to pick up those changes without restarting.\n\n```\n1. cleanup_orphaned()        Remove DB rows for projects no longer on disk\n2. for each directory in PROJECTS_DIR:\n   a. detect_project()\n      - Read filesystem flags (has_git, has_venv, has_node, has_claude, has_docs)\n      - Detect doc_path by checking doc/ and docs/ for index.html / index.htm\n      - Auto-detect tech stack from known files (app.py, package.json, manage.py, etc.)\n      - Auto-detect port from app.py or METADATA.md\n   b. parse_metadata_md()\n      - Parse key:value lines \u2192 display_name, status, port, stack, namespace,\n        health_endpoint, desired_state, version, project_type, tags\n      - Parse ## Links table \u2192 extra.links\n      - Parse card metadata \u2192 card_* columns\n   c. scan_bin_operations()\n      - Read first 20 lines of each bin/*.sh and bin/*.py\n      - Look for `# CommandCenter Operation` marker\n      - Extract Name, Category, Port, Schedule, Timeout, Health headers\n   d. parse claude/agents if has_claude \u2192 extra.bookmarks\n   e. upsert_project()\n      - UPDATE if exists (preserves user-edited fields via COALESCE)\n      - INSERT if new\n      - DELETE + re-seed operations table for this project\n3. Log scan duration per project and total\n```\n\n**User-edited fields are preserved on re-scan** via SQL `COALESCE(?, column)` \u2014 if the scan value is NULL, the existing DB value is kept. Fields where METADATA.md is authoritative (status, port, stack) overwrite the DB.\n\n---\n\n## Schema\n\n### projects\n\n| Column | Type | Default | Description |\n|--------|------|---------|-------------|\n| id | INTEGER PK | auto | Auto-increment |\n| name | TEXT UNIQUE | \u2014 | Machine slug; matches directory name |\n| display_name | TEXT | NULL | Human-readable name from METADATA.md |\n| title | TEXT | \u2014 | CamelCase-split fallback (legacy) |\n| path | TEXT | NULL | Absolute path to project directory |\n| status | TEXT | 'template' | Lifecycle status |\n| port | INTEGER | NULL | Service port |\n| stack | TEXT | NULL | Technology summary |\n| health_endpoint | TEXT | '/health' | Health check path |\n| desired_state | TEXT | 'on-demand' | running / on-demand |\n| namespace | TEXT | 'development' | Deployment namespace |\n| tags | TEXT | NULL | Comma-separated tags |\n| project_type | TEXT | 'software' | software / book / etc. |\n| description | TEXT | NULL | Short description |\n| has_git | INTEGER | 0 | .git/ present |\n| has_venv | INTEGER | 0 | venv/ present |\n| has_node | INTEGER | 0 | node_modules/ present |\n| has_claude | INTEGER | 0 | CLAUDE.md present |\n| has_docs | INTEGER | 0 | doc[s]/index.htm[l] present |\n| has_tests | INTEGER | 0 | tests/ directory or bin/test.sh present |\n| has_specs | INTEGER | 0 | Matching specification directory exists in SPECIFICATIONS_PATH |\n| card_title | TEXT | NULL | Portfolio card title |\n| card_desc | TEXT | NULL | Portfolio card description |\n| card_tags | TEXT | NULL | Portfolio card tags |\n| card_type | TEXT | NULL | Portfolio card category |\n| card_url | TEXT | NULL | Portfolio card URL |\n| card_image | TEXT | NULL | Portfolio card image filename |\n| card_show | INTEGER | 0 | Include in portfolio page |\n| version | TEXT | NULL | YYYY-MM-DD.N from METADATA.md |\n| extra | TEXT | '{}' | JSON blob (links, bookmarks, doc_path, etc.) |\n| is_active | INTEGER | 1 | 0 if removed from disk |\n| last_scanned | TEXT | NULL | Timestamp of last scan |\n| created_at | TEXT | datetime('now') | First discovery |\n| updated_at | TEXT | datetime('now') | Last scan or UI write |\n\n### operations\n\n| Column | Type | Description |\n|--------|------|-------------|\n| id | INTEGER PK | Auto-increment |\n| project_id | INTEGER FK | References projects.id |\n| name | TEXT | Display name from `# Name:` header |\n| category | TEXT | `local` / `service` / `maintenance` / custom |\n| cmd | TEXT | Command string (e.g., `bin/start.sh`) |\n| cwd | TEXT | Working directory (project path) |\n| needs_venv | INTEGER | Activate venv before running |\n| is_url | INTEGER | Open URL rather than run command |\n| default_port | INTEGER | From `# Port:` header |\n| health_path | TEXT | From `# Health:` header |\n| schedule | TEXT | From `# Schedule:` header (cron expression) |\n| last_scheduled_run | TEXT | Last time the scheduler fired this operation |\n| next_scheduled_run | TEXT | Calculated next fire time |\n| schedule_enabled | INTEGER | 1 = active; allows pausing without removing the header |\n| timeout | INTEGER | From `# Timeout:` header |\n| sort_order | INTEGER | Display order |\n\n### op_runs\n\n| Column | Type | Description |\n|--------|------|-------------|\n| id | INTEGER PK | Auto-increment |\n| op_id | INTEGER FK | References operations.id |\n| project_id | INTEGER FK | References projects.id |\n| status | TEXT | running / done / error / stopped |\n| pid | INTEGER | OS process ID |\n| started_at | TEXT | datetime |\n| finished_at | TEXT | datetime or NULL while running |\n| exit_code | INTEGER | NULL while running |\n| log_path | TEXT | Path to log file |\n| cmd | TEXT | Actual command executed |\n| name | TEXT | Operation name at time of run |\n\n### tickets\n\n| Column | Type | Description |\n|--------|------|-------------|\n| id | INTEGER PK | Auto-increment |\n| project_id | INTEGER FK | References projects.id |\n| title | TEXT | Ticket title |\n| description | TEXT | Detail text |\n| state | TEXT | idea / proposed / ready / in_development / testing / done |\n| tags | TEXT | Comma-separated |\n| sort_order | INTEGER | Column position |\n| created_at | TEXT | datetime |\n| updated_at | TEXT | datetime |\n\n### heartbeats\n\nOne row per project per heartbeat type. Overwritten on each poll (no history; rolling window only).\n\n| Column | Type | Description |\n|--------|------|-------------|\n| id | INTEGER PK | Auto-increment |\n| project_id | INTEGER FK | References projects.id |\n| heartbeat_type | TEXT | service_health / process_state / git_state / compliance |\n| current_state | TEXT | Current state value (e.g. UP, DOWN, RUNNING, CLEAN, COMPLIANT) |\n| last_checked | TEXT | Timestamp of last poll (yyyymmdd_hhmmss) |\n| response_ms | INTEGER | Response time in ms (service_health only; NULL otherwise) |\n| uptime_pct | REAL | Rolling 24h uptime percentage (service_health only; NULL otherwise) |\n\n### events\n\nAppend-only log. Rows are never updated or deleted.\n\n| Column | Type | Description |\n|--------|------|-------------|\n| id | INTEGER PK | Auto-increment |\n| project_id | INTEGER FK | References projects.id; NULL for platform-level events |\n| event_type | TEXT | Valid values: `operation_started`, `operation_completed`, `operation_failed`, `state_transition`, `git_push`, `git_commit`, `schedule_fired`, `schedule_missed`, `build_completed`, `deploy_completed`, `scan_completed`, `ticket_transition`, `metadata_changed`, `alert_fired`, `spec_updated`, `spec_ticket_created` |\n| timestamp | TEXT | When it happened (yyyymmdd_hhmmss) |\n| summary | TEXT | Human-readable one-liner |\n| detail | TEXT | JSON event-specific payload |\n| source | TEXT | Subsystem that generated the event |\n\n### transaction_log\n\nSpecification decision log. One row per decision, change, question, or rationale entry.\n\n| Column | Type | Description |\n|--------|------|-------------|\n| id | INTEGER PK | Sequential entry number |\n| project_id | INTEGER FK | References projects.id |\n| timestamp | TEXT | When the decision was made (yyyymmdd_hhmmss) |\n| category | TEXT | decision / change / question / rationale |\n| title | TEXT | One-line summary |\n| body | TEXT | Full description, context, alternatives considered |\n| files_affected | TEXT | JSON array of specification file paths modified |\n| ticket_id | INTEGER FK | Optional link to tickets.id |\n\n### ai_decisions\n\nPer-ticket AI decision log. Written when a ticket enters IN DEVELOPMENT.\n\n| Column | Type | Description |\n|--------|------|-------------|\n| id | INTEGER PK | Auto-increment |\n| ticket_id | INTEGER FK | References tickets.id |\n| timestamp | TEXT | When the work happened (yyyymmdd_hhmmss) |\n| decision | TEXT | What was decided and why |\n| alternatives | TEXT | What was considered but rejected |\n| files_changed | TEXT | JSON array of files modified |\n\n### workflow_types\n\nConfigurable specification ticket type definitions. Seeded once on first startup; rows are never deleted by the scanner \u2014 only by user action via Settings. Each row defines one button in the Projects / Workflow screen.\n\n| Column | Type | Default | Description |\n|--------|------|---------|-------------|\n| id | INTEGER PK | auto | Auto-increment |\n| name | TEXT | \u2014 | Display name shown on button (e.g. `Patch`) |\n| file_prefix | TEXT | \u2014 | Prefix used for generated filename (e.g. `PATCH`) |\n| description | TEXT | NULL | Tooltip text shown on hover |\n| template | TEXT | \u2014 | Markdown template for the created file; supports `{title}` and `{body}` placeholders |\n| sort_order | INTEGER | 0 | Left-to-right display order within the Workflows column |\n| is_active | INTEGER | 1 | 1 = shown in UI; 0 = hidden without deleting |\n| created_at | TEXT | datetime('now') | |\n| updated_at | TEXT | datetime('now') | |\n\n**Seed data (inserted if table is empty on startup):**\n\n| name | file_prefix | description |\n|------|-------------|-------------|\n| Patch | PATCH | Bug fix, behavioral correction, or refactor |\n| Screen | SCREEN | New or revised screen specification |\n| Feature | FEATURE | New or revised feature specification |\n| Acceptance Criteria | AC | Testable MUST / MUST NOT batch |\n\n### spec_tickets\n\nUnified ticket store shared by the Projects / Workflow screen (file creation) and the Dashboards / Workflow Kanban (lifecycle tracking). One row per ticket regardless of whether a specification file has been generated yet.\n\nSupersedes the `tickets` table \u2014 see note below.\n\n| Column | Type | Default | Description |\n|--------|------|---------|-------------|\n| id | INTEGER PK | auto | Auto-increment |\n| project_id | INTEGER FK | \u2014 | References projects.id |\n| workflow_type_id | INTEGER FK | NULL | References workflow_types.id; NULL for tickets not tied to a type |\n| filename | TEXT | NULL | Created file basename (e.g. `PATCH-003-fix-nav.md`); NULL until file is written |\n| title | TEXT | \u2014 | User-entered title (also used in filename slug) |\n| body | TEXT | NULL | User-entered body / description |\n| file_status | TEXT | `pending` | File-processing state: `pending` / `applied` / `rejected`; only meaningful when `filename` is set |\n| kanban_state | TEXT | `idea` | Kanban lifecycle: `idea` / `proposed` / `ready` / `in_development` / `testing` / `done` |\n| priority | TEXT | `medium` | `low` / `medium` / `high` / `critical` |\n| tags | TEXT | NULL | Comma-separated tag string |\n| sort_order | INTEGER | 0 | Column position within `kanban_state` |\n| created_at | TEXT | datetime('now') | |\n| updated_at | TEXT | datetime('now') | |\n\n> **`tickets` table is superseded.** New code reads and writes `spec_tickets`. The `tickets` table is retained for backwards compatibility until migrated.\n\n### settings\n\nKey-value store for application-level configuration. Seeded on first startup. Rows are never deleted \u2014 only updated.\n\n| Column | Type | Default | Description |\n|--------|------|---------|-------------|\n| key | TEXT PK | \u2014 | Setting identifier |\n| value | TEXT | NULL | Current value |\n| description | TEXT | NULL | Human-readable label shown in Settings UI |\n| updated_at | TEXT | datetime('now') | |\n\n**Seed data:**\n\n| key | value | description |\n|-----|-------|-------------|\n| `app_name` | `Command Center` | Name displayed in the upper-left corner of the application |\n| `homepage_url` | `` | Live homepage URL (shown on the Homepage screen) |\n\n### tag_colors\n\nColor assignments per tag. Written by `POST /settings/tags`. Canonical source for tag pill colors \u2014 supersedes `data/tag_colors.json` once this table is added.\n\n| Column | Type | Default | Description |\n|--------|------|---------|-------------|\n| tag | TEXT PK | \u2014 | Raw tag string |\n| bg | TEXT | `#64748b` | Background hex color |\n| fg | TEXT | `#ffffff` | Foreground hex color |\n| updated_at | TEXT | datetime('now') | |\n\n> Until this table is added, `data/tag_colors.json` remains the color source. Migration: on first Settings / Tag page load, import any entries from the JSON file into this table and delete the file.\n\n### health_check_log, log_positions, log_filter\n\nThese three tables support `monitoring.py` (health poller + log ingestor). Full schema is in FEATURE-HEALTHCHECK.md. Summary:\n\n| Table | Purpose | Retention |\n|-------|---------|-----------|\n| `health_check_log` | Raw HTTP/TCP poll results (one row per check) | 24h rolling window |\n| `log_positions` | Byte-offset cursor per project log file (incremental ingestion) | Permanent |\n| `log_filter` | Regex classification rules; seeded with defaults on startup | Permanent |\n\nSchema is authoritative in FEATURE-HEALTHCHECK.md. When these tables are implemented, add their full column definitions here and remove this reference.\n\n### services\n\nRegistry of all platform and project services discovered from `.service.yaml` manifests. See FEATURE-ServiceInterfaces.md.\n\n| Column | Type | Default | Description |\n|--------|------|---------|-------------|\n| id | INTEGER PK | auto | Auto-increment |\n| name | TEXT UNIQUE | \u2014 | Service name slug (e.g. `batch-runner`) |\n| display_name | TEXT | \u2014 | Human-readable name |\n| description | TEXT | \u2014 | One-line description from manifest |\n| source | TEXT | \u2014 | `platform` / `project:{name}` / `mcp:{name}` |\n| source_project_id | INTEGER FK | NULL | References projects.id if source is a project |\n| manifest_path | TEXT | \u2014 | Path to the .service.yaml file |\n| transports | TEXT | '{}' | JSON: which transports are enabled (`{\"rest\":true,\"cli\":true,\"mcp\":false,\"async\":false}`) |\n| tool_count | INTEGER | 0 | Number of tools defined |\n| version | TEXT | NULL | Service version from manifest |\n| is_active | INTEGER | 1 | 0 if removed from disk |\n| created_at | TEXT | datetime('now') | First discovery |\n| updated_at | TEXT | datetime('now') | Last scan |\n\n### service_tools\n\nTool definitions for each service. One row per tool per service.\n\n| Column | Type | Description |\n|--------|------|-------------|\n| id | INTEGER PK | Auto-increment |\n| service_id | INTEGER FK | References services.id |\n| name | TEXT | Tool name (unique within service) |\n| description | TEXT | Tool description (shown to agents and in Service Catalog UI) |\n| input_schema | TEXT | JSON schema for inputs |\n| output_schema | TEXT | JSON schema for outputs |\n| sort_order | INTEGER | Display order |\n\n### mcp_servers\n\nMCP server instances discovered from project `mcp/` directories. See FEATURE-MCP-Hosting.md.\n\n| Column | Type | Default | Description |\n|--------|------|---------|-------------|\n| id | INTEGER PK | auto | Auto-increment |\n| service_id | INTEGER FK | \u2014 | References services.id |\n| project_id | INTEGER FK | \u2014 | References projects.id |\n| entry_script | TEXT | \u2014 | Relative path to server script within the project |\n| runtime | TEXT | 'python' | python / node / binary |\n| requirements | TEXT | NULL | Path to requirements file (relative to project) |\n| default_transport | TEXT | 'stdio' | stdio / sse / streamable-http |\n| exposed | INTEGER | 0 | 1 = running on network port |\n| assigned_port | INTEGER | NULL | Port assigned when exposed |\n| pid | INTEGER | NULL | OS process ID when running |\n| status | TEXT | 'stopped' | stopped / starting / running / error |\n| last_started | TEXT | NULL | Timestamp |\n| last_error | TEXT | NULL | Last error message if status = error |\n| created_at | TEXT | datetime('now') | |\n| updated_at | TEXT | datetime('now') | |\n\n### workflow_templates\n\nConfigurable state machine definitions. Seeded on first startup with built-in templates (specification-ticket, deployment, review). See FEATURE-Workflow-Service.md.\n\n| Column | Type | Default | Description |\n|--------|------|---------|-------------|\n| id | INTEGER PK | auto | Auto-increment |\n| name | TEXT UNIQUE | \u2014 | Template identifier slug (e.g. `specification-ticket`) |\n| display_name | TEXT | \u2014 | Human-readable name |\n| description | TEXT | NULL | What this workflow type is for |\n| states_json | TEXT | \u2014 | JSON array of state definitions: `[{\"name\":\"idea\",\"transitions\":[\"proposed\"],\"requires\":[]}]` |\n| initial_state | TEXT | \u2014 | State name for new instances |\n| source | TEXT | 'platform' | `platform` / `project:{name}` |\n| is_active | INTEGER | 1 | |\n| created_at | TEXT | datetime('now') | |\n| updated_at | TEXT | datetime('now') | |\n\n**Seed data (inserted if table is empty on startup):**\n\n| name | display_name | initial_state |\n|------|-------------|---------------|\n| specification-ticket | Specification Ticket | idea |\n| deployment | Deployment Pipeline | building |\n| review | Review Process | submitted |\n\n### workflow_instances\n\nActive workflow instances. One row per workflow in progress.\n\n| Column | Type | Default | Description |\n|--------|------|---------|-------------|\n| id | INTEGER PK | auto | Auto-increment |\n| workflow_name | TEXT | \u2014 | Human-readable instance name (e.g. \"deploy-myapp-v2.1\") |\n| template_id | INTEGER FK | \u2014 | References workflow_templates.id |\n| project_id | INTEGER FK | \u2014 | References projects.id |\n| current_state | TEXT | \u2014 | Current state name |\n| payload | TEXT | '{}' | JSON blob of type-specific data |\n| created_at | TEXT | datetime('now') | |\n| updated_at | TEXT | datetime('now') | |\n\n### workflow_history\n\nAppend-only transition log. One row per state change.\n\n| Column | Type | Description |\n|--------|------|-------------|\n| id | INTEGER PK | Auto-increment |\n| workflow_id | INTEGER FK | References workflow_instances.id |\n| from_state | TEXT | Previous state |\n| to_state | TEXT | New state |\n| comment | TEXT | Transition reason (optional) |\n| transition_payload | TEXT | JSON data attached to this transition |\n| timestamp | TEXT | When the transition occurred |\n\n---\n\n## Conventions\n\n- WAL mode: set once in `init_db()` (persistent on the file); not repeated per connection\n- Foreign keys: `PRAGMA foreign_keys=ON` per connection (required for FK enforcement)\n- Schema changes: `_add_column_if_missing()` in `db.py` \u2014 additive only, no migration files\n- JSON blobs: stored as TEXT, parsed by application; changes do not require schema migration\n- DB created automatically on first startup if missing\n\n---\n\n## Open Questions / Design Decisions\n\n- **`title` column**: Duplicated by `display_name`. Remove once all templates reference `display_name` exclusively. Until then, keep it to avoid breaking existing renders.\n- **WAL PRAGMA per connection**: Harmless (WAL is persistent). Move to `init_db()` only as a cleanup task \u2014 not a blocking issue.\n- **Tag colors**: Promoted to `tag_colors` table above. `data/tag_colors.json` is legacy; migrate on first Settings / Tag load.\n- **`git_last_commit_date`**: Not yet implemented. Would replace `version` date as the `LastUpdate` column source. Requires `git log --format=%ci -1` during scan and storing the ISO date. Add to `projects` table when scanner is updated.\n",
  "FEATURE-AsyncQueue": "# Feature: AsyncQueue Service\n\n**Version:** 2026-04-06 V1\n**Description:** File-based store-and-forward message queue \u2014 works when the GAME server is down, drained on startup or on demand\n\n## Design Intent\n\nNot everything can wait for the GAME server to be running. A phone app sends a voice note at 2 AM. A cron job on another machine finishes and wants to notify the platform. A script fails and wants to enqueue a retry. These producers need a queue that accepts work regardless of whether the consumer is alive.\n\n**File-based, dead simple:** The queue is a JSONL file. Producers append a line. That is the entire write path \u2014 no server, no socket, no protocol. Any language that can append to a file can enqueue work. When GAME starts (or on demand), it drains the queue: reads each line, dispatches to the appropriate handler, and marks it processed.\n\n**Why not a real message broker:** This platform is for a single developer or a small team running local services. RabbitMQ or Redis Streams are correct at scale but wrong here \u2014 they add infrastructure, configuration, and failure modes that a JSONL file does not have. If the developer outgrows file queues, the service interface stays the same and the transport changes to a broker behind the config.\n\n**The VoiceForward example:** Today VoiceForward (FEATURE-VOICEFORWARD.md) posts directly to the GAME server via `POST /api/voice/upload`. If the server is down, the recording is lost. With AsyncQueue, the phone app (or a lightweight relay) writes a queue message. When GAME starts, it drains the queue, transcribes the audio, and appends the text \u2014 no recording lost, no timing dependency.\n\n**The general pattern:** Any service that benefits from \"submit now, process later\" can use AsyncQueue as a transport. The service manifest (FEATURE-ServiceInterfaces.md) declares `async: true`, and the platform generates the queue file and drain logic automatically.\n\n---\n\n## Queue File Format\n\nEach queue is a JSONL file at `data/queues/{queue-name}.queue.jsonl`. One line per message:\n\n```jsonl\n{\"id\":\"a1b2c3\",\"queue\":\"voice\",\"service\":\"voiceforward\",\"tool\":\"transcribe\",\"payload\":{\"audio_path\":\"/tmp/rec_001.webm\",\"label\":\"BOOK IDEAS\"},\"submitted_at\":\"2026-04-06T02:15:00Z\",\"status\":\"pending\",\"priority\":\"normal\"}\n{\"id\":\"d4e5f6\",\"queue\":\"voice\",\"service\":\"voiceforward\",\"tool\":\"transcribe\",\"payload\":{\"audio_path\":\"/tmp/rec_002.webm\",\"label\":\"GAME SPEC\"},\"submitted_at\":\"2026-04-06T02:17:00Z\",\"status\":\"pending\",\"priority\":\"normal\"}\n```\n\n### Message Fields\n\n| Field | Type | Required | Description |\n|-------|------|----------|-------------|\n| `id` | string | Yes | Unique message ID (UUID or short hash) |\n| `queue` | string | Yes | Queue name (determines which file and which drain handler) |\n| `service` | string | Yes | Target service name from the service registry |\n| `tool` | string | Yes | Tool name within the service to invoke |\n| `payload` | object | Yes | Tool inputs (must match the tool's input schema) |\n| `submitted_at` | string | Yes | ISO 8601 timestamp |\n| `status` | string | Yes | `pending` / `processing` / `done` / `error` / `expired` |\n| `priority` | string | No | `low` / `normal` / `high` / `critical` (default: `normal`) |\n| `ttl_seconds` | integer | No | Message expires if not processed within this many seconds after submission |\n| `result` | object | No | Set by drain handler on completion |\n| `error` | string | No | Set by drain handler on failure |\n| `processed_at` | string | No | Timestamp when processing completed |\n\n---\n\n## Queue Operations\n\n### Submit (Producer Side)\n\nProducers write to the queue by appending a JSONL line. Three ways to submit:\n\n**1. Direct file append (works without GAME running):**\n\n```bash\necho '{\"id\":\"'$(uuidgen)'\",\"queue\":\"voice\",\"service\":\"voiceforward\",\"tool\":\"transcribe\",\"payload\":{\"audio_path\":\"/tmp/rec.webm\",\"label\":\"BOOK IDEAS\"},\"submitted_at\":\"'$(date -Iseconds)'\",\"status\":\"pending\",\"priority\":\"normal\"}' >> data/queues/voice.queue.jsonl\n```\n\n**2. Python helper in common.py:**\n\n```python\nfrom common import services\nservices.async_queue.submit(\n    queue=\"voice\",\n    service=\"voiceforward\",\n    tool=\"transcribe\",\n    payload={\"audio_path\": \"/tmp/rec.webm\", \"label\": \"BOOK IDEAS\"}\n)\n```\n\nThe helper generates the ID, timestamp, and appends to the file. Works without GAME running.\n\n**3. REST API (requires GAME running):**\n\n```\nPOST /api/services/async-queue/submit\n{\n  \"queue\": \"voice\",\n  \"service\": \"voiceforward\",\n  \"tool\": \"transcribe\",\n  \"payload\": {\"audio_path\": \"/tmp/rec.webm\", \"label\": \"BOOK IDEAS\"}\n}\n```\n\n### Drain (Consumer Side)\n\nDraining processes pending messages in priority then submission order:\n\n1. Read the queue file\n2. Filter for `status = pending` (skip done/error/expired)\n3. Check TTL \u2014 mark expired messages as `expired`\n4. For each pending message (highest priority first, then oldest first):\n   a. Set status to `processing`\n   b. Resolve the target service and tool from the service registry\n   c. Call the tool (via internal Python dispatch, not REST \u2014 no network dependency)\n   d. On success: set status to `done`, record `result` and `processed_at`\n   e. On failure: set status to `error`, record `error` message\n5. Rewrite the queue file with updated statuses\n\n**Drain triggers:**\n- **Startup:** GAME drains all queues on startup (after scan completes)\n- **On demand:** `POST /api/services/async-queue/drain` or `game-cli async-queue drain`\n- **Periodic:** Optional scheduler job (e.g., drain every 5 minutes)\n- **File watch (future):** inotify/fswatch on the queues directory for immediate processing\n\n### Queue Rotation\n\nProcessed messages (done/error/expired) accumulate in the queue file. Rotation moves them to an archive:\n\n- After drain, if the queue file exceeds 1000 lines or 1 MB, rotate:\n  - Move completed messages to `data/queues/archive/{queue-name}.{date}.jsonl`\n  - Rewrite the active file with only pending/processing messages\n- Archive files are kept for 30 days (configurable), then deleted\n\n---\n\n## Service Manifest\n\n```yaml\nname: async-queue\ndescription: File-based store-and-forward message queue \u2014 submit work when the server is down, drain on startup\nversion: 1.0.0\n\ntransports:\n  rest: true\n  cli: true\n  mcp: false\n  async: false    # The queue itself is not async-backed (it IS the async mechanism)\n\ntools:\n  - name: submit\n    description: >\n      Submit a message to a named queue. The message will be processed when\n      the queue is next drained (on server startup, on schedule, or on demand).\n      Works without the GAME server running if called via common.py or direct file append.\n    inputs:\n      queue:\n        type: string\n        required: true\n        description: Queue name (determines file and handler)\n      service:\n        type: string\n        required: true\n        description: Target service to invoke when processing\n      tool:\n        type: string\n        required: true\n        description: Tool within the target service\n      payload:\n        type: object\n        required: true\n        description: Tool inputs (passed directly to the service tool)\n      priority:\n        type: string\n        required: false\n        description: Message priority (low/normal/high/critical)\n      ttl_seconds:\n        type: integer\n        required: false\n        description: Expire if not processed within this many seconds\n    output:\n      id: { type: string, description: \"Assigned message ID\" }\n      queue: { type: string }\n      status: { type: string, description: \"pending\" }\n\n  - name: status\n    description: Check the status of a submitted message\n    inputs:\n      id:\n        type: string\n        required: true\n        description: Message ID from submit\n      queue:\n        type: string\n        required: true\n        description: Queue name to search\n    output:\n      id: { type: string }\n      status: { type: string }\n      result: { type: object, nullable: true }\n      error: { type: string, nullable: true }\n      submitted_at: { type: string }\n      processed_at: { type: string, nullable: true }\n\n  - name: list\n    description: List messages in a queue, optionally filtered by status\n    inputs:\n      queue:\n        type: string\n        required: true\n      status:\n        type: string\n        required: false\n        description: Filter by message status (pending/processing/done/error/expired)\n      limit:\n        type: integer\n        required: false\n    output:\n      messages:\n        type: array\n        items:\n          id: string\n          service: string\n          tool: string\n          status: string\n          priority: string\n          submitted_at: string\n\n  - name: drain\n    description: Process all pending messages in a queue (or all queues if queue is omitted)\n    inputs:\n      queue:\n        type: string\n        required: false\n        description: Specific queue to drain (omit for all queues)\n    output:\n      processed: { type: integer, description: \"Number of messages processed\" }\n      succeeded: { type: integer }\n      failed: { type: integer }\n      expired: { type: integer }\n\n  - name: list_queues\n    description: List all known queues with message counts\n    inputs: {}\n    output:\n      queues:\n        type: array\n        items:\n          name: string\n          pending: integer\n          processing: integer\n          done: integer\n          error: integer\n          last_drained: string\n```\n\n---\n\n## Queue Configuration\n\nQueues are auto-created when the first message is submitted. No pre-registration needed. GAME discovers all `data/queues/*.queue.jsonl` files on startup.\n\nOptional configuration per queue in `data/queues/queue_config.yaml`:\n\n```yaml\nqueues:\n  voice:\n    drain_on_startup: true\n    drain_interval_minutes: 5\n    max_retries: 3\n    ttl_default_seconds: 86400    # 24 hours\n    archive_retention_days: 30\n  default:\n    drain_on_startup: true\n    drain_interval_minutes: 0     # 0 = no periodic drain\n    max_retries: 1\n    ttl_default_seconds: 0        # 0 = no expiry\n    archive_retention_days: 30\n```\n\n---\n\n## New Routes\n\n| Method | Path | Purpose |\n|--------|------|---------|\n| POST | `/api/services/async-queue/submit` | Submit a message to a queue |\n| GET | `/api/services/async-queue/status?id=X&queue=Y` | Check message status |\n| GET | `/api/services/async-queue/list?queue=Y` | List queue messages |\n| POST | `/api/services/async-queue/drain` | Drain pending messages |\n| GET | `/api/services/async-queue/list_queues` | List all queues with counts |\n\n---\n\n## Directory Layout\n\n```\nGAME/\n  data/\n    queues/\n      voice.queue.jsonl          # Active queue file\n      default.queue.jsonl        # Default queue for unrouted messages\n      queue_config.yaml          # Per-queue configuration\n      archive/                   # Rotated completed messages\n        voice.2026-04-06.jsonl\n```\n\n---\n\n## Open Questions\n\n- Should failed messages be automatically retried? If so, how many times and with what backoff? The config supports `max_retries` but the retry mechanism (immediate vs. exponential backoff vs. next drain cycle) needs design.\n- Should the queue support dead-letter routing \u2014 messages that fail all retries go to a separate `{queue}.dead.jsonl` for manual inspection?\n- Should `common.py` file append use file locking (`fcntl.flock`) to prevent corruption from concurrent writers? Probably yes for safety, but JSONL append is mostly atomic on Linux for reasonable line lengths.\n- Should there be a UI component on the Service Catalog or a dedicated Queues screen showing queue depths and drain status? Probably a tab or section on the Service Catalog screen.\n",
  "FEATURE-BatchRunner": "# Feature: Batch Runner Service\n\n**Version:** 2026-04-06 V1\n**Description:** Long-running script execution exposed as a platform service \u2014 wraps the process engine with a service interface\n\n## Design Intent\n\nGAME already has a process engine (`ops.py`/`spawn.py`) that launches bin/ scripts, captures logs, and tracks lifecycle. The Service Catalog API (FEATURE-SERVICE-CATALOG.md) already exposes this via REST with fire-and-poll. The Batch Runner service wraps this same engine with a service manifest (FEATURE-ServiceInterfaces.md) so it is available through all five transports: REST, CLI, MCP, async queue, and web UI.\n\n**Why a separate service feature:** The existing process engine is internal plumbing. The Batch Runner is the user-facing service built on top of it. The distinction matters because:\n- The service manifest describes what an agent or developer can do (run a script, check status, get logs)\n- The process engine describes how it works internally (fork, log capture, SIGTERM)\n- Other services (workflow, async queue) also use the process engine \u2014 Batch Runner is just one consumer\n\n**The \"needs a way to run scripts\" requirement:** Every other service ultimately needs to execute work. The workflow service transitions state then fires a script. The async queue drains items by running handlers. Batch Runner is the primitive they all delegate to. It must be reliable, well-described, and available without the GAME web server being up for the CLI transport.\n\n---\n\n## Service Manifest\n\n```yaml\nname: batch-runner\ndescription: Execute project scripts as background jobs with log capture and lifecycle management\nversion: 1.0.0\n\ntransports:\n  rest: true\n  cli: true\n  mcp: true\n  async: false\n\ntools:\n  - name: run_script\n    description: >\n      Launch a project bin/ script as a background job. Returns a run_id\n      for tracking. The script runs in the project directory with its venv\n      activated if present. stdout and stderr are captured to a log file.\n    inputs:\n      project:\n        type: string\n        required: true\n        description: Project name slug (matches directory name)\n      script:\n        type: string\n        required: true\n        description: Script basename without bin/ prefix or extension (e.g. \"deploy\", \"test\")\n      env:\n        type: object\n        required: false\n        description: Additional environment variables to inject into the script\n    output:\n      run_id: { type: integer, description: \"Unique run identifier for polling\" }\n      status: { type: string, description: \"Initial status (running)\" }\n      log_path: { type: string, description: \"Path to log file\" }\n\n  - name: run_status\n    description: Check the current status of a running or completed job\n    inputs:\n      run_id:\n        type: integer\n        required: true\n        description: Run identifier from run_script\n    output:\n      run_id: { type: integer }\n      status: { type: string, enum: [running, done, error, stopped] }\n      exit_code: { type: integer, nullable: true }\n      started_at: { type: string }\n      finished_at: { type: string, nullable: true }\n      duration_seconds: { type: integer }\n\n  - name: run_log\n    description: Fetch log output from a running or completed job\n    inputs:\n      run_id:\n        type: integer\n        required: true\n      tail:\n        type: integer\n        required: false\n        description: Return only the last N lines (default returns full log)\n    output:\n      run_id: { type: integer }\n      status: { type: string }\n      log: { type: string, description: \"Log content text\" }\n      line_count: { type: integer }\n\n  - name: run_stop\n    description: Cancel a running job by sending SIGTERM to its process group\n    inputs:\n      run_id:\n        type: integer\n        required: true\n    output:\n      run_id: { type: integer }\n      status: { type: string, description: \"New status (stopped)\" }\n\n  - name: list_runs\n    description: List recent runs for a project, optionally filtered by script name\n    inputs:\n      project:\n        type: string\n        required: true\n      script:\n        type: string\n        required: false\n        description: Filter to runs of a specific script\n      limit:\n        type: integer\n        required: false\n        description: Maximum number of runs to return (default 20)\n    output:\n      runs:\n        type: array\n        items:\n          run_id: integer\n          script: string\n          status: string\n          started_at: string\n          duration_seconds: integer\n```\n\n---\n\n## Transport Details\n\n### REST (existing, formalized)\n\nMaps directly to existing FEATURE-SERVICE-CATALOG.md endpoints:\n\n| Tool | Endpoint |\n|------|----------|\n| `run_script` | `POST /api/{project}/run/{script}` |\n| `run_status` | `GET /api/runs/{run_id}` |\n| `run_log` | `GET /api/runs/{run_id}/log` |\n| `run_stop` | `POST /api/runs/{run_id}/stop` |\n| `list_runs` | `GET /api/{project}/runs` (new) |\n\nAlso available via the generic service route: `POST /api/services/batch-runner/{tool}`\n\n### CLI (via game-cli.sh)\n\nExtends FEATURE-CLI-GATEWAY.md with service-aware commands:\n\n```bash\ngame-cli batch-runner run_script --project=myapp --script=deploy\ngame-cli batch-runner run_status --run-id=42\ngame-cli batch-runner run_log --run-id=42 --tail=50\ngame-cli batch-runner run_stop --run-id=42\n```\n\nThe existing shorthand commands (`game-cli run myapp deploy`) remain as aliases.\n\n### MCP\n\nWhen MCP transport is enabled, an MCP server wraps the Batch Runner tools. The agent calls:\n\n```\ntool: batch_runner_run_script\nargs: { project: \"myapp\", script: \"deploy\" }\n```\n\nThe MCP server calls the GAME REST API internally (same as game-cli). It does not embed the process engine \u2014 it is a thin client.\n\n---\n\n## Implementation Notes\n\n| Concern | Approach |\n|---------|----------|\n| No new process management code | All tools delegate to existing `ops.py` functions |\n| Manifest file location | `GAME/services/batch-runner.service.yaml` |\n| List runs endpoint | New route: `GET /api/{project}/runs` \u2014 simple SELECT from `op_runs` |\n| MCP server | `GAME/mcp/batch_runner.py` \u2014 thin wrapper calling GAME REST API |\n\n---\n\n## Open Questions\n\n- Should `run_script` accept a `timeout` override, or always use the operation's configured timeout? An override would be useful for ad-hoc runs where the default is too short.\n- Should `list_runs` support filtering by status (e.g., only running jobs)? Useful for \"show me what's active\" queries.\n- Should the MCP server for batch-runner be auto-started by GAME, or only started when the developer enables it in settings?\n",
  "FEATURE-CLI-GATEWAY": "# Feature: CLI Gateway\n\n**Version:** 2026-03-26 V1\n**Description:** bin/game-cli.sh \u2014 bash wrapper for GAME REST API\n\n`game-cli.sh` is a thin bash client for GAME's REST API. Other project `bin/` scripts can call it to report status, fire operations, or check health without constructing raw curl commands. It resolves the GAME server URL from `$GAME_URL` env var, then `$GAME_PORT`, then `~/.game_port`, then falls back to port 5000 on localhost.\n\n---\n\n## Command Reference\n\n| Command | API Call | Description |\n|---------|----------|-------------|\n| `game-cli catalog` | `GET /api/catalog` | Print all projects and their registered scripts as JSON |\n| `game-cli catalog --names` | `GET /api/catalog` | Print only project names, one per line |\n| `game-cli run {name} {script}` | `POST /api/{name}/run/{script}` | Fire a script and wait for completion; exit 0 on success, 1 on error |\n| `game-cli run {name} {script} --no-wait` | `POST /api/{name}/run/{script}` | Fire and return immediately; prints run_id |\n| `game-cli status {run_id}` | `GET /api/runs/{run_id}` | Print current status of a run |\n| `game-cli log {run_id}` | `GET /api/runs/{run_id}/log` | Print log lines for a run |\n| `game-cli stop {run_id}` | `POST /api/runs/{run_id}/stop` | Stop a running operation |\n| `game-cli health` | `GET /api/catalog` | Print health state for all projects with ports |\n| `game-cli health {name}` | `GET /api/health/{name}` | Print health state for one project |\n| `game-cli heartbeat {state} [{msg}]` | `POST /api/heartbeat` | Record a heartbeat from the calling script (state: OK/WARNING/ERROR/CRITICAL) |\n| `game-cli event {severity} {msg}` | `POST /api/events` | Record an event (severity: INFORMATION/WARNING/ERROR/CRITICAL) |\n\n---\n\n## URL Resolution\n\nThe GAME base URL is resolved in this order:\n\n1. `$GAME_URL` env var (full URL, e.g. `http://localhost:5001`) \u2014 takes precedence if set\n2. `$GAME_PORT` env var \u2192 `http://localhost:$GAME_PORT`\n3. `~/.game_port` file (single integer) \u2192 `http://localhost:{port}`\n4. Default: `http://localhost:5000`\n\n---\n\n## Exit Codes\n\n| Code | Meaning |\n|------|---------|\n| 0 | Success |\n| 1 | API error or non-zero script exit |\n| 2 | Usage error (wrong arguments) |\n| 3 | GAME server unreachable |\n\n---\n\n## Wait-for-Completion Behaviour\n\n`game-cli run` without `--no-wait` polls `GET /api/runs/{run_id}` every 2 seconds until status is not `running`. On completion:\n\n- Prints final status\n- Exits 0 if status is `done`\n- Exits 1 if status is `error` or `stopped`\n\nTimeout: 30 minutes, configurable via `$GAME_CLI_TIMEOUT` env var (default: 1800 seconds). Prints a dot `.` to stderr every 10 seconds while waiting so the caller knows it is alive.\n\n---\n\n## Script Header\n\nThe script must begin with:\n\n```bash\n#!/bin/bash\n# CommandCenter Operation\n# Name: GAME CLI\n# Category: Operations\n```\n\n`game-cli.sh` must **not** source `common.sh` \u2014 it is a client script that runs in other project contexts, not in the GAME project directory. It uses only standard bash builtins and `curl`.\n\n---\n\n## Usage in Project Scripts\n\nA project's `bin/daily.sh` calling the CLI:\n\n```bash\n# Report status to GAME at start\ngame-cli heartbeat OK \"Daily batch starting\"\n\n# Run another project's script and wait\ngame-cli run SomeProject daily.sh\n\n# Report completion\ngame-cli heartbeat OK \"Daily batch complete\"\n```\n\n---\n\n## Installation\n\n`game-cli.sh` lives in `GAME/bin/game-cli.sh`. To use it from other projects, add `GAME/bin/` to `PATH` in `.bashrc` or `.zshrc`:\n\n```bash\nexport PATH=\"$PATH:/path/to/GAME/bin\"\n```\n\nAlternatively, `common.sh` in each project may add `$GAME_BIN` to PATH if the `GAME_BIN` env var is set.\n\n---\n\n## Open Questions\n\n- Should `game-cli` support a JSON output mode (`--json`) for all commands so callers can parse structured data? Default is human-readable; `--json` would return the raw API response.\n- Should `game-cli heartbeat` auto-detect the calling project name from the current directory's `METADATA.md`, or require it as an explicit argument?\n",
  "FEATURE-HEALTHCHECK": "# Feature: Health Check & Event Ingestor\n\n**Version:** 20260323 V1\n**Description:** Service endpoint polling, per-project heartbeat API, and incremental log-event ingestion\n\nThree capabilities unified under one feature:\n\n1. **Service Health Poller** \u2014 periodic HTTP/TCP checks against catalog endpoints; updates `heartbeats` rows.\n2. **Heartbeat API** \u2014 `common.py` / `common.sh` helpers that any project script can call to record operational state.\n3. **Log Event Ingestor** \u2014 incremental scan of project log files; classifies lines as start/stop/error/junk; writes to `events`.\n\n---\n\n## Trigger\n\n| Capability | Trigger |\n|---|---|\n| Service Health Poller | Scheduler fires every `health_check_interval` seconds per project; also on `POST /api/health/poll` |\n| Heartbeat API | Called explicitly by project scripts via `common.py` or `common.sh` |\n| Log Ingestor | Scheduler fires every 60 seconds; also on `POST /api/logs/ingest` |\n\n---\n\n## Service Health Poller\n\nFor each project with a known port or `health_endpoint`:\n\n1. Determine check type from `health_check_type`: `http` (default), `tcp`, or `none`.\n2. Perform check with 5-second timeout.\n   - `http`: HTTP GET `http://localhost:{port}{health_endpoint}`. State = `UP` (2xx), `DEGRADED` (non-2xx), `DOWN` (timeout / connection refused).\n   - `tcp`: TCP connect to `localhost:{port}`. State = `UP` or `DOWN`.\n3. Upsert one row in `heartbeats` where `heartbeat_type = service_health`: set `current_state`, `last_checked`, `response_ms`.\n4. Append one row to `health_check_log` (raw history, 24h retention).\n5. On state change (UP\u2194DOWN or UP\u2194DEGRADED): append one row to `events`.\n   - DOWN or DEGRADED \u2192 `event_type = alert_fired`\n   - Recovered to UP \u2192 `event_type = state_transition`\n6. Recompute `uptime_pct` from the 24h window in `health_check_log`; write back to `heartbeats`.\n\nProjects with `desired_state = on-demand` are checked only if they have an explicit `health_check_type` set (not defaulting to http). Projects without a port and without a `health_check_type` override default to `none`.\n\n### Service Catalog extension\n\nAdd to `projects` (scanned from `METADATA.md`, writable from catalog UI):\n\n| Column | Type | Default | Description |\n|---|---|---|---|\n| `health_check_type` | TEXT | `http` | `http` / `tcp` / `none` |\n| `health_check_interval` | INTEGER | 60 | Seconds between polls |\n\n`METADATA.md` keys: `health_check_type:`, `health_check_interval:`. Existing `health_endpoint` and `port` columns are used as-is.\n\n---\n\n## Heartbeat API\n\nProjects call these from `bin/` scripts to record operational state. GAME must be reachable on `localhost:$GAME_PORT`.\n\n### common.py additions\n\n```python\ndef heartbeat(program, system, state, message=\"\", subsystem=None):\n    \"\"\"\n    Record script heartbeat to GAME.\n    state: OK | WARNING | ERROR | CRITICAL\n    Never raises \u2014 silently skips if GAME unreachable.\n    \"\"\"\n\ndef log_event(program, system, severity, message, subsystem=None):\n    \"\"\"\n    Append a script event to GAME.\n    severity: INFORMATION | WARNING | ERROR | CRITICAL\n    Never raises \u2014 silently skips if GAME unreachable.\n    \"\"\"\n```\n\nPort resolution: reads `$GAME_PORT` env var, then `~/.game_port`, then defaults to 5000.\n\n### common.sh additions\n\n```bash\nheartbeat <program> <system> <state> [message]\n# state: OK WARNING ERROR CRITICAL\n\nlog_event <program> <system> <severity> [message]\n# severity: INFORMATION WARNING ERROR CRITICAL\n```\n\nSame port resolution as Python. Both functions are no-ops (exit 0) if GAME is unreachable.\n\n### New API endpoints\n\n| Method | Path | Body | Action |\n|---|---|---|---|\n| POST | `/api/heartbeat` | `{program, system, subsystem?, state, message?}` | Upsert `heartbeats`; append to `events` on state change |\n| POST | `/api/events` | `{program, system, subsystem?, severity, message}` | Append `
