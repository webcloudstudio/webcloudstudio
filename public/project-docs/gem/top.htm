<script>
/* Resize the parent frameset's top row to match our actual rendered height.
   Required so multi-row nav (on narrow windows) is not clipped by the frame. */
window.addEventListener('load', function() {
  try {
    var h = document.body.scrollHeight || document.documentElement.scrollHeight;
    if (h > 0 && window.parent && window.parent !== window) {
      var fs = window.parent.document.querySelector('frameset[rows]');
      if (fs) { fs.setAttribute('rows', h + ',*'); }
    }
  } catch(e) {}
});
</script>
